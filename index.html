<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة متابعة المشرفين</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .manager-title {
      text-align: center;
      color: #667eea;
      margin-bottom: 30px;
      font-size: 20px;
      font-weight: bold;
    }
    
    .supervisor-card {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      border-right: 5px solid #667eea;
    }
    
    .supervisor-name {
      font-size: 22px;
      font-weight: bold;
      color: #333;
      margin-bottom: 15px;
    }
    
    .supervisor-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .info-item {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    
    .info-label {
      color: #666;
      font-size: 14px;
      margin-bottom: 5px;
    }
    
    .info-value {
      color: #333;
      font-size: 18px;
      font-weight: bold;
    }
    
    .response-box {
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
    }
    
    .response-box textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    
    .response-box textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .send-btn {
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .send-btn:active {
      transform: scale(0.98);
    }
    
    .loading {
      display: none;
      text-align: center;
      color: #667eea;
      padding: 20px;
    }
    
    .success-msg {
      background: #d4edda;
      color: #155724;
      padding: 15px;
      border-radius: 8px;
      margin-top: 10px;
      display: none;
    }
    
    .week-badge {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 14px;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📊 لوحة متابعة المشرفين</h1>
  <div class="manager-title" id="managerTitle">جاري التحميل...</div>
  
  <div id="supervisorsList">
    <div class="loading">جاري تحميل البيانات...</div>
  </div>
</div>

<script>
  // الحصول على اسم المدير من الرابط
  function getManagerFromUrl() {
    var urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('manager') || 'all';
  }
  
  var currentManager = getManagerFromUrl();
  
  // تحميل البيانات
  function loadData() {
    google.script.run
      .withSuccessHandler(renderData)
      .withFailureHandler(function(error) {
        document.getElementById('supervisorsList').innerHTML = 
          '<div style="color:red;text-align:center;">خطأ: ' + error + '</div>';
      })
      .getDashboardDataByManager(currentManager);
  }
  
  // عرض البيانات
  function renderData(data) {
    if (data.error) {
      document.getElementById('supervisorsList').innerHTML = 
        '<div style="color:red;text-align:center;">' + data.error + '</div>';
      return;
    }
    
    // عنوان المدير
    document.getElementById('managerTitle').textContent = 
      data.manager === 'all' ? 'جميع المشرفين' : data.manager;
    
    var html = '';
    
    if (data.supervisors.length === 0) {
      html = '<div style="text-align:center;padding:40px;color:#666;">لا توجد بيانات</div>';
    } else {
      data.supervisors.forEach(function(row, index) {
        var supervisorName = row[1] || 'غير معروف';
        var week = row[0] || '';
        var phone = data.phones[supervisorName] || '';
        
        html += '<div class="supervisor-card">';
        html += '<div class="supervisor-name">';
        html += supervisorName;
        if (week) html += '<span class="week-badge">' + week + '</span>';
        html += '</div>';
        
        html += '<div class="supervisor-info">';
        
        // عرض باقي الأعمدة
        for (var i = 2; i < row.length; i++) {
          if (row[i]) {
            html += '<div class="info-item">';
            html += '<div class="info-label">بيان ' + (i-1) + '</div>';
            html += '<div class="info-value">' + row[i] + '</div>';
            html += '</div>';
          }
        }
        
        html += '</div>';
        
        // مربع رد المدير
        if (currentManager !== 'all' && phone) {
          html += '<div class="response-box">';
          html += '<div class="info-label" style="margin-bottom:10px;">💬 رد المدير (يُرسل واتساب):</div>';
          html += '<textarea id="msg_' + index + '" placeholder="اكتب ملاحظاتك على الاستمارة..."></textarea>';
          html += '<br>';
          html += '<button class="send-btn" onclick="sendResponse(\'' + supervisorName + '\', \'' + phone + '\', ' + index + ')">';
          html += '📤 إرسال للمشرف';
          html += '</button>';
          html += '<div class="success-msg" id="success_' + index + '">✅ تم فتح واتساب!</div>';
          html += '</div>';
        }
        
        html += '</div>';
      });
    }
    
    document.getElementById('supervisorsList').innerHTML = html;
  }
  
  // إرسال الرد
  function sendResponse(supervisorName, phone, index) {
    var message = document.getElementById('msg_' + index).value;
    
    if (!message.trim()) {
      alert('الرجاء كتابة رسالة أولاً');
      return;
    }
    
    google.script.run
      .withSuccessHandler(function(result) {
        if (result.success) {
          document.getElementById('success_' + index).style.display = 'block';
          window.open(result.whatsappUrl, '_blank');
        } else {
          alert('خطأ: ' + result.error);
        }
      })
      .withFailureHandler(function(error) {
        alert('خطأ في الإرسال: ' + error);
      })
      .sendManagerResponse(supervisorName, phone, message, currentManager);
  }
  
  // تحميل البيانات عند فتح الصفحة
  loadData();
</script>

</body>
</html>

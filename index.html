<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة متابعة المشرفين</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #1e3c72; color: #fff; padding: 20px; text-align: center; }
  .nav { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
  .btn { padding: 12px 20px; border: none; border-radius: 8px; background: rgba(255,255,255,0.2); color: #fff; cursor: pointer; font-weight: bold; }
  .btn.active { background: #ff9800; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
  .card { background: #fff; color: #333; border-radius: 15px; padding: 20px; text-align: right; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
  .card h3 { color: #1e3c72; margin-top: 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
  .link-btn { display: block; background: #28a745; color: white; padding: 10px; border-radius: 8px; text-decoration: none; margin-top: 15px; font-weight: bold; }
  #status { font-size: 1.5em; padding: 50px; }
</style>
</head>
<body>

<h1>لوحة المتابعة</h1>
<div id="weeks-nav" class="nav"></div>
<div id="status">⏳ جاري جلب البيانات...</div>
<div id="container" class="grid"></div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKe9F_Auy-WCMrXomu2SRAjuGLcbUY-UdbyknLLfGoG4ewC02vCzcn7SubUvyr-vzjg/exec";
  const PROXY = "https://api.allorigins.win/get?url=" + encodeURIComponent(SCRIPT_URL);

  let allData = [];
  let currentWeek = "الأسبوع الخامس";

  async function loadData() {
    try {
      const res = await fetch(PROXY);
      const json = await res.json();
      allData = JSON.parse(json.contents);
      
      // فلترة بسيطة جداً: استبعاد الصفوف الفارغة تماماً فقط
      allData = allData.filter(row => Object.values(row).some(v => v !== ""));
      
      document.getElementById('status').style.display = 'none';
      renderNav();
      renderCards();
    } catch (e) {
      document.getElementById('status').innerText = "❌ فشل التحميل، تأكد من اتصالك.";
    }
  }

  function renderNav() {
    const nav = document.getElementById('weeks-nav');
    const weeks = [...new Set(allData.map(r => r["الأسابيع"]))].filter(w => w);
    nav.innerHTML = "";
    weeks.forEach(w => {
      const btn = document.createElement('button');
      btn.className = btn ${w === currentWeek ? 'active' : ''};
      btn.innerText = w;
      btn.onclick = () => { currentWeek = w; renderNav(); renderCards(); };
      nav.appendChild(btn);
    });
  }

  function renderCards() {
    const container = document.getElementById('container');
    container.innerHTML = "";
    const filtered = allData.filter(r => r["الأسابيع"] === currentWeek);
    
    filtered.forEach(sup => {
      const card = document.createElement('div');
      card.className = 'card';
      // استخدام المفاتيح كما هي في جدولك (اسم المشرف، تم التنفيذ، رابط)
      card.innerHTML = `
        <h3>${sup["اسم المشرف"] || "بدون اسم"}</h3>
        <p><b>الأسابيع:</b> ${sup["الأسابيع"]}</p>
        <p><b>تم التنفيذ:</b> ${sup["تم التنفيذ"] || 0}</p>
        <a href="${sup["رابط"] || sup["link"] || '#'}" target="_blank" class="link-btn">🔗 فتح الاستمارة</a>
      `;
      container.appendChild(card);
    });
  }

  loadData();
</script>
</body>
</html>

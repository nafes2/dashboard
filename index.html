<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين - النسخة المستقرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a3a63; --success: #28a745; }
        body { font-family: 'Tajawal', sans-serif; background-color: #f4f7f9; margin: 0; padding: 0; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .controls { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border: 1px solid #ddd; }
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-right: 6px solid var(--primary); }
        .prog-container { background: #eee; border-radius: 10px; height: 14px; margin: 10px 0; overflow: hidden; }
        .prog-bar { background: var(--success); height: 100%; transition: width 0.6s ease; }
        .info-row { display: flex; justify-content: space-between; font-weight: bold; color: var(--primary); }
        .ind-item { padding: 10px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; font-size: 0.9em; }
        .status-done { color: var(--success); font-weight: bold; }
        #loading { text-align: center; padding: 50px; font-size: 1.2em; color: #666; }
    </style>
</head>
<body>

<div class="header">
    <h2>📊 لوحة متابعة المشرفين</h2>
    <p>تحديث مباشر ومستقر</p>
</div>

<div class="container">
    <div class="controls">
        <input type="checkbox" id="toggleDone" onchange="drawUI()">
        <label for="toggleDone" style="cursor:pointer; font-weight:bold;">إظهار المؤشرات المنفذة (المكتملة)</label>
    </div>

    <div id="loading">جاري جلب البيانات...</div>
    <div id="main-content"></div>
</div>

<script>
    const sheetId = '1X-p1E6mK-M10B6Zsc56WlO2_Q2YhZ7L8G8Xp_vT8h7s';
    // إضافة تيمستامب لمنع المتصفح من تعليق النسخة القديمة
    const getUrl = () => `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&cachebuster=${new Date().getTime()}`;
    
    let currentData = [];

    async function startApp() {
        try {
            const resp = await fetch(getUrl());
            const text = await resp.text();
            
            // تقسيم الأسطر بشكل بسيط ومباشر
            const lines = text.split('\n').filter(l => l.trim() !== '');
            currentData = lines.slice(1).map(row => {
                // تنظيف علامات التنصيص والفواصل
                return row.split(',').map(cell => cell.replace(/^"|"$/g, '').trim());
            });

            document.getElementById('loading').style.display = 'none';
            drawUI();
        } catch (e) {
            document.getElementById('loading').innerText = "خطأ في الاتصال بالسيرفر. تأكد من الإنترنت.";
        }
    }

    function drawUI() {
        const showDone = document.getElementById('toggleDone').checked;
        const main = document.getElementById('main-content');
        main.innerHTML = '';

        const groups = {};
        currentData.forEach(row => {
            const [name, status, task] = row;
            if (!name) return;

            if (!groups[name]) groups[name] = { done: 0, total: 44, items: [] };

            const isOk = (status === "تم التنفيذ" || status === "جاري التنفيذ");
            if (isOk) groups[name].done++;
            
            if (!isOk || showDone) {
                groups[name].items.push({ task, status, isOk });
            }
        });

        for (const name in groups) {
            const g = groups[name];
            const ratio = ((g.done / 44) * 100).toFixed(1);
            
            let listHtml = g.items.map(i => `
                <div class="ind-item">
                    <span>${i.task}</span>
                    <span class="${i.isOk ? 'status-done' : ''}">${i.status}</span>
                </div>
            `).join('');

            main.innerHTML += `
                <div class="card">
                    <div class="info-row">
                        <span>المشرف: ${name}</span>
                        <span>${ratio}%</span>
                    </div>
                    <div class="prog-container"><div class="prog-bar" style="width: ${ratio}%"></div></div>
                    <div style="text-align:center; font-size:0.85em; margin-bottom:10px; color:#555;">
                        الإنجاز: ${g.done} من 44
                    </div>
                    <div>${listHtml || '<p style="text-align:center;color:gray;">لا توجد مؤشرات حالية</p>'}</div>
                </div>`;
        }
    }

    startApp();
    // تحديث كل دقيقتين لضمان عدم الضغط على السيرفر والتعليق
    setInterval(startApp, 120000);
</script>

</body>
</html>

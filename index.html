<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين</title>
    <style>
        :root { --primary: #1e3c72; --secondary: #2a5298; --success: #28a745; --warning: #ffc107; --danger: #dc3545; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f9; margin: 0; padding: 20px; color: #333; }
        .header { text-align: center; margin-bottom: 30px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .weeks-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; background: white; color: var(--primary); cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .btn.active { background: var(--primary); color: white; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid var(--primary); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; text-align: center; }
        .stat-box { padding: 10px; border-radius: 8px; font-size: 0.9em; }
        .done { background: #e8f5e9; color: var(--success); }
        .pending { background: #fffde7; color: #f57f17; }
        .failed { background: #ffebee; color: var(--danger); }
        .stat-number { display: block; font-size: 1.4em; font-weight: bold; }
        .percent-section { background: #f8f9fa; padding: 10px; border-radius: 8px; margin-top: 15px; font-size: 0.9em; }
        .link-btn { display: block; text-align: center; background: var(--primary); color: white; text-decoration: none; padding: 10px; border-radius: 8px; margin-top: 15px; transition: 0.3s; }
        .link-btn:hover { background: var(--secondary); }
        #loading { text-align: center; font-size: 1.2em; color: var(--primary); margin-top: 50px; }
    </style>
</head>
<body>

<div class="header">
    <h1>لوحة متابعة المشرفين</h1>
    <p>تحديث فوري من صفحة Dashboard</p>
</div>

<div id="weeks" class="weeks-nav"></div>

<div id="loading">جاري جلب البيانات...</div>
<div id="cardsContainer" class="container"></div>

<script>
    // 1. ضع رابط الـ exec الخاص بك هنا بين علامتي التنصيص
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKe9F_Auy-WCMreXomu2SRAjuGLcbUY-UdbyknLLfGoG4ewC02vCzcn7SubUvyr-vzjg/exec";

    let appData = { allData: [], currentWeek: 5 };

    async function fetchData() {
        try {
            const response = await fetch(SCRIPT_URL);
            appData.allData = await response.json();
            document.getElementById('loading').style.display = 'none';
            render();
        } catch (error) {
            document.getElementById('loading').innerHTML = "❌ خطأ في تحميل البيانات. تأكد من إعدادات النشر في جوجل.";
        }
    }

    function render() {
        const nav = document.getElementById("weeks");
        nav.innerHTML = "";
        // إنشاء أزرار الأسابيع من 1 إلى 15
        for(let i=1; i<=15; i++) {
            const btn = document.createElement("button");
            btn.className = btn ${i === appData.currentWeek ? 'active' : ''};
            btn.textContent = i;
            btn.onclick = () => {
                appData.currentWeek = i;
                render();
            };
            nav.appendChild(btn);
        }

        const container = document.getElementById("cardsContainer");
        container.innerHTML = "";

        // تصفية البيانات بناءً على رقم الأسبوع المختار
        const weekData = appData.allData.filter(row => String(row["الأسابيع"]) === String(appData.currentWeek));

        if (weekData.length === 0) {
            container.innerHTML = <div style="grid-column: 1/-1; text-align:center; padding:50px;">لا توجد بيانات للأسبوع ${appData.currentWeek}</div>;
            return;
        }

        weekData.forEach(sup => {
            container.innerHTML += `
                <div class="card">
                    <div style="text-align:center; margin-bottom:15px; color:#1e3c72;"><h3>${sup["اسم المشرف"]}</h3></div>
                    <div class="stats-grid">
                        <div class="stat-box done"><span class="stat-number">${sup["تم التنفيذ"] || 0}</span> تم</div>
                        <div class="stat-box pending"><span class="stat-number">${sup["جار التنفيذ"] || 0}</span> جارٍ</div>
                        <div class="stat-box failed"><span class="stat-number">${sup["لم ينفذ"] || 0}</span> لم ينفذ</div>
                    </div>
                    <div class="percent-section">
                        <p>🔹 نسبة الأسبوع: <strong>${sup["نسبة الأسبوع"] || '0%'}</strong></p>
                        <p>📊 النسبة الكلية: <strong>${sup["نسبة الكلية"] || '0%'}</strong></p>
                    </div>
                    <a href="${sup["رابط"] || '#'}" target="_blank" class="link-btn">🔗 عرض الاستمارة</a>
                </div>`;
        });
    }

    fetchData();
</script>

</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة متابعة المشرفين</title>

<style>
body{
  font-family:Tahoma,Arial;
  background:#1e3c72;
  color:#fff;
  margin:0;
  padding:20px;
}
.container{max-width:1200px;margin:auto}

.nav{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:20px 0}
.btn{
  padding:10px 18px;border:none;border-radius:20px;
  background:#2a5298;color:#fff;cursor:pointer
}
.btn.active{background:#ffd700;color:#000}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px;
}

.card{
  background:#fff;color:#000;
  border-radius:15px;padding:20px;
}

.stat{display:flex;justify-content:space-between;margin-top:10px}

.progress{
  background:#ddd;height:24px;border-radius:12px;overflow:hidden;margin-top:10px
}
.bar{
  height:100%;background:#4caf50;color:#fff;text-align:center
}
</style>
</head>

<body>
<div class="container">

<h1 style="text-align:center">📊 لوحة متابعة المشرفين</h1>

<div class="nav" id="weeks"></div>
<div class="grid" id="cards"></div>

</div>

<script>

// ====== بيانات تجريبية (تعمل دائماً) ======

const demoData = [
  {name:"أحمد", week:1, done:10},
  {name:"محمد", week:1, done:25},
  {name:"سالم", week:1, done:5},
  {name:"أحمد", week:2, done:30},
  {name:"محمد", week:2, done:40}
];

const TOTAL = 44;
let currentWeek = 1;


// ====== عرض الأسابيع ======

function renderWeeks(){
  const w = document.getElementById("weeks");
  w.innerHTML="";

  for(let i=1;i<=15;i++){
    const b=document.createElement("button");
    b.className="btn"+(i===currentWeek?" active":"");
    b.textContent="الأسبوع "+i;
    b.onclick=()=>{currentWeek=i;render();}
    w.appendChild(b);
  }
}


// ====== عرض البطاقات ======

function renderCards(data){

  const c=document.getElementById("cards");
  c.innerHTML="";

  const weekData=data.filter(x=>x.week===currentWeek);

  if(!weekData.length){
    c.innerHTML="<h3>لا توجد بيانات</h3>";
    return;
  }

  weekData.forEach(s=>{
    const percent=((s.done/TOTAL)*100).toFixed(1);

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <h3>${s.name}</h3>
      <div class="stat">
        <span>تم التنفيذ:</span>
        <b>${s.done}</b>
      </div>

      <div class="progress">
        <div class="bar" style="width:${percent}%">${percent}%</div>
      </div>
    `;

    c.appendChild(card);
  });
}


// ====== محاولة تحميل Google Sheet ======

async function tryLoadSheet(){

  const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";

  try{
    const res=await fetch(url);
    const txt=await res.text();

    const lines=txt.split("\n").slice(1);

    const data=lines.map(l=>{
      const v=l.split(",");
      return {
        name:v[0],
        week:Number(v[1]),
        done:Number(v[2])
      }
    });

    if(data.length) return data;

  }catch(e){}

  return demoData; // fallback
}


// ====== تشغيل ======

async function render(){
  renderWeeks();
  const data=await tryLoadSheet();
  renderCards(data);
}

render();

</script>
</body>
</html>

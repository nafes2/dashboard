<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة متابعة المشرفين</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color:#fff; min-height:100vh; padding:20px; }
.container { max-width:1200px; margin:0 auto; }
header { text-align:center; padding:20px 0; }
header h1 { font-size:2em; margin-bottom:10px; text-shadow:2px 2px 4px rgba(0,0,0,0.3); }
header p { opacity:0.9; font-size:1.1em; }

/* Login Section */
.login-section {
  max-width:400px;
  margin:50px auto;
  background:rgba(255,255,255,0.1);
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  text-align:center;
  border:2px solid rgba(255,255,255,0.2);
}
.login-section h2 {
  margin-bottom:30px;
  font-size:1.8em;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.lock-icon { font-size:1.5em; }
.pin-input {
  width:100%;
  padding:15px;
  font-size:18px;
  border:2px solid rgba(255,255,255,0.3);
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:#fff;
  text-align:center;
  margin-bottom:20px;
  outline:none;
}
.pin-input::placeholder { color:rgba(255,255,255,0.6); }
.login-btn {
  width:100%;
  padding:15px;
  background:#ffd700;
  color:#1e3c72;
  border:none;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:all 0.3s;
}
.login-btn:hover { transform:scale(1.02); box-shadow:0 4px 15px rgba(255,215,0,0.4); }
.login-btn:disabled { opacity:0.7; cursor:not-allowed; }
.error-message {
  color:#ff5252;
  margin-top:15px;
  font-weight:bold;
  display:none;
  padding:10px;
  background:rgba(255,82,82,0.1);
  border-radius:8px;
}

/* Loading */
.loading { text-align:center; padding:60px 20px; }
.spinner {
  width:50px; height:50px;
  border:4px solid rgba(255,255,255,0.3);
  border-top-color:#ffd700;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto 20px;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* Dashboard */
.dashboard { display:none; }
.manager-bar {
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}
.manager-name { font-size:1.5em; font-weight:bold; }
.logout-btn {
  background:#ff5252; color:#fff; border:none;
  padding:10px 25px; border-radius:20px;
  cursor:pointer; font-weight:bold; transition:all 0.3s;
}
.logout-btn:hover { background:#ff1744; transform:scale(1.02); }

/* Cards */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(380px, 1fr));
  gap:20px;
  padding:10px;
}
.card {
  background:#fff; color:#333;
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  transition:transform 0.3s ease, box-shadow 0.3s ease;
  position:relative;
  overflow:hidden;
}
.card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:5px;
  background:linear-gradient(90deg, #4caf50, #8bc34a);
}
.card:hover { transform:translateY(-5px); box-shadow:0 15px 40px rgba(0,0,0,0.4); }

.card-header {
  text-align:center;
  margin-bottom:20px;
  padding-bottom:15px;
  border-bottom:2px solid #f0f0f0;
}
.card-header h3 { color:#1e3c72; font-size:1.4em; margin-bottom:8px; }
.phone-badge {
  display:inline-block;
  background:#e3f2fd; color:#1976d2;
  padding:6px 15px; border-radius:20px;
  font-size:0.9em; font-weight:600;
  direction:ltr;
}

/* Stats Grid */
.stats-grid {
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
  margin:20px 0;
}
.stat-box { text-align:center; padding:12px 8px; border-radius:12px; }
.stat-box.done { background:#e8f5e9; color:#2e7d32; }
.stat-box.pending { background:#fff3e0; color:#ef6c00; }
.stat-box.not-done { background:#ffebee; color:#c62828; }
.stat-number { font-size:1.6em; font-weight:bold; display:block; }
.stat-label { font-size:0.8em; margin-top:5px; font-weight:600; }

/* Progress */
.progress-section {
  margin:20px 0;
  padding:15px;
  background:#f8f9fa;
  border-radius:12px;
}
.progress-label {
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
  font-weight:600; color:#555; font-size:0.95em;
}
.progress {
  background:#e0e0e0;
  height:28px;
  border-radius:14px;
  overflow:hidden;
}
.bar {
  height:100%;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-weight:bold;
  font-size:13px;
  transition:width 1s ease;
}
.bar.high { background:linear-gradient(90deg, #4caf50, #66bb6a); }
.bar.medium { background:linear-gradient(90deg, #ff9800, #ffb74d); }
.bar.low { background:linear-gradient(90deg, #f44336, #ef5350); }

/* Form Link Section */
.form-section {
  margin:20px 0;
  padding:15px;
  background:#f0f7ff;
  border-radius:12px;
  text-align:center;
}
.form-link-btn {
  display:inline-block;
  background:#2196f3;
  color:#fff;
  padding:12px 30px;
  border-radius:25px;
  text-decoration:none;
  font-weight:600;
  transition:all 0.3s;
}
.form-link-btn:hover {
  background:#1976d2;
  transform:scale(1.02);
  box-shadow:0 4px 15px rgba(33,150,243,0.4);
}
.form-link-disabled {
  display:inline-block;
  background:#ccc;
  color:#666;
  padding:12px 30px;
  border-radius:25px;
  font-weight:600;
  cursor:not-allowed;
}

/* Notes Section */
.notes-section {
  margin:20px 0;
  padding:15px;
  background:#fff8e1;
  border-radius:12px;
}
.notes-title {
  font-weight:bold;
  color:#f57c00;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:5px;
}
.notes-input {
  width:100%;
  padding:12px;
  border:2px solid #ffe0b2;
  border-radius:10px;
  font-size:14px;
  resize:vertical;
  min-height:80px;
  font-family:inherit;
}
.notes-input:focus {
  outline:none;
  border-color:#ff9800;
}
.send-btn {
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#25d366;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.3s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.send-btn:hover {
  background:#128c7e;
  transform:scale(1.02);
}
.send-btn:disabled {
  background:#ccc;
  cursor:not-allowed;
  transform:none;
}

/* Empty State */
.empty-state {
  text-align:center;
  padding:60px 20px;
  color:rgba(255,255,255,0.8);
}
.empty-state-icon { font-size:4em; margin-bottom:20px; }

@media (max-width:768px) {
  header h1 { font-size:1.5em; }
  .grid { grid-template-columns:1fr; }
  .login-section { padding:30px 20px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📊 لوحة متابعة المشرفين</h1>
    <p>متابعة تنفيذ المؤشرات الأسبوعية</p>
  </header>

  <!-- Login Section -->
  <div id="loginSection" class="login-section">
    <h2><span class="lock-icon">🔐</span> تسجيل الدخول</h2>
    <input type="password" id="pinInput" class="pin-input" placeholder="أدخل الرقم السري" maxlength="10">
    <button onclick="login()" class="login-btn" id="loginBtn">دخول</button>
    <div id="loading" class="loading" style="display:none;">
      <div class="spinner"></div>
      <p>جاري التحميل...</p>
    </div>
    <p id="errorMessage" class="error-message"></p>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="dashboard">
    <div class="manager-bar">
      <div class="manager-name">👤 المدير: <span id="managerName"></span></div>
      <button onclick="logout()" class="logout-btn">خروج</button>
    </div>
    <div class="grid" id="cards"></div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxUb1ranq32n1WQUpczyvgqAvzk_gobfByRUzEFbgmNjJ28N9RFKoeWh6qzjNOIKWRssw/exec';

function login() {
  var pin = document.getElementById('pinInput').value.trim();
  var errorMsg = document.getElementById('errorMessage');
  var btn = document.getElementById('loginBtn');
  var loading = document.getElementById('loading');

  if (!pin) {
    errorMsg.innerHTML = 'الرجاء إدخال الرقم السري';
    errorMsg.style.display = 'block';
    return;
  }

  errorMsg.style.display = 'none';
  btn.style.display = 'none';
  loading.style.display = 'block';

  var callbackName = 'cb_' + Date.now();

  window[callbackName] = function(response) {
    loading.style.display = 'none';
    btn.style.display = 'block';

    if (response && response.success) {
      showDashboard(response);
    } else {
      errorMsg.innerHTML = (response && response.error) ? response.error : 'رقم سري غير صحيح';
      errorMsg.style.display = 'block';
    }
    cleanup(callbackName);
  };

  var script = document.createElement('script');
  script.src = SCRIPT_URL + '?action=verifyPin&pin=' + encodeURIComponent(pin) + '&callback=' + callbackName;

  script.onerror = function() {
    loading.style.display = 'none';
    btn.style.display = 'block';
    errorMsg.innerHTML = '❌ خطأ في الاتصال بالخادم';
    errorMsg.style.display = 'block';
    cleanup(callbackName);
  };

  setTimeout(function() {
    if (window[callbackName]) {
      loading.style.display = 'none';
      btn.style.display = 'block';
      errorMsg.innerHTML = '⏰ انتهى الوقت<br>السكربت لا يستجيب';
      errorMsg.style.display = 'block';
      cleanup(callbackName);
    }
  }, 15000);

  document.head.appendChild(script);
}

function cleanup(name) {
  delete window[name];
  var scripts = document.getElementsByTagName('script');
  for (var i = scripts.length - 1; i >= 0; i--) {
    if (scripts[i].src && scripts[i].src.indexOf('callback=' + name) > -1) {
      scripts[i].parentNode.removeChild(scripts[i]);
    }
  }
}

function showDashboard(data) {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('managerName').textContent = data.manager;

  var container = document.getElementById('cards');
  var supervisors = data.supervisors || [];
  var phones = data.phones || {};
  var dashData = data.dashboardData || {};
  var formLinks = data.formLinks || {};

  if (supervisors.length === 0) {
    container.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">📭</div><h3>لا يوجد مشرفون مسجلون</h3></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < supervisors.length; i++) {
    var name = supervisors[i];
    var phone = phones[name] || '';
    var cleanPhone = phone.replace(/\D/g, '');
    var d = dashData[name] || {};
    var formLink = formLinks[name] || '';

    var total = d.total || 0;
    var done = d.done || 0;
    var pending = d.pending || 0;
    var notDone = d.notDone || 0;
    var percent = d.percent || 0;

    var barClass = percent >= 70 ? 'high' : (percent >= 40 ? 'medium' : 'low');

    html += '<div class="card">';
    html += '<div class="card-header">';
    html += '<h3>' + name + '</h3>';
    html += '<span class="phone-badge">📱 ' + (phone || 'لا يوجد') + '</span>';
    html += '</div>';

    html += '<div class="stats-grid">';
    html += '<div class="stat-box done"><span class="stat-number">' + done + '</span><div class="stat-label">✅ تم</div></div>';
    html += '<div class="stat-box pending"><span class="stat-number">' + pending + '</span><div class="stat-label">⏳ جاري</div></div>';
    html += '<div class="stat-box not-done"><span class="stat-number">' + notDone + '</span><div class="stat-label">❌ لم ينفذ</div></div>';
    html += '</div>';

    html += '<div class="progress-section">';
    html += '<div class="progress-label"><span>نسبة الإنجاز</span><span>' + percent + '%</span></div>';
    html += '<div class="progress"><div class="bar ' + barClass + '" style="width:' + Math.max(percent, 3) + '%">' + percent + '%</div></div>';
    html += '</div>';

    // Form Link Section
    html += '<div class="form-section">';
    if (done > 0 && formLink) {
      html += '<a href="' + formLink + '" target="_blank" class="form-link-btn">🔗 فتح الاستمارة</a>';
    } else {
      html += '<span class="form-link-disabled">⏳ الاستمارة غير متاحة</span>';
    }
    html += '</div>';

    // Notes Section
    if (cleanPhone) {
      html += '<div class="notes-section">';
      html += '<div class="notes-title">💬 ملاحظات المدير (اختياري):</div>';
      html += '<textarea class="notes-input" id="note_' + i + '" placeholder="اكتب ملاحظتك للمشرف هنا..."></textarea>';
      html += '<button class="send-btn" onclick="sendWhatsApp(' + i + ', \'' + cleanPhone + \', \'' + name + \')">📤 إرسال ملاحظة عبر واتساب</button>';
      html += '</div>';
    }

    html += '</div>';
  }

  container.innerHTML = html;
}

function sendWhatsApp(index, phone, supervisorName) {
  var noteText = document.getElementById('note_' + index).value.trim();
  if (!noteText) {
    alert('الرجاء كتابة ملاحظة قبل الإرسال');
    return;
  }

  var managerName = document.getElementById('managerName').textContent;
  var message = 'السلام عليكم ' + supervisorName + '\n\nملاحظة من المدير (' + managerName + '):\n' + noteText;
  var whatsappUrl = 'https://wa.me/' + phone + '?text=' + encodeURIComponent(message);
  window.open(whatsappUrl, '_blank');
}

function logout() {
  document.getElementById('pinInput').value = '';
  document.getElementById('loginSection').style.display = 'block';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginBtn').style.display = 'block';
}

document.getElementById('pinInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') login();
});
</script>

</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة متابعة المشرفين</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  color: #fff;
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 1200px; margin: 0 auto; }
.login-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80vh;
}
.login-box {
  background: rgba(255,255,255,0.1);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.2);
}
.login-box h2 { margin-bottom: 30px; font-size: 1.8em; }
.pin-input {
  width: 200px;
  padding: 15px;
  font-size: 24px;
  text-align: center;
  border: none;
  border-radius: 15px;
  background: rgba(255,255,255,0.9);
  color: #333;
  margin-bottom: 20px;
  letter-spacing: 10px;
}
.login-btn {
  background: #ffd700;
  color: #1e3c72;
  border: none;
  padding: 15px 40px;
  border-radius: 25px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
}
.error-msg { color: #ff6b6b; margin-top: 15px; display: none; }
header { text-align: center; padding: 20px 0; }
.manager-badge {
  background: #ffd700;
  color: #1e3c72;
  padding: 8px 20px;
  border-radius: 20px;
  font-weight: bold;
  display: inline-block;
  margin-top: 10px;
}
.logout-btn {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  padding: 8px 20px;
  border-radius: 20px;
  cursor: pointer;
  margin-top: 10px;
}
.supervisors-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
  gap: 20px;
  margin-top: 30px;
}
.supervisor-card {
  background: #fff;
  color: #333;
  border-radius: 25px;
  padding: 25px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.card-header {
  text-align: center;
  margin-bottom: 20px;
  padding-bottom: 15px;
  border-bottom: 2px solid #f0f0f0;
}
.card-header h3 { color: #1e3c72; font-size: 1.4em; margin-bottom: 5px; }
.phone-badge {
  display: inline-block;
  background: #e3f2fd;
  color: #1976d2;
  padding: 5px 15px;
  border-radius: 15px;
  font-size: 0.9em;
}
.weeks-container { margin-top: 20px; }
.week-section {
  background: #f8f9fa;
  border-radius: 15px;
  padding: 15px;
  margin-bottom: 15px;
}
.week-title {
  font-weight: bold;
  color: #1e3c72;
  margin-bottom: 10px;
  font-size: 1.1em;
}
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin: 15px 0;
}
.stat-box { 
  text-align: center; 
  padding: 12px 8px; 
  border-radius: 12px; 
  background: #fff;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
.stat-box.total { background: #e3f2fd; color: #1565c0; }
.stat-box.completed { background: #e8f5e9; color: #2e7d32; }
.stat-box.progress { background: #fff3e0; color: #ef6c00; }
.stat-box.pending { background: #ffebee; color: #c62828; }
.stat-number { font-size: 1.8em; font-weight: bold; display: block; }
.stat-label { font-size: 0.8em; margin-top: 5px; }
.progress-section {
  margin: 15px 0;
  padding: 10px;
  background: #fff;
  border-radius: 12px;
}
.progress-bar {
  background: #e0e0e0;
  height: 25px;
  border-radius: 12px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: bold;
  font-size: 13px;
  transition: width 0.5s ease;
}
.progress-fill.high { background: #4caf50; }
.progress-fill.medium { background: #ff9800; }
.progress-fill.low { background: #f44336; }
.notes-section {
  background: #f0f4ff;
  border-radius: 12px;
  padding: 15px;
  margin-top: 15px;
}
.notes-textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #ccc;
  border-radius: 10px;
  resize: vertical;
  min-height: 80px;
  font-family: inherit;
  font-size: 14px;
  margin-bottom: 10px;
}
.whatsapp-btn {
  width: 100%;
  background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
  color: white;
  border: none;
  padding: 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
}
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: rgba(255,255,255,0.8);
}
.loading {
  text-align: center;
  padding: 40px;
  color: rgba(255,255,255,0.8);
}
.spinner {
  border: 4px solid rgba(255,255,255,0.3);
  border-top: 4px solid #ffd700;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="container">
  <div id="loginPage" class="login-page">
    <div class="login-box">
      <h2>🔐 تسجيل الدخول</h2>
      <p style="margin-bottom: 20px; opacity: 0.9;">أدخل رقمك السري</p>
      <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="••••">
      <br>
      <button onclick="login()" class="login-btn">دخول</button>
      <p id="loginError" class="error-msg">رقم سري غير صحيح</p>
    </div>
  </div>

  <div id="dashboardPage" style="display: none;">
    <header>
      <h1>📊 لوحة متابعة المشرفين</h1>
      <div class="manager-badge" id="managerName"></div>
      <br>
      <button onclick="logout()" class="logout-btn">🚪 تسجيل خروج</button>
    </header>

    <div id="loadingDiv" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p>جاري تحميل البيانات...</p>
    </div>
    
    <div class="supervisors-grid" id="supervisorsGrid"></div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwH1MkJsbyCmPaWS16KpkkdvWqEO2kW211_eJU0cANkGl8bCfIE-J3PIcvOCElIlXJbgQ/exec";

let appData = {
  currentManager: null,
  supervisors: [],
  supervisorsData: {},
  phones: {}
};

function jsonpRequest(url) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    const callbackId = 'cb_' + Date.now();
    
    window[callbackId] = function(data) {
      resolve(data);
      delete window[callbackId];
      if (script.parentNode) document.head.removeChild(script);
    };
    
    script.src = url + (url.indexOf('?') > -1 ? '&' : '?') + 'callback=' + callbackId;
    script.onerror = () => {
      reject(new Error('فشل التحميل'));
      delete window[callbackId];
      if (script.parentNode) document.head.removeChild(script);
    };
    
    document.head.appendChild(script);
    
    setTimeout(() => {
      if (window[callbackId]) {
        reject(new Error('انتهى الوقت'));
        delete window[callbackId];
        if (script.parentNode) document.head.removeChild(script);
      }
    }, 20000);
  });
}

async function login() {
  const pin = document.getElementById('pinInput').value;
  if (pin.length !== 4) {
    document.getElementById('loginError').textContent = 'أدخل 4 أرقام';
    document.getElementById('loginError').style.display = 'block';
    return;
  }
  
  try {
    const result = await jsonpRequest(API_URL + "?action=verifyPin&pin=" + pin + "&t=" + Date.now());
    
    if (result.success) {
      appData.currentManager = result.manager;
      appData.supervisors = result.supervisors || [];
      appData.supervisorsData = result.supervisorsData || {};
      appData.phones = result.phones || {};
      
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashboardPage').style.display = 'block';
      document.getElementById('managerName').textContent = '👤 ' + result.manager;
      
      renderSupervisors();
    } else {
      document.getElementById('loginError').textContent = result.error || 'رقم سري غير صحيح';
      document.getElementById('loginError').style.display = 'block';
    }
  } catch (err) {
    document.getElementById('loginError').textContent = 'فشل الاتصال: ' + err.message;
    document.getElementById('loginError').style.display = 'block';
  }
}

function logout() {
  location.reload();
}

function calculateProgress(completed, inProgress, notStarted) {
  const total = completed + inProgress + notStarted;
  if (total === 0) return 0;
  return Math.round((completed / total) * 100);
}

function getProgressClass(percentage) {
  if (percentage >= 70) return 'high';
  if (percentage >= 40) return 'medium';
  return 'low';
}

function renderSupervisors() {
  const container = document.getElementById('supervisorsGrid');
  container.innerHTML = '';
  
  if (appData.supervisors.length === 0) {
    container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1;"><h3>لا يوجد مشرفون مسجلون</h3></div>';
    return;
  }
  
  appData.supervisors.forEach((supervisorName, idx) => {
    const phone = appData.phones[supervisorName] || '';
    const dashboardData = appData.supervisorsData[supervisorName] || [];
    
    const card = document.createElement('div');
    card.className = 'supervisor-card';
    
    let html = `
      <div class="card-header">
        <h3>👤 ${supervisorName}</h3>
        ${phone ? `<span class="phone-badge">📱 ${phone}</span>` : ''}
      </div>
    `;
    
    if (dashboardData.length > 0) {
      html += '<div class="weeks-container">';
      
      dashboardData.forEach((weekData) => {
        const total = weekData.indicators || 0;
        const completed = weekData.completed || 0;
        const inProgress = weekData.inProgress || 0;
        const notStarted = weekData.notStarted || 0;
        const percentage = calculateProgress(completed, inProgress, notStarted);
        const progressClass = getProgressClass(percentage);
        
        html += `
          <div class="week-section">
            <div class="week-title">📅 ${weekData.week || 'غير محدد'}</div>
            <div class="stats-row">
              <div class="stat-box total">
                <span class="stat-number">${total}</span>
                <div class="stat-label">الكل</div>
              </div>
              <div class="stat-box completed">
                <span class="stat-number">${completed}</span>
                <div class="stat-label">تم</div>
              </div>
              <div class="stat-box progress">
                <span class="stat-number">${inProgress}</span>
                <div class="stat-label">جاري</div>
              </div>
              <div class="stat-box pending">
                <span class="stat-number">${notStarted}</span>
                <div class="stat-label">لم ينفذ</div>
              </div>
            </div>
            <div class="progress-section">
              <div class="progress-bar">
                <div class="progress-fill ${progressClass}" style="width: ${Math.max(percentage, 5)}%">
                  ${percentage}%
                </div>
              </div>
            </div>
          </div>
        `;
      });
      
      html += '</div>';
    } else {
      html += '<div style="text-align: center; padding: 20px; color: #999;">لا توجد بيانات أداء</div>';
    }
    
    html += `
      <div class="notes-section">
        <textarea class="notes-textarea" id="note-${idx}" placeholder="اكتب ملاحظة للمشرف..."></textarea>
        ${phone ? `<button class="whatsapp-btn" onclick="sendWA('${supervisorName}', ${idx})">📱 إرسال عبر واتساب</button>` : '<button class="whatsapp-btn" disabled style="opacity: 0.5; cursor: not-allowed;">لا يوجد رقم هاتف</button>'}
      </div>
    `;
    
    card.innerHTML = html;
    container.appendChild(card);
  });
}

function sendWA(name, idx) {
  const phone = appData.phones[name];
  if (!phone) { alert('لا يوجد رقم هاتف لهذا المشرف'); return; }
  
  const note = document.getElementById('note-' + idx).value;
  if (!note.trim()) { alert('اكتب ملاحظة أولاً'); return; }
  
  const msg = `مرحباً ${name}،\n\nملاحظة من ${appData.currentManager}:\n${note}\n\n📊 نظام متابعة المشرفين`;
  window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(msg), '_blank');
}

document.getElementById('pinInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين - النسخة النهائية المستقرة</title>
    <style>
        :root { --primary: #1e3c72; --secondary: #2a5298; --accent: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 25px 0; }
        .btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); color: #fff; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn.active { background: var(--accent); color: var(--primary); border-color: var(--accent); box-shadow: 0 4px 15px rgba(255,215,0,0.4); }
        .card { background: #fff; color: #333; border-radius: 25px; padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .card h2 { color: var(--primary); text-align: center; margin-bottom: 15px; }
        .indicators-toggle { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; padding: 12px; border-radius: 12px; color: #fff; width: 100%; margin-bottom: 10px; font-weight: bold; cursor: pointer; }
        .indicators-list { display: none; background: #f8f9fa; border-radius: 12px; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; max-height: 200px; overflow-y: auto; }
        .indicators-list.show { display: block; }
        .indicator-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9em; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .stat-box { text-align: center; padding: 12px; border-radius: 15px; font-weight: bold; font-size: 0.9em; }
        .stat-box.done { background: #e8f5e9; color: #2e7d32; }
        .stat-box.pending { background: #fff3e0; color: #ef6c00; }
        .stat-box.info { background: #e3f2fd; color: #1565c0; }
        .stat-number { font-size: 1.5em; display: block; }
        .total-panel { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: #fff; padding: 15px; border-radius: 20px; text-align: center; margin-bottom: 15px; }
        .link-btn { display: block; text-align: center; background: #1e3c72; color: #fff; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center; padding: 10px;">
        <h2>لوحة متابعة المشرفين</h2>
        <p>اتصال مباشر ومستقر</p>
    </header>
    <div class="nav" id="weeksNav"></div>
    <div id="content"></div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";
const TOTAL_REQ = 44;
let appState = { allData: [], currentWeek: 2 };

// دالة ذكية جداً لاستخراج رقم الأسبوع مهما كان المسمى
function getWeekNumber(text) {
    if (!text) return null;
    const cleanText = text.toString().replace(/[أا]سبوع/g, '').trim();
    const num = cleanText.match(/\d+/);
    if (num) return parseInt(num[0]);
    const map = {"الأول":1,"الثاني":2,"الثالث":3,"الرابع":4,"الخامس":5,"السادس":6,"السابع":7,"الثامن":8,"التاسع":9,"العاشر":10,"الحادي عشر":11,"الثاني عشر":12,"الثالث عشر":13,"الرابع عشر":14,"الخامس عشر":15};
    for (let key in map) if (text.includes(key)) return map[key];
    return null;
}

async function loadData() {
    try {
        const res = await fetch(`${SHEET_URL}&t=${Date.now()}`);
        const text = await res.text();
        appState.allData = parseCSV(text);
        render();
    } catch (e) { document.getElementById('content').innerHTML = "⚠️ خطأ في تحميل البيانات"; }
}

function parseCSV(csv) {
    const rows = csv.split('\n').filter(r => r.trim());
    if (rows.length < 1) return [];
    const headers = rows[0].split(',').map(h => h.replace(/"/g,'').trim());
    return rows.slice(1).map(row => {
        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,'').trim());
        let obj = {};
        headers.forEach((h, i) => obj[h] = cols[i] || "");
        return obj;
    });
}

function render() {
    const nav = document.getElementById('weeksNav');
    nav.innerHTML = '';
    for(let i=1; i<=15; i++){
        const b = document.createElement('button');
        b.className = `btn ${appState.currentWeek === i ? 'active' : ''}`;
        b.textContent = i;
        b.onclick = () => { appState.currentWeek = i; render(); };
        nav.appendChild(b);
    }

    const container = document.getElementById('content');
    if (appState.allData.length === 0) return;

    const sample = appState.allData[0];
    const nCol = Object.keys(sample).find(k => k.includes("مشرف"));
    const wCol = Object.keys(sample).find(k => k.includes("أسبوع") || k.includes("أسابيع"));
    const sCol = Object.keys(sample).find(k => k.includes("حالة"));
    const iCol = Object.keys(sample).find(k => k.includes("مؤشر"));

    // الإجمالي التراكمي
    const totals = {};
    appState.allData.forEach(r => {
        const n = r[nCol];
        if (n && r[sCol]?.includes("تنفيذ")) totals[n] = (totals[n] || 0) + 1;
    });

    const weekRows = appState.allData.filter(r => getWeekNumber(r[wCol]) === appState.currentWeek);

    if (weekRows.length === 0) {
        container.innerHTML = `<div class="card" style="text-align:center;"><h3>لا توجد بيانات للأسبوع ${appState.currentWeek}</h3></div>`;
        return;
    }

    container.innerHTML = '';
    const sups = {};
    weekRows.forEach((r, i) => {
        const n = r[nCol]; if(!n) return;
        if(!sups[n]) sups[n] = { n, weekCount: 0, total: totals[n] || 0, list: [], link: "#" };
        const isDone = r[sCol]?.includes("تنفيذ");
        if(isDone) sups[n].weekCount++;
        sups[n].list.push({ name: r[iCol] || "مؤشر", status: isDone ? "✅" : "⏳" });
        const rowLink = Object.values(r).find(v => v.toString().startsWith('http'));
        if(rowLink) sups[n].link = rowLink;
    });

    Object.values(sups).forEach((s, idx) => {
        const perc = ((s.total / TOTAL_REQ) * 100).toFixed(2);
        const lid = `list-${idx}`;
        container.innerHTML += `
            <div class="card">
                <h2>${s.n}</h2>
                <button class="indicators-toggle" onclick="document.getElementById('${lid}').style.display = document.getElementById('${lid}').style.display === 'block' ? 'none' : 'block'">📋 المؤشرات (${s.list.length})</button>
                <div class="indicators-list" id="${lid}">${s.list.map(i => `<div class="indicator-item"><span>${i.name}</span><span>${i.status}</span></div>`).join('')}</div>
                <div class="stats-grid">
                    <div class="stat-box done"><span class="stat-number">${s.weekCount}</span>تم ✅</div>
                    <div class="stat-box pending"><span class="stat-number">0</span>جاري ⏳</div>
                    <div class="stat-box info"><span class="stat-number">${s.weekCount}</span>هذا الأسبوع</div>
                </div>
                <div class="total-panel"><p>📊 الإجمالي التراكمي</p><h1 style="font-size:2.2em;">${s.total}</h1><p>من ${TOTAL_REQ} مؤشر (${perc}%)</p></div>
                <a href="${s.link}" target="_blank" class="link-btn">🔗 فتح الاستمارة</a>
            </div>`;
    });
}
loadData();
</script>
</body>
</html>

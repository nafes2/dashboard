<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين - الإدارة</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff; min-height: 100vh; padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; }
        .nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 25px 0; }
        .btn {
            background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3);
            color: #fff; padding: 10px 18px; border-radius: 25px; cursor: pointer; transition: 0.3s;
        }
        .btn.active { background: #ffd700; color: #1e3c72; border-color: #ffd700; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card {
            background: #fff; color: #333; border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; border-top: 5px solid #4caf50;
        }
        .card h3 { color: #1e3c72; text-align: center; margin-bottom: 15px; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .stat-box { text-align: center; padding: 10px; border-radius: 12px; font-size: 0.9em; font-weight: bold; }
        .stat-box.done { background: #e8f5e9; color: #2e7d32; }
        .stat-box.target { background: #e3f2fd; color: #1565c0; }
        .stat-box.rem { background: #fff3e0; color: #ef6c00; }
        .stat-number { font-size: 1.4em; font-weight: bold; display: block; }
        .progress-bar-container { background: #eee; height: 20px; border-radius: 10px; overflow: hidden; margin: 10px 0; position: relative; }
        .progress-bar { height: 100%; background: #4caf50; transition: width 1s; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 11px; font-weight: bold; line-height: 20px; color: #333; }
        .link-btn {
            display: block; width: 100%; text-align: center; background: #2a5298;
            color: #fff; padding: 12px; border-radius: 10px; text-decoration: none; margin-top: 15px; font-weight: bold;
        }
        .loading { text-align: center; padding: 50px; font-size: 1.2em; }
        .error-box { background: #ff5252; color: white; padding: 20px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📊 لوحة متابعة المدير</h1>
        <p>بيانات مباشرة من ورقة المعادلات</p>
    </header>

    <div class="nav" id="weeksNav"></div>
    <div class="grid" id="cardsContainer">
        <div class="loading">جاري جلب البيانات من الرابط الجديد...</div>
    </div>
</div>

<script>
// الرابط المباشر الذي زودتني به لورقة المدير (بصيغة CSV)
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?gid=1526100112&single=true&output=csv";

let allData = [];
let currentWeek = 1;

async function loadData() {
    try {
        // إضافة t=Date.now لضمان جلب أحدث البيانات من جوجل وعدم الاعتماد على الكاش
        const response = await fetch(CSV_URL + "&t=" + Date.now());
        const text = await response.text();
        allData = parseCSV(text);
        
        if (allData.length > 0) {
            renderWeeks();
            renderCards();
        } else {
            showError("لا توجد بيانات في الورقة المنشورة.");
        }
    } catch (e) {
        showError("فشل في الوصول للبيانات. تأكد من أن الرابط متاح للجميع.");
    }
}

function parseCSV(text) {
    const lines = text.split('\n').filter(l => l.trim() !== "");
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
    return lines.slice(1).map(line => {
        const values = line.split(',').map(v => v.trim().replace(/"/g, ''));
        let obj = {};
        headers.forEach((h, i) => obj[h] = values[i]);
        return obj;
    });
}

function renderWeeks() {
    const nav = document.getElementById('weeksNav');
    nav.innerHTML = "";
    // عرض 12 أسبوع
    for (let i = 1; i <= 12; i++) {
        const btn = document.createElement('button');
        btn.className = btn ${currentWeek == i ? 'active' : ''};
        btn.textContent = الأسبوع ${i};
        btn.onclick = () => { currentWeek = i; renderWeeks(); renderCards(); };
        nav.appendChild(btn);
    }
}

function renderCards() {
    const container = document.getElementById('cardsContainer');
    container.innerHTML = "";
    
    // تصفية البيانات حسب الأسبوع المختار (يبحث عن عمود باسم "الأسبوع")
    const filtered = allData.filter(d => d["الأسبوع"] == currentWeek || d["الاسبوع"] == currentWeek);

    if (filtered.length === 0) {
        container.innerHTML = <div class="loading">لا توجد بيانات للأسبوع ${currentWeek} في ورقة المدير.</div>;
        return;
    }

    filtered.forEach(row => {
        const done = parseInt(row["تم"] || row["تم التنفيذ"] || 0);
        const target = 44; // الهدف الثابت
        const percent = Math.min((done / target) * 100, 100).toFixed(1);

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <h3>${row["اسم المشرف"] || "اسم غير متوفر"}</h3>
            <div class="stats-grid">
                <div class="stat-box done"><span class="stat-number">${done}</span>تم</div>
                <div class="stat-box target"><span class="stat-number">${target}</span>الهدف</div>
                <div class="stat-box rem"><span class="stat-number">${target - done}</span>باقي</div>
            </div>
            <div class="progress-bar-container">
                <div class="progress-text">${percent}%</div>
                <div class="progress-bar" style="width: ${percent}%"></div>
            </div>
            <a href="${row["الرابط"] || row["رابط الاستمارة"] || '#'}" target="_blank" class="link-btn">🔗 عرض التفاصيل</a>
        `;
        container.appendChild(card);
    });
}

function showError(msg) {
    document.getElementById('cardsContainer').innerHTML = <div class="error-box">${msg}</div>;
}

loadData();
</script>
</body>
</html>

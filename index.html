<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة متابعة المشرفين</title>
<style>
/* التنسيقات (نفس تنسيقاتك الأصلية مع تحسينات بسيطة) */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  color: #fff;
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 1200px; margin: 0 auto; }
.login-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
.login-box { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); }
.pin-input { width: 200px; padding: 15px; font-size: 24px; text-align: center; border: none; border-radius: 15px; background: rgba(255,255,255,0.9); color: #333; margin-bottom: 20px; letter-spacing: 10px; }
.login-btn { background: #ffd700; color: #1e3c72; border: none; padding: 15px 40px; border-radius: 25px; font-size: 18px; font-weight: bold; cursor: pointer; }
.error-msg { color: #ff6b6b; margin-top: 15px; display: none; }
header { text-align: center; padding: 20px 0; }
.manager-badge { background: #ffd700; color: #1e3c72; padding: 8px 20px; border-radius: 20px; font-weight: bold; display: inline-block; margin-top: 10px; }
.logout-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 8px 20px; border-radius: 20px; cursor: pointer; margin: 10px; }
.supervisors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 30px; }
.supervisor-card { background: #fff; color: #333; border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); position: relative; }
.card-header { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; }
.card-header h3 { color: #1e3c72; font-size: 1.4em; }
.week-badge { display: inline-block; background: #e3f2fd; color: #1976d2; padding: 6px 15px; border-radius: 20px; font-size: 0.85em; font-weight: 600; margin-top: 5px; }
.stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
.stat-box { text-align: center; padding: 12px 5px; border-radius: 15px; background: #f8f9fa; }
.stat-box.total { background: #e3f2fd; color: #1565c0; }
.stat-box.pending { background: #fff3e0; color: #ef6c00; }
.stat-box.done { background: #e8f5e9; color: #2e7d32; }
.stat-number { font-size: 1.6em; font-weight: bold; display: block; }
.notes-section { background: #f0f4ff; border-radius: 12px; padding: 15px; margin-top: 15px; }
.notes-textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 10px; min-height: 60px; margin-bottom: 10px; }
.whatsapp-btn { width: 100%; background: linear-gradient(135deg, #25d366 0%, #128c7e 100%); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
.loading { text-align: center; padding: 50px; }
.spinner { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid #ffd700; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div id="loginPage" class="login-page">
    <div class="login-box">
      <h2>🔐 تسجيل الدخول</h2>
      <p style="margin-bottom: 20px; opacity: 0.9;">أدخل رقمك السري</p>
      <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="••••">
      <br>
      <button onclick="login()" class="login-btn">دخول</button>
      <p id="loginError" class="error-msg"></p>
    </div>
  </div>

  <div id="dashboardPage" style="display: none;">
    <header>
      <h1>📊 لوحة متابعة المشرفين</h1>
      <div class="manager-badge" id="managerName"></div>
      <br>
      <button onclick="logout()" class="logout-btn">🚪 خروج</button>
      <button onclick="loadDashboard()" class="logout-btn" style="background: #4caf50;">🔄 تحديث البيانات</button>
    </header>

    <div id="loadingDiv" class="loading" style="display: none;">
      <div class="spinner"></div>
      <p>جاري جلب بيانات الأسبوع من الخلية C1...</p>
    </div>
    
    <div class="supervisors-grid" id="supervisorsGrid"></div>
  </div>
</div>

<script>
// الرابط الجديد الذي قمت بنشره
const API_URL = "https://script.google.com/macros/s/AKfycbyBBzMy-6IISM7YV0IovbGqaroT9D-py_DhfNH2YSE6Xg5PWDOLnsq1mdf_h8MXZ2x7_Q/exec";

let appData = {
  currentManager: null,
  supervisors: [], // الأسماء المسموحة للمدير
  phones: {},
  dashboardData: []
};

function jsonpRequest(url) {
  return new Promise((resolve, reject) => {
    const script = document.createElement('script');
    const callbackId = 'cb_' + Date.now();
    window[callbackId] = (data) => {
      resolve(data);
      delete window[callbackId];
      document.head.removeChild(script);
    };
    script.src = url + (url.indexOf('?') > -1 ? '&' : '?') + 'callback=' + callbackId;
    script.onerror = () => reject(new Error('فشل الاتصال'));
    document.head.appendChild(script);
  });
}

async function login() {
  const pin = document.getElementById('pinInput').value;
  if (!pin) return;
  
  const errorEl = document.getElementById('loginError');
  errorEl.style.display = 'none';
  
  try {
    const result = await jsonpRequest(`${API_URL}?action=verifyPin&pin=${pin}`);
    if (result.success) {
      appData.currentManager = result.manager;
      appData.supervisors = result.supervisors;
      appData.phones = result.phones;
      
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('dashboardPage').style.display = 'block';
      document.getElementById('managerName').textContent = `👤 المدير: ${result.manager}`;
      
      loadDashboard();
    } else {
      errorEl.textContent = result.error;
      errorEl.style.display = 'block';
    }
  } catch (err) {
    errorEl.textContent = "حدث خطأ في الاتصال";
    errorEl.style.display = 'block';
  }
}

async function loadDashboard() {
  document.getElementById('loadingDiv').style.display = 'block';
  document.getElementById('supervisorsGrid').innerHTML = '';
  
  try {
    // جلب البيانات (التي أصبحت الآن مربوطة بـ C1 تلقائياً من السكربت)
    const data = await jsonpRequest(`${API_URL}?action=dashboard`);
    appData.dashboardData = data || [];
    renderSupervisors();
  } catch (err) {
    console.error(err);
  } finally {
    document.getElementById('loadingDiv').style.display = 'none';
  }
}

function renderSupervisors() {
  const container = document.getElementById('supervisorsGrid');
  
  // تصفية البيانات لعرض مشرفي هذا المدير فقط
  const filtered = appData.dashboardData.filter(row => 
    appData.supervisors.includes(row[1])
  );
  
  if (filtered.length === 0) {
    container.innerHTML = '<div class="loading" style="grid-column: 1/-1;">لا توجد بيانات مسجلة لمشرفيك في شيت Dashboard لهذا الأسبوع.</div>';
    return;
  }
  
  filtered.forEach((row, idx) => {
    const weekLabel = row[0]; // القيمة القادمة من C1
    const name = row[1];
    const total = parseInt(row[2]) || 0;
    const done = parseInt(row[3]) || 0;
    const pending = total - done;
    const percent = total > 0 ? Math.round((done / total) * 100) : 0;
    const phone = appData.phones[name] || '';
    
    const card = document.createElement('div');
    card.className = 'supervisor-card';
    card.innerHTML = `
      <div class="card-header">
        <h3>👤 ${name}</h3>
        <span class="week-badge">${weekLabel}</span>
      </div>
      <div class="stats-row">
        <div class="stat-box total"><span class="stat-number">${total}</span>📊 الكل</div>
        <div class="stat-box pending"><span class="stat-number">${pending}</span>⏳ جاري</div>
        <div class="stat-box done"><span class="stat-number">${done}</span>✅ تم</div>
      </div>
      <div style="margin-bottom: 15px;">
        <div style="display: flex; justify-content: space-between; font-size: 0.9em; margin-bottom: 5px;">
          <span>نسبة الإنجاز</span><span>${percent}%</span>
        </div>
        <div style="background: #eee; height: 12px; border-radius: 6px; overflow: hidden;">
          <div style="background: ${percent > 70 ? '#4caf50' : '#ff9800'}; width: ${percent}%; height: 100%;"></div>
        </div>
      </div>
      <div class="notes-section">
        <textarea class="notes-textarea" id="note-${idx}" placeholder="اكتب ملاحظة للمشرف..."></textarea>
        <button class="whatsapp-btn" onclick="sendWA('${name}', '${phone}', '${idx}')">إرسال عبر واتساب</button>
      </div>
    `;
    container.appendChild(card);
  });
}

function sendWA(name, phone, idx) {
  const note = document.getElementById(`note-${idx}`).value;
  if(!note) return alert("اكتب ملاحظة أولاً");
  const msg = encodeURIComponent(`مرحباً ${name}،\nملاحظة من ${appData.currentManager}:\n${note}`);
  window.open(`https://wa.me/${phone}?text=${msg}`, '_blank');
}

function logout() { location.reload(); }

document.getElementById('pinInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') login(); });
</script>
</body>
</html>

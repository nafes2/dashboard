<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين</title>
    <style>
        :root { --primary: #1e3c72; --accent: #ffd700; --success: #4caf50; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, var(--primary) 0%, #2a5298 100%); color: #fff; min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 1000px; margin: 0 auto; }
        .nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
        .btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; font-weight: bold; }
        .btn.active { background: var(--accent); color: var(--primary); transform: scale(1.1); box-shadow: 0 0 15px rgba(255,215,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #fff; color: #333; border-radius: 12px; padding: 15px; text-align: right; border-right: 5px solid var(--accent); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .card h3 { color: var(--primary); font-size: 1.1rem; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .prog-bg { background: #eee; border-radius: 10px; height: 10px; margin: 10px 0; overflow: hidden; }
        .prog-fill { background: var(--success); height: 100%; transition: width 0.8s; }
        .stats { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📊 لوحة متابعة المشرفين</h1>
        <p id="msg" style="font-size: 0.9rem; margin-top: 10px; opacity: 0.9;">جاري تحديث البيانات...</p>
    </header>
    <div class="nav" id="weekNav"></div>
    <div class="grid" id="dataGrid"></div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";
const TOTAL_INDICATORS = 44;

const WEEK_LABELS = {
    1: ["الأول", "الاول", "1"], 2: ["الثاني", "الثاني", "2"], 3: ["الثالث", "الثالث", "3"],
    4: ["الرابع", "الرابع", "4"], 5: ["الخامس", "الخامس", "5"], 6: ["السادس", "6"],
    7: ["السابع", "7"], 8: ["الثامن", "8"], 9: ["التاسع", "9"], 10: ["العاشر", "10"]
};

let state = { data: [], currentWeek: 5 };

async function loadData() {
    try {
        const response = await fetch(`${SHEET_URL}&t=${Date.now()}`);
        const text = await response.text();
        state.data = parseCSV(text);
        document.getElementById('msg').innerText = "✅ متصل بصفحة Dashboard (تشمل جاري التنفيذ)";
        render();
    } catch (e) {
        document.getElementById('msg').innerText = "❌ فشل الاتصال بالبيانات";
    }
}

function parseCSV(text) {
    const lines = text.split('\n').filter(l => l.trim());
    if (!lines.length) return [];
    const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
    return lines.slice(1).map(line => {
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
        return headers.reduce((obj, h, i) => ({ ...obj, [h]: values[i] }), {});
    });
}

function render() {
    const nav = document.getElementById('weekNav');
    nav.innerHTML = '';
    for(let i=1; i<=15; i++) {
        const b = document.createElement('div');
        b.className = `btn ${i === state.currentWeek ? 'active' : ''}`;
        b.innerText = i;
        b.onclick = () => { state.currentWeek = i; render(); };
        nav.appendChild(b);
    }

    const grid = document.getElementById('dataGrid');
    grid.innerHTML = '';

    const keys = Object.keys(state.data[0] || {});
    const nameCol = keys.find(k => k.includes("مشرف")) || keys[0];
    const weekCol = keys.find(k => k.includes("أسبوع") || k.includes("أسابيع") || k.includes("الاسبوع")) || keys[1];
    const statusCol = keys.find(k => k.includes("حالة")) || keys[2];

    const allowedWeeks = WEEK_LABELS[state.currentWeek] || [state.currentWeek.toString()];

    const filtered = state.data.filter(row => {
        const val = (row[weekCol] || "").toString();
        // فحص ذكي للهمزة والنص
        return allowedWeeks.some(w => val.includes(w));
    });

    if (!filtered.length) {
        grid.innerHTML = `<div style="grid-column:1/-1; padding:20px; border:1px dashed #fff; border-radius:10px;">لا توجد بيانات مسجلة لـ ${allowedWeeks[0]}</div>`;
        return;
    }

    const summary = {};
    filtered.forEach(row => {
        const name = row[nameCol];
        if(!name) return;
        if(!summary[name]) summary[name] = { name, done: 0 };
        
        const s = (row[statusCol] || "").toString().trim();
        // الآن يقبل "جاري التنفيذ" أو "تم" أو أي نص غير فارغ
        if(s.includes("تم") || s.includes("جاري") || s.includes("تنفيذ") || (s !== "" && s !== "0")) {
            summary[name].done++;
        }
    });

    Object.values(summary).forEach(sup => {
        const percent = Math.min(((sup.done / TOTAL_INDICATORS) * 100), 100).toFixed(1);
        grid.innerHTML += `
            <div class="card">
                <h3>${sup.name}</h3>
                <div class="prog-bg"><div class="prog-fill" style="width: ${percent}%"></div></div>
                <div class="stats"><span>المنجز: ${sup.done}</span><span>${percent}%</span></div>
            </div>`;
    });
}
loadData();
</script>
</body>
</html>

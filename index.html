<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المدير</title>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root { --main-bg: #1a2a6c; --card-bg: #ffffff; --text-color: #333; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--main-bg); color: white; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; text-align: center; }
        .nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
        .btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .btn.active { background: #ffd700; color: #1a2a6c; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: var(--card-bg); color: var(--text-color); border-radius: 15px; padding: 20px; text-align: right; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card h3 { color: #1a2a6c; margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; text-align: center; }
        .stat { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .progress-bar { background: #eee; height: 12px; border-radius: 10px; margin: 15px 0; overflow: hidden; }
        .progress-fill { background: #4caf50; height: 100%; width: 0%; transition: width 1s; }
        .loading { font-size: 1.4rem; margin-top: 100px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 لوحة متابعة المدير</h1>
    <div class="nav" id="weeksNav"></div>
    <div id="loader" class="loading">⏳ جاري سحب البيانات من جوجل شيت...</div>
    <div class="grid" id="mainGrid"></div>
</div>

<script>
    // الرابط الذي زودتني به
    const SHEET_ID = '17Bf1TEoRC2h_uWlh8ezOEo-Fius5IgVzaIyLU9ByR1o';
    const GID = '1526100112';

    // تحميل مكتبة جوجل
    google.charts.load('current', {packages:['corechart']});
    google.charts.setOnLoadCallback(drawSheet);

    let rowsData = [];
    let currentWeek = 1;

    function drawSheet() {
        const query = new google.visualization.Query(https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID});
        query.send(response => {
            if (response.isError()) {
                document.getElementById('loader').innerText = "❌ خطأ: تأكد من أن الملف 'عام' (Public)";
                return;
            }
            const data = response.getDataTable();
            const cols = [];
            for (let i = 0; i < data.getNumberOfColumns(); i++) cols.push(data.getColumnLabel(i));

            rowsData = [];
            for (let i = 0; i < data.getNumberOfRows(); i++) {
                let item = {};
                for (let j = 0; j < data.getNumberOfColumns(); j++) {
                    item[cols[j]] = data.getValue(i, j);
                }
                rowsData.push(item);
            }

            document.getElementById('loader').style.display = 'none';
            renderWeeks();
            renderCards();
        });
    }

    function renderWeeks() {
        const nav = document.getElementById('weeksNav');
        nav.innerHTML = '';
        for (let i = 1; i <= 12; i++) {
            const btn = document.createElement('button');
            btn.className = btn ${currentWeek == i ? 'active' : ''};
            btn.innerText = أسبوع ${i};
            btn.onclick = () => { currentWeek = i; renderWeeks(); renderCards(); };
            nav.appendChild(btn);
        }
    }

    function renderCards() {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = '';
        
        // البحث عن الأسبوع (يدعم كلمة الأسبوع أو الاسبوع)
        const filtered = rowsData.filter(r => r['الأسبوع'] == currentWeek || r['الاسبوع'] == currentWeek);

        if (filtered.length === 0) {
            grid.innerHTML = <div class="loading">لا توجد بيانات للأسبوع ${currentWeek}</div>;
            return;
        }

        filtered.forEach(row => {
            const done = parseInt(row['تم'] || 0);
            const total = 44;
            const percent = ((done / total) * 100).toFixed(1);

            grid.innerHTML += `
                <div class="card">
                    <h3>${row['اسم المشرف'] || 'مشرف'}</h3>
                    <div class="stat"><span>✅ المنفذ:</span> <b>${done}</b></div>
                    <div class="stat"><span>🎯 المستهدف:</span> <b>${total}</b></div>
                    <div class="stat"><span>⏳ المتبقي:</span> <b>${total - done}</b></div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                    <p style="text-align:center; font-size:13px;">نسبة الإنجاز: ${percent}%</p>
                </div>
            `;
        });
    }
</script>
</body>
</html>

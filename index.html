<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a3a63; --accent: #f8f9fa; --success: #28a745; --gray: #6c757d; }
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .header { background: var(--primary); color: white; padding: 25px 20px; text-align: center; }
        .container { max-width: 800px; margin: -30px auto 20px; padding: 0 15px; }
        .controls { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-top: 5px solid var(--primary); }
        .progress-section { margin: 15px 0; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        .progress-bar-bg { background: #e9ecef; border-radius: 10px; height: 15px; overflow: hidden; margin-bottom: 10px; }
        .progress-bar-fill { background: linear-gradient(90deg, #28a745, #34ce57); height: 100%; transition: width 0.8s ease-in-out; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-weight: bold; }
        .stat-box { background: white; padding: 8px; border-radius: 5px; text-align: center; border: 1px solid #ddd; }
        .indicator-list { margin-top: 15px; }
        .indicator-item { padding: 10px; border-bottom: 1px solid #f1f1f1; display: flex; justify-content: space-between; align-items: center; font-size: 0.95em; }
        .status-tag { padding: 2px 8px; border-radius: 4px; font-size: 0.85em; }
        .done { background: #d4edda; color: #155724; }
        .pending { background: #fff3cd; color: #856404; }
        .hidden { display: none; }
        #loading { text-align: center; padding: 50px; font-weight: bold; }
        input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2>📊 لوحة متابعة المشرفين</h2>
    <p>تحديث تلقائي من النظام المركزي</p>
</div>

<div class="container">
    <div class="controls">
        <input type="checkbox" id="toggleCompleted" onchange="renderData()">
        <label for="toggleCompleted" style="cursor:pointer">إظهار المؤشرات المنفذة (المكتملة)</label>
    </div>

    <div id="loading">جاري جلب البيانات...</div>
    <div id="content"></div>
</div>

<script>
    // الرابط بصيغة CSV لضمان استقرار الجلب
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/1X-p1E6mK-M10B6Zsc56WlO2_Q2YhZ7L8G8Xp_vT8h7s/export?format=csv&gid=0';
    
    let allRows = [];

    async function fetchData() {
        try {
            const response = await fetch(CSV_URL);
            const data = await response.text();
            // تحويل CSV إلى مصفوفة (مع مراعاة الفواصل)
            const rows = data.split('\n').slice(1); // تجاوز العنوان
            
            allRows = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/); // تقسيم ذكي للفواصل
                return {
                    name: cols[0]?.replace(/"/g, '').trim(),
                    status: cols[1]?.replace(/"/g, '').trim(),
                    indicator: cols[2]?.replace(/"/g, '').trim()
                };
            }).filter(r => r.name); // استبعاد الصفوف الفارغة

            renderData();
            document.getElementById('loading').classList.add('hidden');
        } catch (error) {
            document.getElementById('loading').innerHTML = "⚠️ فشل الاتصال. تأكد من أن الرابط متاح للجميع (Anyone with the link).";
        }
    }

    function renderData() {
        const showCompleted = document.getElementById('toggleCompleted').checked;
        const content = document.getElementById('content');
        content.innerHTML = '';

        const supervisors = {};
        allRows.forEach(item => {
            if (!supervisors[item.name]) {
                supervisors[item.name] = { totalDone: 0, items: [] };
            }
            // التحقق من الحالة (تم أو جاري)
            const isFinished = (item.status === "تم التنفيذ" || item.status === "جاري التنفيذ");
            if (isFinished) {
                supervisors[item.name].totalDone++;
            }
            supervisors[item.name].items.push({...item, isFinished});
        });

        for (const [name, data] of Object.entries(supervisors)) {
            const percentage = Math.min(((data.totalDone / 44) * 100), 100).toFixed(1);
            
            let listHtml = '';
            data.items.forEach(ind => {
                // فلترة العرض بناءً على خيار المستخدم
                if (!ind.isFinished || (ind.isFinished && showCompleted)) {
                    listHtml += `
                        <div class="indicator-item">
                            <span>${ind.indicator}</span>
                            <span class="status-tag ${ind.isFinished ? 'done' : 'pending'}">${ind.status}</span>
                        </div>`;
                }
            });

            content.innerHTML += `
                <div class="card">
                    <h3 style="margin-top:0; color:var(--primary)">المشرف: ${name}</h3>
                    <div class="progress-section">
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" style="width: ${percentage}%"></div>
                        </div>
                        <div class="stats-grid">
                            <div class="stat-box">الإنجاز: ${data.totalDone} / 44</div>
                            <div class="stat-box">النسبة: ${percentage}%</div>
                        </div>
                    </div>
                    <div class="indicator-list">
                        ${listHtml || '<p style="text-align:center; color:gray;">لا توجد مؤشرات متبقية للعرض</p>'}
                    </div>
                </div>
            `;
        }
    }

    fetchData();
    // تحديث تلقائي كل 5 دقائق
    setInterval(fetchData, 300000);
</script>

</body>
</html>

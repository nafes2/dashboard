<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh; padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header {
            text-align: center; color: white; padding: 30px 20px;
        }
        .header h1 { font-size: 24px; margin-bottom: 10px; }
        .weeks-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 10px; padding: 20px;
        }
        .week-btn {
            aspect-ratio: 1; border-radius: 50%;
            background: rgba(255,255,255,0.1); color: white;
            border: 2px solid rgba(255,255,255,0.3);
            font-size: 18px; font-weight: bold; cursor: pointer;
        }
        .week-btn.active {
            background: #ffd700; color: #1e3c72;
        }
        .supervisor-card {
            background: white; border-radius: 20px; padding: 25px;
            margin: 20px 0;
        }
        .supervisor-name {
            text-align: center; font-size: 22px;
            color: #1e3c72; margin-bottom: 15px;
        }
        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin: 15px 0;
        }
        .stat-box {
            text-align: center; padding: 15px; border-radius: 12px;
        }
        .stat-box.done { background: #e8f5e9; color: #2e7d32; }
        .stat-box.pending { background: #fff3e0; color: #ef6c00; }
        .stat-box.not-done { background: #ffebee; color: #c62828; }
        .form-link {
            display: block; text-align: center; padding: 15px;
            border-radius: 12px; margin: 15px 0;
            text-decoration: none; font-weight: bold;
        }
        .form-link.active { background: #1976d2; color: white; }
        .form-link.disabled { background: #e0e0e0; color: #999; pointer-events: none; }
        .note-box {
            width: 100%; padding: 12px; border: 2px solid #ddd;
            border-radius: 10px; margin-top: 10px;
        }
        .whatsapp-btn {
            width: 100%; background: #25d366; color: white;
            border: none; padding: 12px; border-radius: 10px;
            margin-top: 10px; cursor: pointer;
        }
        .login-box {
            background: white; padding: 40px; border-radius: 20px;
            text-align: center; max-width: 400px; margin: 100px auto;
        }
        .pin-input {
            width: 100%; padding: 15px; font-size: 24px;
            text-align: center; border: 2px solid #ddd;
            border-radius: 10px; margin: 20px 0;
        }
        .login-btn {
            width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; padding: 15px;
            border-radius: 10px; font-size: 18px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-box" id="loginBox">
            <h2>🔐 تسجيل الدخول</h2>
            <p id="managerDisplay" style="color:#666;margin:10px 0;"></p>
            <input type="password" class="pin-input" id="pinInput" placeholder="••••" maxlength="4">
            <button class="login-btn" onclick="login()">دخول</button>
            <div id="errorMsg" style="color:#c62828;margin-top:10px;"></div>
        </div>
        
        <div id="dashboard" style="display:none;">
            <div class="header">
                <h1>📊 لوحة متابعة المشرفين</h1>
                <p id="managerName"></p>
            </div>
            <div class="weeks-grid" id="weeksGrid"></div>
            <div id="supervisorContent"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwxInh3-bCh03P9hAZXF5TiCTwO-llAqBP-vc_IUq6nNvn0fIz-TECeGJd_-FDXA6mg6A/exec';
        
        // ✅ قراءة اسم المدير من الرابط: /ali أو /fahd
        const path = window.location.pathname;
        const managerName = path.split('/').pop() || 'ali'; // افتراضي: ali
        
        document.getElementById('managerDisplay').textContent = 'مدير: ' + managerName;
        
        const weekNames = ['الأسبوع الأول', 'الأسبوع الثاني', 'الأسبوع الثالث', 'الأسبوع الرابع', 'الأسبوع الخامس', 'الأسبوع السادس', 'الأسبوع السابع', 'الأسبوع الثامن', 'الأسبوع التاسع', 'الأسبوع العاشر', 'الأسبوع الحادي عشر', 'الأسبوع الثاني عشر', 'الأسبوع الثالث عشر', 'الأسبوع الرابع عشر', 'الأسبوع الخامس عشر'];
        
        let currentData = null;

        async function login() {
            const pin = document.getElementById('pinInput').value;
            if (pin.length !== 4) {
                document.getElementById('errorMsg').textContent = 'أدخل 4 أرقام';
                return;
            }
            
            try {
                const res = await fetch(`${SCRIPT_URL}?action=verifyPin&pin=${pin}`);
                const data = await res.json();
                
                if (data.success && data.manager === managerName) {
                    currentData = data;
                    document.getElementById('loginBox').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('managerName').textContent = 'مدير: ' + data.manager;
                    createWeekButtons();
                    selectWeek(1);
                } else if (data.success && data.manager !== managerName) {
                    document.getElementById('errorMsg').textContent = '❌ هذا الرابط خاص بمدير آخر';
                } else {
                    document.getElementById('errorMsg').textContent = data.error || 'رقم خاطئ';
                }
            } catch (err) {
                document.getElementById('errorMsg').textContent = 'خطأ في الاتصال';
            }
        }

        function createWeekButtons() {
            const grid = document.getElementById('weeksGrid');
            for (let i = 1; i <= 15; i++) {
                const btn = document.createElement('button');
                btn.className = 'week-btn';
                btn.textContent = i;
                btn.onclick = () => selectWeek(i);
                btn.id = `week-${i}`;
                grid.appendChild(btn);
            }
        }

        function selectWeek(weekNum) {
            document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`week-${weekNum}`).classList.add('active');
            
            const weekName = weekNames[weekNum - 1];
            const container = document.getElementById('supervisorContent');
            let html = '';
            
            currentData.supervisors.forEach((supName, idx) => {
                const supData = currentData.supervisorsData.find(d => 
                    d.supervisor === supName && d.week === weekName
                );
                if (!supData) return;
                
                const phone = currentData.phones[supName] || '';
                const count = supData.count;
                const done = count;
                const pending = 0;
                const notDone = 44 - count;
                const isDone = count >= 44;
                
                html += `
                    <div class="supervisor-card">
                        <div class="supervisor-name">${supName}</div>
                        <div class="stats-grid">
                            <div class="stat-box not-done">
                                <div style="font-size:24px;font-weight:bold;">${notDone}</div>
                                <div>❌ لم ينفذ</div>
                            </div>
                            <div class="stat-box pending">
                                <div style="font-size:24px;font-weight:bold;">${pending}</div>
                                <div>⏳ جاري</div>
                            </div>
                            <div class="stat-box done">
                                <div style="font-size:24px;font-weight:bold;">${done}</div>
                                <div>✅ تم</div>
                            </div>
                        </div>
                        ${isDone ? `
                            <a href="https://forms.google.com" target="_blank" class="form-link active">
                                🔗 فتح الاستمارة
                            </a>
                        ` : `
                            <div class="form-link disabled">
                                🔗 غير متاح
                            </div>
                        `}
                        <textarea id="note-${idx}" class="note-box" rows="2" placeholder="✍️ ملاحظة..."></textarea>
                        ${phone ? `
                            <button class="whatsapp-btn" onclick="sendWhatsApp('${phone}', '${supName}', '${weekName}', ${count}, ${idx})">
                                📱 إرسال عبر واتساب
                            </button>
                        ` : ''}
                    </div>
                `;
            });
            
            container.innerHTML = html || '<div class="supervisor-card" style="text-align:center;">لا يوجد بيانات</div>';
        }

        function sendWhatsApp(phone, name, week, count, idx) {
            const note = document.getElementById(`note-${idx}`).value;
            let msg = `السلام عليكم ${name}،\n\n${week}: ${count} مؤشرات\n`;
            if (note) msg += `\nملاحظة: ${note}`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>

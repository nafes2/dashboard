<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a3a63; --success: #28a745; }
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 20px auto; padding: 15px; }
        .controls { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .progress-bg { background: #eee; border-radius: 10px; height: 12px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: var(--success); height: 100%; transition: width 0.5s; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; }
        .ind-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.9em; }
        .is-done { color: var(--success); font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2>📊 لوحة متابعة المشرفين</h2>
</div>

<div class="container">
    <div class="controls">
        <input type="checkbox" id="toggleView" onchange="renderUI()">
        <label for="toggleView" style="cursor:pointer">إظهار المؤشرات المنفذة (المكتملة)</label>
    </div>
    <div id="display">جاري التحميل...</div>
</div>

<script>
    // الرابط المباشر
    const url = 'https://docs.google.com/spreadsheets/d/1X-p1E6mK-M10B6Zsc56WlO2_Q2YhZ7L8G8Xp_vT8h7s/gviz/tq?tqx=out:csv';
    let dataStorage = [];

    async function loadData() {
        try {
            const r = await fetch(url);
            const text = await r.text();
            // تقسيم بسيط جداً لضمان عدم التعليق
            const lines = text.split('\n').slice(1);
            dataStorage = lines.map(l => l.split(',').map(c => c.replace(/"/g, '').trim()));
            renderUI();
        } catch (e) {
            document.getElementById('display').innerHTML = "خطأ في الاتصال";
        }
    }

    function renderUI() {
        const showAll = document.getElementById('toggleView').checked;
        const container = document.getElementById('display');
        container.innerHTML = '';
        
        const groups = {};
        dataStorage.forEach(cols => {
            const [name, status, task] = cols;
            if(!name) return;
            if(!groups[name]) groups[name] = { done: 0, list: [] };
            
            const finished = (status === "تم التنفيذ" || status === "جاري التنفيذ");
            if(finished) groups[name].done++;
            
            if(!finished || showAll) {
                groups[name].list.push({ task, status, finished });
            }
        });

        for (const name in groups) {
            const p = groups[name];
            const pct = ((p.done / 44) * 100).toFixed(1);
            
            let listH = p.list.map(i => `
                <div class="ind-item">
                    <span>${i.task}</span>
                    <span class="${i.finished ? 'is-done' : ''}">${i.status}</span>
                </div>`).join('');

            container.innerHTML += `
                <div class="card">
                    <div class="stats"><span>المشرف: ${name}</span><span>${pct}%</span></div>
                    <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
                    <div style="text-align:center; font-size:0.8em; margin-bottom:10px;">الإنجاز: ${p.done} / 44</div>
                    <div>${listH}</div>
                </div>`;
        }
    }

    loadData();
    setInterval(loadData, 60000);
</script>
</body>
</html>

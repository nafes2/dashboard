<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #1e3c72; color: #fff; margin: 0; padding: 15px; text-align: center; }
        .nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 20px 0; }
        .btn { background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; padding: 10px 15px; border-radius: 10px; cursor: pointer; }
        .btn.active { background: #ffd700; color: #1e3c72; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #fff; color: #333; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card h3 { margin: 0 0 10px 0; color: #1e3c72; }
        .stat-line { display: flex; justify-content: space-between; margin: 10px 0; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .progress-bar { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: #4caf50; width: 0%; transition: width 0.5s; }
        .total-box { background: #f0f4ff; padding: 10px; border-radius: 10px; margin-top: 10px; border: 1px solid #d1d9ff; }
    </style>
</head>
<body>

    <h1>📊 لوحة متابعة المشرفين</h1>
    <p>تحديث تلقائي من جوجل شيت</p>

    <div class="nav" id="weeksNav"></div>
    <div class="grid" id="cardsContainer">جارِ تحميل البيانات...</div>

<script>
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";
const PROXY = "https://api.allorigins.win/raw?url=";
let allRows = [];
let currentWeek = 1;

async function getData() {
    try {
        const res = await fetch(PROXY + encodeURIComponent(SHEET_CSV + "&t=" + new Date().getTime()));
        const text = await res.text();
        const lines = text.split("\n").filter(l => l.trim() !== "");
        const headers = lines[0].split(",").map(h => h.trim().replace(/"/g, ""));
        
        allRows = lines.slice(1).map(line => {
            const values = line.split(",").map(v => v.trim().replace(/"/g, ""));
            let obj = {};
            headers.forEach((h, i) => obj[h] = values[i]);
            return obj;
        });
        render();
    } catch (e) {
        document.getElementById("cardsContainer").innerHTML = "حدث خطأ في جلب البيانات. يرجى التحديث.";
    }
}

function render() {
    // رندرة الأزرار
    const nav = document.getElementById("weeksNav");
    nav.innerHTML = "";
    for(let i=1; i<=15; i++) {
        const b = document.createElement("button");
        b.className = `btn ${i === currentWeek ? 'active' : ''}`;
        b.textContent = i;
        b.onclick = () => { currentWeek = i; render(); };
        nav.appendChild(b);
    }

    // رندرة البطاقات
    const container = document.getElementById("cardsContainer");
    container.innerHTML = "";

    // البحث عن أسماء الأعمدة الصحيحة
    const firstRow = allRows[0];
    const nameCol = Object.keys(firstRow).find(k => k.includes("اسم المشرف"));
    const weekCol = Object.keys(firstRow).find(k => k.includes("الأسبوع"));
    const statusCol = Object.keys(firstRow).find(k => k.includes("الحالة"));

    // استخراج أسماء المشرفين الفريدين
    const supervisorNames = [...new Set(allRows.map(r => r[nameCol]))].filter(n => n);

    supervisorNames.forEach(name => {
        const supTotalRows = allRows.filter(r => r[nameCol] === name);
        const supTotalDone = supTotalRows.filter(r => r[statusCol] === "تم التنفيذ").length;
        
        const supWeekRows = supTotalRows.filter(r => {
            const w = r[weekCol] ? r[weekCol].replace(/[^0-9]/g, "") : "";
            return parseInt(w) === currentWeek;
        });

        if (supWeekRows.length > 0) {
            const weekDone = supWeekRows.filter(r => r[statusCol] === "تم التنفيذ").length;
            const weekTotal = supWeekRows.length;
            const weekPerc = ((weekDone / weekTotal) * 100).toFixed(1);
            const totalPerc = ((supTotalDone / 44) * 100).toFixed(1);

            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <h3>${name}</h3>
                <div class="stat-line"><span>تم (الأسبوع ${currentWeek})</span><span>${weekDone}</span></div>
                <div class="stat-line"><span>جاري (الأسبوع ${currentWeek})</span><span>${weekTotal - weekDone}</span></div>
                <div class="progress-bar"><div class="progress-fill" style="width: ${weekPerc}%"></div></div>
                <p style="font-size: 12px; color: #666;">نسبة إنجاز الأسبوع: ${weekPerc}%</p>
                
                <div class="total-box">
                    <div class="stat-line" style="color: #1e3c72;"><span>إجمالي المنفذ (44)</span><span>${supTotalDone}</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${totalPerc}%; background: #9c27b0;"></div></div>
                    <p style="font-size: 12px; color: #666;">النسبة التراكمية: ${totalPerc}%</p>
                </div>
            `;
            container.appendChild(card);
        }
    });
}

getData();
</script>
</body>
</html>

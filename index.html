<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة متابعة المشرفين</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:#fff; min-height:100vh; padding:20px; }
.container { max-width:1200px; margin:0 auto; }
header { text-align:center; padding:20px 0; }
header h1 { font-size:2em; margin-bottom:10px; text-shadow:2px 2px 4px rgba(0,0,0,0.3); }
header p { opacity:0.9; font-size:1.1em; }

.login-section {
  max-width:400px;
  margin:50px auto;
  background:rgba(255,255,255,0.15);
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(10px);
  text-align:center;
  border:1px solid rgba(255,255,255,0.3);
  box-shadow:0 8px 32px rgba(0,0,0,0.3);
}
.login-section h2 {
  margin-bottom:30px;
  font-size:1.8em;
}
.pin-input {
  width:100%;
  padding:15px;
  font-size:18px;
  border:2px solid rgba(255,255,255,0.3);
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  color:#fff;
  text-align:center;
  margin-bottom:20px;
  outline:none;
}
.pin-input::placeholder { color:rgba(255,255,255,0.6); }
.login-btn {
  width:100%;
  padding:15px;
  background:#ffd700;
  color:#333;
  border:none;
  border-radius:10px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  transition:all 0.3s;
}
.login-btn:hover { transform:scale(1.02); box-shadow:0 4px 15px rgba(255,215,0,0.4); }
.login-btn:disabled { opacity:0.7; cursor:not-allowed; }
.error-message {
  color:#ff6b6b;
  margin-top:15px;
  font-weight:bold;
  display:none;
}

.loading { text-align:center; padding:60px 20px; }
.spinner {
  width:50px; height:50px;
  border:4px solid rgba(255,255,255,0.3);
  border-top-color:#ffd700;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:0 auto 20px;
}
@keyframes spin { to { transform:rotate(360deg); } }

.dashboard { display:none; }
.manager-bar {
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:15px;
  margin-bottom:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.manager-name { font-size:1.5em; font-weight:bold; }
.logout-btn {
  background:#ff6b6b; color:#fff; border:none;
  padding:10px 25px; border-radius:20px;
  cursor:pointer; font-weight:bold;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(350px, 1fr));
  gap:20px;
}
.card {
  background:#fff; color:#333;
  border-radius:15px;
  padding:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.2);
}
.card-header {
  text-align:center;
  margin-bottom:15px;
  padding-bottom:15px;
  border-bottom:2px solid #eee;
}
.card-header h3 { color:#667eea; font-size:1.3em; margin-bottom:5px; }
.phone-badge {
  display:inline-block;
  background:#e3f2fd; color:#1976d2;
  padding:5px 12px; border-radius:15px;
  font-size:0.85em;
  direction:ltr;
}

.stats-grid {
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:10px;
  margin:15px 0;
}
.stat-box { text-align:center; padding:10px; border-radius:10px; font-size:0.9em; }
.stat-box.done { background:#d4edda; color:#155724; }
.stat-box.pending { background:#fff3cd; color:#856404; }
.stat-box.not-done { background:#f8d7da; color:#721c24; }
.stat-number { font-size:1.5em; font-weight:bold; display:block; }

.progress-section { margin:15px 0; }
.progress-label { display:flex; justify-content:space-between; margin-bottom:5px; font-weight:600; }
.progress { background:#e0e0e0; height:25px; border-radius:12px; overflow:hidden; }
.bar { height:100%; border-radius:12px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:bold; font-size:12px; }
.bar.high { background:linear-gradient(90deg, #28a745, #34ce57); }
.bar.medium { background:linear-gradient(90deg, #ffc107, #ffdb58); }
.bar.low { background:linear-gradient(90deg, #dc3545, #e74c3c); }

.form-section { margin:15px 0; padding:15px; background:#f8f9fa; border-radius:10px; text-align:center; }
.form-link-btn { display:inline-block; background:#007bff; color:#fff; padding:10px 25px; border-radius:20px; text-decoration:none; font-weight:600; }
.form-link-disabled { display:inline-block; background:#ccc; color:#666; padding:10px 25px; border-radius:20px; }

.notes-section { margin:15px 0; padding:15px; background:#fff3cd; border-radius:10px; }
.notes-title { font-weight:bold; color:#856404; margin-bottom:10px; }
.notes-input { width:100%; padding:10px; border:1px solid #ffeaa7; border-radius:8px; min-height:60px; resize:vertical; }
.send-btn { width:100%; margin-top:10px; padding:10px; background:#25d366; color:#fff; border:none; border-radius:8px; font-weight:600; cursor:pointer; }

.empty-state { text-align:center; padding:60px 20px; }
.empty-state-icon { font-size:4em; margin-bottom:20px; }

@media (max-width:768px) {
  .grid { grid-template-columns:1fr; }
  .login-section { padding:30px 20px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📊 لوحة متابعة المشرفين</h1>
    <p>متابعة تنفيذ المؤشرات الأسبوعية</p>
  </header>

  <div id="loginSection" class="login-section">
    <h2>🔐 تسجيل الدخول</h2>
    <input type="password" id="pinInput" class="pin-input" placeholder="أدخل الرقم السري" maxlength="10">
    <button onclick="login()" class="login-btn" id="loginBtn">دخول</button>
    <div id="loading" class="loading" style="display:none;">
      <div class="spinner"></div>
      <p>جاري التحميل...</p>
    </div>
    <p id="errorMessage" class="error-message"></p>
  </div>

  <div id="dashboard" class="dashboard">
    <div class="manager-bar">
      <div class="manager-name">👤 المدير: <span id="managerName"></span></div>
      <button onclick="logout()" class="logout-btn">خروج</button>
    </div>
    <div class="grid" id="cards"></div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwB5qla_rDpo4oqhMW4n-7IJ49NZNS8Q-Xy8hnFsgMiw1B48XinMc-SRmvXge6oQhhCYQ/exec';

function login() {
  var pin = document.getElementById('pinInput').value.trim();
  var errorMsg = document.getElementById('errorMessage');
  var btn = document.getElementById('loginBtn');
  var loading = document.getElementById('loading');

  if (!pin) {
    errorMsg.innerHTML = 'الرجاء إدخال الرقم السري';
    errorMsg.style.display = 'block';
    return;
  }

  errorMsg.style.display = 'none';
  btn.style.display = 'none';
  loading.style.display = 'block';

  // إنشاء script tag للـ JSONP
  var script = document.createElement('script');
  var callbackName = 'cb_' + Date.now();
  
  window[callbackName] = function(data) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('loginBtn').style.display = 'block';
    
    if (data.success) {
      showDashboard(data);
    } else {
      errorMsg.innerHTML = data.error || 'رقم سري غير صحيح';
      errorMsg.style.display = 'block';
    }
    
    // حذف الـ script بعد الاستخدام
    if (script.parentNode) {
      document.head.removeChild(script);
    }
    delete window[callbackName];
  };

  script.src = SCRIPT_URL + '?action=verifyPin&pin=' + encodeURIComponent(pin) + '&callback=' + callbackName;
  
  script.onerror = function() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('loginBtn').style.display = 'block';
    errorMsg.innerHTML = '❌ خطأ في الاتصال بالخادم';
    errorMsg.style.display = 'block';
    if (script.parentNode) {
      document.head.removeChild(script);
    }
  };
  
  document.head.appendChild(script);
}

function showDashboard(data) {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('managerName').textContent = data.manager;

  var container = document.getElementById('cards');
  var supervisors = data.supervisors || [];
  var phones = data.phones || {};
  var dashData = data.dashboardData || {};
  var formLinks = data.formLinks || {};

  if (supervisors.length === 0) {
    container.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">📭</div><h3>لا يوجد مشرفون مسجلون</h3></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < supervisors.length; i++) {
    var name = supervisors[i];
    var phone = phones[name] || '';
    var cleanPhone = phone.replace(/\D/g, '');
    var d = dashData[name] || {};
    var formLink = formLinks[name] || '';

    var total = d.total || 0;
    var done = d.done || 0;
    var pending = d.pending || 0;
    var notDone = d.notDone || 0;
    var percent = d.percent || 0;

    var barClass = percent >= 70 ? 'high' : (percent >= 40 ? 'medium' : 'low');

    html += '<div class="card">';
    html += '<div class="card-header">';
    html += '<h3>' + name + '</h3>';
    html += '<span class="phone-badge">📱 ' + (phone || 'لا يوجد') + '</span>';
    html += '</div>';

    html += '<div class="stats-grid">';
    html += '<div class="stat-box done"><span class="stat-number">' + done + '</span><div>✅ تم</div></div>';
    html += '<div class="stat-box pending"><span class="stat-number">' + pending + '</span><div>⏳ جاري</div></div>';
    html += '<div class="stat-box not-done"><span class="stat-number">' + notDone + '</span><div>❌ لم ينفذ</div></div>';
    html += '</div>';

    html += '<div class="progress-section">';
    html += '<div class="progress-label"><span>

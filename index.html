<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المؤشرات</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        .card { background: white; border-radius: 10px; padding: 20px; width: 280px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-top: 5px solid #1e3c72; text-align: right; }
        .btn { padding: 10px; margin: 5px; cursor: pointer; background: #1e3c72; color: white; border: none; border-radius: 5px; }
        #status { padding: 20px; color: #1e3c72; font-weight: bold; }
    </style>
</head>
<body>
    <h2>لوحة متابعة المؤشرات</h2>
    <div id="weeks-nav"></div>
    <div id="status">⏳ جاري محاولة جلب البيانات بطريقة بديلة...</div>
    <div id="container" class="card-container"></div>

<script>
    // الرابط الخاص بك
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKe9F_Auy-WCMrXomu2SRAjuGLcbUY-UdbyknLLfGoG4ewC02vCzcn7SubUvyr-vzjg/exec";
    
    // الخدعة: استخدام وسيط لتخطي حماية المتصفح
    const PROXY_URL = "https://api.allorigins.win/get?url=" + encodeURIComponent(SCRIPT_URL);

    let allData = [];

    async function loadData() {
        try {
            const response = await fetch(PROXY_URL);
            const result = await response.json();
            // البيانات تكون داخل result.contents ولكنها نص، نحولها لكائن
            allData = JSON.parse(result.contents);
            
            document.getElementById('status').style.display = 'none';
            createWeekButtons();
            showWeek(5); // عرض الأسبوع 5 تلقائياً
        } catch (error) {
            document.getElementById('status').innerHTML = "❌ تعذر جلب البيانات. جرب تحديث الصفحة.";
            console.error(error);
        }
    }

    function createWeekButtons() {
        const nav = document.getElementById('weeks-nav');
        for (let i = 1; i <= 15; i++) {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = "أسبوع " + i;
            btn.onclick = () => showWeek(i);
            nav.appendChild(btn);
        }
    }

    function showWeek(weekNum) {
        const container = document.getElementById('container');
        container.innerHTML = "";
        
        const filtered = allData.filter(row => String(row["الأسابيع"]).includes(String(weekNum)));

        if (filtered.length === 0) {
            container.innerHTML = "<h3>لا توجد بيانات للأسبوع " + weekNum + "</h3>";
            return;
        }

        filtered.forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <h3 style="color:#1e3c72">${item["اسم المشرف"] || "مشرف"}</h3>
                    <p><b>تم التنفيذ:</b> ${item["تم التنفيذ"] || 0}</p>
                    <p><b>نسبة الأسبوع:</b> ${Math.round((item["نسبة الأسبوع"] || 0) * 100)}%</p>
                    <a href="${item["رابط"] || '#'}" target="_blank" style="display:block; text-align:center; background:#28a745; color:white; padding:8px; text-decoration:none; border-radius:5px;">فتح النموذج</a>
                </div>`;
        });
    }

    loadData();
</script>
</body>
</html>

<script>

// ===== الوسطاء =====
const PROXIES = [
  "https://api.allorigins.win/raw?url=",
  "https://corsproxy.io/?",
  "https://api.codetabs.com/v1/proxy?quest="
];

const SHEET_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";

let appData = { allData: [] };


// ===== التحميل الذكي السريع =====
async function loadData() {

  document.getElementById("weeks").innerHTML = `
    <div class="loading">
      <div class="spinner"></div>
      <p>جاري الاتصال بالخادم...</p>
    </div>
  `;

  // ===== المحاولة 1: اتصال مباشر =====
  try {
    const res = await fetch(SHEET_URL + "&t=" + Date.now());
    if (res.ok) {
      const text = await res.text();
      if (!text.includes("<!DOCTYPE")) {
        appData.allData = parseCSV(text);
        render();
        updateTimestamp();
        return;
      }
    }
  } catch (e) {}

  // ===== المحاولة 2: جميع البروكسيات معاً =====
  try {

    const requests = PROXIES.map(p =>
      fetchWithProxy(p).catch(() => null)
    );

    const results = await Promise.all(requests);
    const data = results.find(d => d && d.length);

    if (!data) throw new Error();

    appData.allData = data;

    render();
    updateTimestamp();

  } catch {
    showError("فشل الاتصال");
  }
}


// ===== جلب عبر بروكسي =====
async function fetchWithProxy(proxy) {

  const url = proxy + encodeURIComponent(SHEET_URL + "&t=" + Date.now());

  const res = await fetch(url, { headers: { Accept: "text/csv" } });

  if (!res.ok) throw new Error();

  const text = await res.text();

  if (text.includes("<!DOCTYPE")) throw new Error();

  return parseCSV(text);
}


// ===== تحويل CSV =====
function parseCSV(csv) {

  const lines = csv.trim().split("\n");
  const headers = lines[0].split(",");

  return lines.slice(1).map(line => {
    const vals = line.split(",");
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = vals[i]?.trim());
    return obj;
  });

}


// ===== عرض =====
function render() {

  const cards = document.getElementById("cards");
  cards.innerHTML = "";

  appData.allData.forEach(row => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${row["اسم المشرف"] || "بدون اسم"}</h3>
      <p>الأسبوع: ${row["الأسبوع"] || "-"}</p>
      <p>الحالة: ${row["الحالة"] || "-"}</p>
    `;

    cards.appendChild(div);

  });

  document.getElementById("footer").style.display = "block";
}


// ===== أخطاء =====
function showError(msg) {
  document.getElementById("weeks").innerHTML =
    <h3 style="color:#ff5252">${msg}</h3>;
}


// ===== وقت التحديث =====
function updateTimestamp() {
  document.getElementById("updateTime").textContent =
    new Date().toLocaleTimeString('ar-SA', {
      hour: '2-digit',
      minute: '2-digit'
    });
}


// تشغيل
loadData();

</script>

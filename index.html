<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين - النسخة المطورة</title>
    <style>
        :root {
            --primary-bg: #1e3c72;
            --secondary-bg: #2a5298;
            --accent-color: #ffd700;
            --card-white: #ffffff;
            --text-dark: #333333;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary-bg) 0%, var(--secondary-bg) 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        /* صفحة الدخول */
        .login-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .login-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .pin-input {
            width: 220px;
            padding: 15px;
            font-size: 28px;
            text-align: center;
            border: none;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.95);
            color: var(--text-dark);
            margin-bottom: 25px;
            letter-spacing: 8px;
            font-weight: bold;
        }

        .login-btn {
            background: var(--accent-color);
            color: var(--primary-bg);
            border: none;
            padding: 15px 50px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:active { transform: scale(0.95); }

        /* لوحة التحكم */
        header { text-align: center; padding: 20px 0 40px; }
        
        .manager-badge {
            background: var(--accent-color);
            color: var(--primary-bg);
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            display: inline-block;
            margin: 15px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn-group { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }

        .action-btn {
            padding: 10px 25px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
        }

        .refresh-btn { background-color: #4caf50; }
        .logout-btn { background-color: rgba(255, 255, 255, 0.2); }

        .supervisors-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .supervisor-card {
            background: var(--card-white);
            color: var(--text-dark);
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s;
        }

        .supervisor-card:hover { transform: translateY(-5px); }

        .card-header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #f0f4f8;
            padding-bottom: 15px;
        }

        .card-header h3 { color: var(--primary-bg); margin-bottom: 5px; }

        .week-tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
            padding: 12px 5px;
            border-radius: 15px;
        }

        .stat-val { font-size: 1.5em; font-weight: 800; display: block; }
        .stat-label { font-size: 0.75em; opacity: 0.8; font-weight: 600; }

        .total-bg { background: #e8eaf6; color: #3f51b5; }
        .pending-bg { background: #fff3e0; color: #ef6c00; }
        .done-bg { background: #e8f5e9; color: #2e7d32; }

        /* شريط التقدم */
        .progress-container { margin-top: 15px; }
        .progress-bar {
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-fill { height: 100%; transition: width 0.5s ease-out; }

        /* الملاحظات */
        .notes-area {
            margin-top: 20px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 15px;
        }
        .notes-input {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            resize: none;
            font-family: inherit;
        }
        .wa-btn {
            width: 100%;
            background: #25d366;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .loading-screen { text-align: center; padding: 50px; }
        .error-msg { color: #ff5252; margin-top: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="loginPage" class="login-page">
        <div class="login-box">
            <h2 style="margin-bottom: 10px;">أهلاً بك</h2>
            <p style="margin-bottom: 25px; opacity: 0.8;">الرجاء إدخال الرمز السري للمتابعة</p>
            <input type="password" id="pinInput" class="pin-input" maxlength="4" placeholder="••••">
            <br>
            <button onclick="handleLogin()" class="login-btn">دخول النظام</button>
            <p id="loginError" class="error-msg"></p>
        </div>
    </div>

    <div id="dashboardPage" style="display: none;">
        <header>
            <h1>لوحة إحصائيات المشرفين</h1>
            <div id="managerBadge" class="manager-badge"></div>
            <div class="btn-group">
                <button onclick="fetchData()" class="action-btn refresh-btn">🔄 تحديث البيانات</button>
                <button onclick="handleLogout()" class="action-btn logout-btn">🚪 خروج</button>
            </div>
        </header>

        <div id="loadingStatus" class="loading-screen" style="display: none;">
            <p>جاري جلب البيانات من شيت Dashboard...</p>
        </div>

        <div id="cardsGrid" class="supervisors-grid">
            </div>
    </div>
</div>

<script>
    // الرابط الذي قمت بنشره (النسخة المحدثة)
    const APP_URL = "https://script.google.com/macros/s/AKfycbyvyQP7J3OK3zgqXEYXGam3poDyUyS83lp9tfxdV0tf2Bdi1rjVktNuYuOR7fufs15cew/exec";

    let state = {
        manager: "",
        allowedSupervisors: [],
        phones: {},
        allStats: []
    };

    // وظيفة الاتصال بالسكربت (JSONP لترخيص الوصول)
    function callScript(params) {
        return new Promise((resolve, reject) => {
            const callbackName = 'jsonp_cb_' + Math.round(Math.random() * 1000000);
            window[callbackName] = (data) => {
                delete window[callbackName];
                document.body.removeChild(script);
                resolve(data);
            };

            const script = document.createElement('script');
            const url = new URL(APP_URL);
            Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
            url.searchParams.append('callback', callbackName);
            
            script.src = url.toString();
            script.onerror = () => reject(new Error("خطأ في الاتصال بالخادم"));
            document.body.appendChild(script);
        });
    }

    async function handleLogin() {
        const pin = document.getElementById('pinInput').value;
        const errorEl = document.getElementById('loginError');
        if (!pin) return;

        errorEl.style.display = 'none';
        
        try {
            const res = await callScript({ action: 'verifyPin', pin: pin });
            if (res.success) {
                state.manager = res.manager;
                state.allowedSupervisors = res.supervisors;
                state.phones = res.phones;

                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboardPage').style.display = 'block';
                document.getElementById('managerBadge').textContent = "👤 المدير: " + res.manager;
                
                fetchData();
            } else {
                errorEl.textContent = res.error;
                errorEl.style.display = 'block';
            }
        } catch (e) {
            errorEl.textContent = "عذراً، فشل الاتصال بالسكربت";
            errorEl.style.display = 'block';
        }
    }

    async function fetchData() {
        const grid = document.getElementById('cardsGrid');
        const loader = document.getElementById('loadingStatus');
        
        grid.innerHTML = "";
        loader.style.display = "block";

        try {
            const data = await callScript({ action: 'dashboard' });
            state.allStats = data || [];
            renderCards();
        } catch (e) {
            grid.innerHTML = "<p style='color:red; grid-column:1/-1; text-align:center;'>فشل تحديث البيانات، يرجى المحاولة لاحقاً</p>";
        } finally {
            loader.style.display = "none";
        }
    }

    function renderCards() {
        const grid = document.getElementById('cardsGrid');
        
        // تصفية البيانات لعرض المشرفين التابعين لهذا المدير فقط
        const mySupervisorsData = state.allStats.filter(row => 
            state.allowedSupervisors.includes(row[1])
        );

        if (mySupervisorsData.length === 0) {
            grid.innerHTML = `
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; background: rgba(255,255,255,0.1); border-radius: 20px;">
                    <p>لا توجد بيانات مسجلة لمشرفيك في شيت Dashboard لهذا الأسبوع.</p>
                </div>`;
            return;
        }

        mySupervisorsData.forEach((row, index) => {
            const week = row[0];   // قادم من C1 في شيت Responses
            const name = row[1];   // اسم المشرف
            const total = parseInt(row[2]) || 0;
            const done = parseInt(row[3]) || 0;
            const pending = total - done;
            const progress = total > 0 ? Math.round((done / total) * 100) : 0;
            const phone = state.phones[name] || "";

            const card = document.createElement('div');
            card.className = 'supervisor-card';
            card.innerHTML = `
                <div class="card-header">
                    <h3>${name}</h3>
                    <span class="week-tag">${week}</span>
                </div>
                <div class="stats-grid">
                    <div class="stat-item total-bg">
                        <span class="stat-val">${total}</span>
                        <span class="stat-label">الإجمالي</span>
                    </div>
                    <div class="stat-item pending-bg">
                        <span class="stat-val">${pending}</span>
                        <span class="stat-label">المتبقي</span>
                    </div>
                    <div class="stat-item done-bg">
                        <span class="stat-val">${done}</span>
                        <span class="stat-label">المنجز</span>
                    </div>
                </div>
                <div class="progress-container">
                    <div style="display:flex; justify-content:space-between; font-size:0.85em; font-weight:bold;">
                        <span>نسبة الإنجاز</span>
                        <span>${progress}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${progress}%; background:${progress > 80 ? '#4caf50' : '#ff9800'}"></div>
                    </div>
                </div>
                <div class="notes-area">
                    <textarea id="note-${index}" class="notes-input" rows="2" placeholder="أضف ملاحظات للمشرف هنا..."></textarea>
                    <button onclick="sendWhatsApp('${name}', '${phone}', ${index})" class="wa-btn">💬 إرسال عبر واتساب</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function sendWhatsApp(name, phone, idx) {
        const note = document.getElementById('note-' + idx).value;
        if (!note) return alert("يرجى كتابة ملاحظة أولاً");
        
        const message = encodeURIComponent(`مرحباً أ/ ${name}\n\nملاحظة بخصوص تقريرك من المدير ${state.manager}:\n"${note}"`);
        window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
    }

    function handleLogout() {
        location.reload();
    }

    // السماح بالدخول عند الضغط على Enter
    document.getElementById('pinInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleLogin();
    });
</script>

</body>
</html>

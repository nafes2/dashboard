<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>لوحة متابعة المشرفين</title>
<style>
/* تنسيقات محسنة للجوال */
* { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: linear-gradient(135deg,#1e3c72 0%,#2a5298 100%); color:#fff; min-height:100vh; padding:15px; }
.container { max-width:1200px; margin:0 auto; }
header { text-align:center; padding:15px 0; }
header h1 { font-size:1.6em; margin-bottom:8px; }
.nav { display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; margin:20px 0; }
.btn { background: rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:#fff; padding:10px 5px; border-radius:12px; cursor:pointer; font-weight:600; font-size:14px; transition: 0.3s; }
.btn.active { background:#ffd700; color:#1e3c72; border-color:#ffd700; box-shadow:0 4px 12px rgba(255,215,0,0.3); }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:15px; }
.card { background:#fff; color:#333; border-radius:18px; padding:20px; box-shadow:0 8px 25px rgba(0,0,0,0.2); }
.card-header { text-align:center; margin-bottom:12px; border-bottom:1px solid #eee; padding-bottom:8px; }
.card-header h3 { color:#1e3c72; font-size:1.2em; }
.stats-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:15px 0; }
.stat-box { text-align:center; padding:8px; border-radius:10px; }
.stat-box.done { background:#e8f5e9; color:#2e7d32; }
.stat-box.pending { background:#fff3e0; color:#ef6c00; }
.stat-box.total { background:#e3f2fd; color:#1565c0; }
.stat-number { font-size:1.2em; font-weight:bold; display:block; }
.stat-label { font-size:0.75em; font-weight:600; }
.link-btn { display:block; text-align:center; background:#2a5298; color:#fff; padding:12px; border-radius:10px; text-decoration:none; font-weight:bold; font-size:0.9em; margin-top:10px; }
.loading { text-align:center; padding:40px; }
.error-box { background:#ff5252; padding:20px; border-radius:12px; text-align:center; margin:10px; }
.retry-btn { background:#fff; color:#ff5252; border:none; padding:8px 20px; border-radius:20px; cursor:pointer; font-weight:bold; margin-top:10px; }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>📊 لوحة متابعة المشرفين</h1>
    <p style="font-size:0.9em; opacity:0.8;">تحديث تلقائي من جوجل شيت</p>
  </header>

  <div class="nav" id="weeks"></div>
  <div id="cards_container">
    <div class="grid" id="cards">
      <div class="loading">جاري الاتصال بقاعدة البيانات...</div>
    </div>
  </div>
</div>

<script>
// الرابط المباشر لملف الـ CSV
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";

// قائمة الوسطاء (Proxies) لضمان العمل على الجوال
const PROXIES = [
  "https://api.allorigins.win/raw?url=",
  "https://corsproxy.io/?",
  "" // محاولة أخيرة بدون وسيط
];

let appData = { allData: [], currentWeek: 5 };

async function loadData(proxyIndex = 0) {
  if (proxyIndex === 0) {
    document.getElementById("cards").innerHTML = `<div class="loading">جاري المزامنة...</div>`;
  }

  try {
    const timestamp = new Date().getTime();
    const targetUrl = CSV_URL + "&cb=" + timestamp;
    const finalUrl = PROXIES[proxyIndex] + encodeURIComponent(targetUrl);
    
    const res = await fetch(proxyIndex === 2 ? targetUrl : finalUrl);
    if (!res.ok) throw new Error();
    
    const text = await res.text();
    if (text.length < 50) throw new Error();

    appData.allData = parseCSV(text);
    render();
  } catch (err) {
    // إذا فشل الوسيط الأول، جرب الوسيط الثاني تلقائياً
    if (proxyIndex < PROXIES.length - 1) {
      console.log("التبديل لوسيط بيانات آخر...");
      loadData(proxyIndex + 1);
    } else {
      document.getElementById("cards").innerHTML = `
        <div class="error-box">
          <p>⚠️ تعذر الاتصال بالبيانات من الجوال</p>
          <button class="retry-btn" onclick="location.reload()">🔄 إعادة تحميل الصفحة</button>
        </div>`;
    }
  }
}

function parseCSV(csv) {
  const lines = csv.split(/\r?\n/);
  const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
  return lines.slice(1).filter(l => l.length > 5).map(line => {
    const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
    let row = {};
    headers.forEach((h, i) => row[h] = values[i] || "");
    return row;
  });
}

function weekTextToNumber(text) {
  if (!text) return null;
  const t = text.toString().trim();
  const num = parseInt(t.replace(/[^0-9]/g, ''));
  if (!isNaN(num)) return num;
  const names = ["الأول","الثاني","الثالث","الرابع","الخامس","السادس","السابع","الثامن","التاسع","العاشر"];
  for(let i=0; i<names.length; i++) { if(t.includes(names[i])) return i+1; }
  return null;
}

function render() {
  const nav = document.getElementById("weeks");
  nav.innerHTML = "";
  for(let i=1; i<=15; i++) {
    const btn = document.createElement("button");
    btn.className = "btn" + (i === appData.currentWeek ? " active" : "");
    btn.textContent = i;
    btn.onclick = () => { appData.currentWeek = i; render(); };
    nav.appendChild(btn);
  }

  const container = document.getElementById("cards");
  container.innerHTML = "";
  
  const sample = appData.allData[0];
  const nameCol = Object.keys(sample).find(k => k.includes("اسم المشرف")) || Object.keys(sample)[1];
  const weekCol = Object.keys(sample).find(k => k.includes("الأسبوع")) || Object.keys(sample)[0];
  const statusCol = Object.keys(sample).find(k => k.includes("الحالة")) || "";

  const weekData = appData.allData.filter(row => weekTextToNumber(row[weekCol]) === appData.currentWeek);

  if (weekData.length === 0) {
    container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:30px; opacity:0.8;">لا توجد بيانات للأسبوع ${appData.currentWeek}</div>`;
    return;
  }

  const supervisors = {};
  weekData.forEach(row => {
    const name = row[nameCol];
    if (!name) return;
    if (!supervisors[name]) supervisors[name] = { name, done:0, pending:0, total:0, link:"#" };
    supervisors[name].total++;
    if (row[statusCol] === "تم التنفيذ") supervisors[name].done++;
    else supervisors[name].pending++;
    for (let v of Object.values(row)) { if(v.toString().startsWith("http")) supervisors[name].link = v; }
  });

  Object.values(supervisors).forEach(sup => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-header"><h3>${sup.name}</h3></div>
      <div class="stats-grid">
        <div class="stat-box done"><span class="stat-number">${sup.done}</span><span class="stat-label">تم</span></div>
        <div class="stat-box pending"><span class="stat-number">${sup.pending}</span><span class="stat-label">جاري</span></div>
        <div class="stat-box total"><span class="stat-number">${sup.total}</span><span class="stat-label">المجموع</span></div>
      </div>
      <a href="${sup.link}" target="_blank" class="link-btn ${sup.link==='#'?'disabled':''}">🔗 فتح الرابط</a>`;
    container.appendChild(card);
  });
}

loadData();
</script>
</body>
</html>

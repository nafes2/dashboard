<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #1e3c72; color: #fff; margin: 0; padding: 15px; }
        .nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin: 20px 0; }
        .btn { background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; padding: 10px; border-radius: 10px; cursor: pointer; min-width: 45px; }
        .btn.active { background: #ffd700; color: #1e3c72; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .card { background: #fff; color: #333; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card h3 { margin: 0 0 15px 0; color: #1e3c72; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .stat-row { display: flex; justify-content: space-between; margin: 8px 0; font-weight: bold; }
        .progress-container { margin: 15px 0; text-align: right; }
        .progress-bar { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; width: 0%; transition: width 0.5s; }
        .total-box { background: #f0f4ff; padding: 15px; border-radius: 12px; margin-top: 15px; border: 1px solid #d1d9ff; text-align: center; }
        .link-btn { display: block; background: #2a5298; color: #fff; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

    <h2 style="text-align:center;">📊 لوحة متابعة المشرفين</h2>
    <div class="nav" id="weeksNav"></div>
    <div class="grid" id="cardsContainer">جارِ التحميل...</div>

<script>
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";
const PROXY = "https://api.allorigins.win/raw?url=";
let allData = [];
let currentWeek = 5; // الأسبوع الحالي

async function loadData() {
    try {
        const res = await fetch(PROXY + encodeURIComponent(SHEET_CSV + "&t=" + Date.now()));
        const text = await res.text();
        const lines = text.split("\n").filter(l => l.trim() !== "");
        const headers = lines[0].split(",").map(h => h.trim().replace(/"/g, ""));
        
        allData = lines.slice(1).map(line => {
            const values = line.split(",").map(v => v.trim().replace(/"/g, ""));
            let obj = {};
            headers.forEach((h, i) => obj[h] = values[i]);
            return obj;
        });
        render();
    } catch (e) {
        document.getElementById("cardsContainer").innerHTML = "حدث خطأ في الاتصال بالبيانات";
    }
}

function render() {
    const nav = document.getElementById("weeksNav");
    nav.innerHTML = "";
    for(let i=1; i<=15; i++) {
        const b = document.createElement("button");
        b.className = `btn ${i === currentWeek ? 'active' : ''}`;
        b.textContent = i;
        b.onclick = () => { currentWeek = i; render(); };
        nav.appendChild(b);
    }

    const container = document.getElementById("cardsContainer");
    container.innerHTML = "";

    const nameCol = Object.keys(allData[0]).find(k => k.includes("اسم المشرف"));
    const weekCol = Object.keys(allData[0]).find(k => k.includes("الأسبوع"));
    const statusCol = Object.keys(allData[0]).find(k => k.includes("الحالة"));

    const names = [...new Set(allData.map(r => r[nameCol]))].filter(n => n);

    names.forEach(name => {
        const myRows = allData.filter(r => r[nameCol] === name);
        const totalDone = myRows.filter(r => r[statusCol] === "تم التنفيذ").length;
        
        // البحث عن الأسبوع سواء كان رقماً أو نصاً
        const weekRows = myRows.filter(r => {
            const val = r[weekCol] || "";
            return val.includes(currentWeek.toString());
        });

        if (weekRows.length > 0) {
            const wDone = weekRows.filter(r => r[statusCol] === "تم التنفيذ").length;
            const wTotal = weekRows.length;
            const wPerc = ((wDone / wTotal) * 100).toFixed(1);
            const tPerc = ((totalDone / 44) * 100).toFixed(1);
            let link = "#";
            for(let key in weekRows[0]) { if(weekRows[0][key].startsWith("http")) link = weekRows[0][key]; }

            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <h3>${name}</h3>
                <div class="stat-row"><span>✅ تم التنفيذ:</span><span>${wDone}</span></div>
                <div class="stat-row"><span>⏳ جاري التنفيذ:</span><span>${wTotal - wDone}</span></div>
                <div class="stat-row"><span>📋 إجمالي الأسبوع:</span><span>${wTotal}</span></div>
                
                <div class="progress-container">
                    <div style="display:flex; justify-content:space-between; font-size:12px;">
                        <span>إنجاز الأسبوع ${currentWeek}</span><span>${wPerc}%</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${wPerc}%; background:#4caf50;"></div></div>
                </div>

                <div class="total-box">
                    <div style="font-size:14px; font-weight:bold; color:#1e3c72; margin-bottom:5px;">إجمالي المؤشرات (تراكمي)</div>
                    <div style="font-size:24px; font-weight:bold;">${totalDone} <span style="font-size:14px; color:#666;">من 44</span></div>
                    <div class="progress-bar" style="height:8px;"><div class="progress-fill" style="width:${tPerc}%; background:#9c27b0;"></div></div>
                    <div style="font-size:11px; margin-top:5px; color:#666;">النسبة الكلية: ${tPerc}%</div>
                </div>

                <a href="${link}" target="_blank" class="link-btn">🔗 فتح الرابط</a>
            `;
            container.appendChild(card);
        }
    });
}

loadData();
</script>
</body>
</html>

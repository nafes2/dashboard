<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين - اتصال مباشر</title>
    <style>
        :root { --primary: #1e3c72; --secondary: #2a5298; --accent: #ffd700; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: var(--white); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; }
        .nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 25px 0; }
        .btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); color: #fff; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: 600; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn.active { background: var(--accent); color: var(--primary); border-color: var(--accent); shadow: 0 4px 15px rgba(255,215,0,0.4); }
        .card { background: #fff; color: #333; border-radius: 25px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); margin-top: 20px; }
        .card-header { text-align: center; margin-bottom: 20px; }
        .card-header h2 { color: var(--primary); font-size: 1.8em; }
        .week-badge { background: #e3f2fd; color: #1565c0; padding: 5px 20px; border-radius: 15px; display: inline-block; margin-top: 10px; font-weight: bold; }
        .toggle-btn { background: #667eea; border: none; padding: 15px; border-radius: 12px; color: #fff; width: 100%; margin: 20px 0; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        .stats-main { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { text-align: center; padding: 15px; border-radius: 15px; }
        .stat-box.done { background: #e8f5e9; color: #2e7d32; }
        .stat-box.pending { background: #fff3e0; color: #ef6c00; }
        .stat-box.current { background: #e3f2fd; color: #1565c0; }
        .stat-number { font-size: 1.8em; font-weight: bold; display: block; }
        .total-box { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: #fff; padding: 25px; border-radius: 20px; text-align: center; margin: 20px 0; }
        .total-number { font-size: 3em; font-weight: bold; display: block; }
        .progress-section { background: #f8f9fa; padding: 15px; border-radius: 15px; margin-bottom: 10px; }
        .progress-bar-bg { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; margin-top: 10px; }
        .progress-fill { height: 100%; transition: width 0.8s ease-in-out; }
        .link-btn { display: block; text-align: center; background: #1e3c72; color: #fff; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 20px; }
        .loading { text-align: center; padding: 50px; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>لوحة متابعة المشرفين</h1>
        <p>اتصال مباشر ومستقر بدون بروكسي</p>
    </header>

    <div class="nav" id="weeksNav"></div>
    <div id="content">
        <div class="loading">جاري جلب البيانات مباشرة من جوجل...</div>
    </div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";
const TOTAL_INDICATORS = 44;

let state = { allData: [], currentWeek: 2 };

async function init() {
    try {
        // الاتصال المباشر وحذف أي بروكسي وسيط
        const res = await fetch(`${SHEET_URL}&t=${Date.now()}`);
        const csv = await res.text();
        state.allData = parseCSV(csv);
        render();
    } catch (e) {
        document.getElementById('content').innerHTML = '<div style="text-align:center; color:white;">خطأ في الاتصال المباشر. تأكد من نشر الشيت بصيغة CSV.</div>';
    }
}

function parseCSV(text) {
    const lines = text.split('\n').filter(l => l.trim());
    const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
    return lines.slice(1).map(line => {
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
        let obj = {};
        headers.forEach((h, i) => obj[h] = values[i] || "");
        return obj;
    });
}

function render() {
    renderNav();
    renderCards();
}

function renderNav() {
    const nav = document.getElementById('weeksNav');
    nav.innerHTML = '';
    for(let i=1; i<=15; i++) {
        const btn = document.createElement('button');
        btn.className = `btn ${state.currentWeek === i ? 'active' : ''}`;
        btn.textContent = i;
        btn.onclick = () => { state.currentWeek = i; render(); };
        nav.appendChild(btn);
    }
}

function renderCards() {
    const container = document.getElementById('content');
    container.innerHTML = '';

    const sample = state.allData[0];
    const nameKey = Object.keys(sample).find(k => k.includes("اسم") || k.includes("المشرف"));
    const weekKey = Object.keys(sample).find(k => k.includes("الأسبوع") || k.includes("الأسابيع"));
    const statusKey = Object.keys(sample).find(k => k.includes("الحالة"));

    // حساب الإجمالي التراكمي (جميع الأسابيع)
    const totals = {};
    state.allData.forEach(row => {
        const name = row[nameKey];
        if (name && (row[statusKey]?.includes("تنفيذ"))) {
            totals[name] = (totals[name] || 0) + 1;
        }
    });

    // بيانات الأسبوع المختار فقط
    const weekData = state.allData.filter(row => {
        const val = row[weekKey] || "";
        const num = parseInt(val.replace(/[^0-9]/g, ''));
        return num === state.currentWeek;
    });

    if (weekData.length === 0) {
        container.innerHTML = `<div class="card" style="text-align:center;"><h3>لا توجد بيانات للأسبوع ${state.currentWeek}</h3></div>`;
        return;
    }

    const supervisors = {};
    weekData.forEach(row => {
        const name = row[nameKey];
        if(!name) return;
        if(!supervisors[name]) {
            supervisors[name] = { 
                name, 
                weekDone: 0, 
                totalDone: totals[name] || 0,
                link: Object.values(row).find(v => v.toString().startsWith('http')) || "#"
            };
        }
        if(row[statusKey]?.includes("تنفيذ")) supervisors[name].weekDone++;
    });

    Object.values(supervisors).forEach(sup => {
        const percent = ((sup.totalDone / TOTAL_INDICATORS) * 100).toFixed(2);
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
            <div class="card-header">
                <h2>${sup.name}</h2>
                <span class="week-badge">الأسبوع ${state.currentWeek}</span>
            </div>

            <button class="toggle-btn">📋 عرض المؤشرات (${sup.weekDone})</button>

            <div class="stats-main">
                <div class="stat-box done"><span class="stat-number">${sup.weekDone}</span>تم ✅</div>
                <div class="stat-box pending"><span class="stat-number">0</span>جاري ⏳</div>
                <div class="stat-box current"><span class="stat-number">${sup.weekDone}</span>هذا الأسبوع</div>
            </div>

            <div class="total-box">
                <p>📊 إجمالي المؤشرات المنفذة (جميع الأسابيع)</p>
                <span class="total-number">${sup.totalDone}</span>
                <p>من ${TOTAL_INDICATORS} مؤشر = ${percent}%</p>
            </div>

            <div class="progress-section">
                <p>نسبة الإنجاز في الأسبوع الحالي: ${percent}%</p>
                <div class="progress-bar-bg"><div class="progress-fill" style="width:${percent}%; background:#ff4444;"></div></div>
            </div>

            <div class="progress-section">
                <p>النسبة من إجمالي المؤشرات (${TOTAL_INDICATORS}): ${percent}%</p>
                <div class="progress-bar-bg"><div class="progress-fill" style="width:${percent}%; background:#9c27b0;"></div></div>
            </div>

            <a href="${sup.link}" target="_blank" class="link-btn">🔗 فتح الاستمارة</a>
        `;
        container.appendChild(card);
    });
}

init();
</script>
</body>
</html>

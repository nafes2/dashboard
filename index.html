<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a3a63; --success: #28a745; }
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .container { max-width: 800px; margin: 20px auto; padding: 15px; }
        .controls { background: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .progress-container { background: #eee; border-radius: 10px; height: 12px; margin: 10px 0; overflow: hidden; }
        .progress-fill { background: var(--success); height: 100%; transition: width 0.5s; }
        .stats { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; }
        .ind-item { padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.9em; }
        .status-done { color: var(--success); font-weight: bold; }
        .status-wait { color: #856404; }
        #loading { text-align: center; padding: 40px; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="header">
    <h2>📊 لوحة متابعة المشرفين</h2>
    <p>تحديث تلقائي من النظام المركزي</p>
</div>

<div class="container">
    <div class="controls">
        <input type="checkbox" id="showAll" onchange="renderView()">
        <label for="showAll">إظهار المؤشرات المنفذة (المكتملة)</label>
    </div>

    <div id="loading">جاري جلب البيانات...</div>
    <div id="display-area"></div>
</div>

<script>
    // الرابط الذي كان يعمل لديك سابقاً
    const url = 'https://docs.google.com/spreadsheets/d/1X-p1E6mK-M10B6Zsc56WlO2_Q2YhZ7L8G8Xp_vT8h7s/gviz/tq?tqx=out:csv';
    
    let globalData = [];

    async function getData() {
        try {
            const response = await fetch(url);
            const text = await response.text();
            
            // تحويل النص إلى أسطر
            const lines = text.split('\n').map(line => line.split('","').map(item => item.replace(/"/g, '')));
            globalData = lines.slice(1); // تجاهل الهيدر
            
            renderView();
            document.getElementById('loading').style.display = 'none';
        } catch (e) {
            document.getElementById('loading').innerHTML = "خطأ في جلب البيانات";
        }
    }

    function renderView() {
        const showAll = document.getElementById('showAll').checked;
        const area = document.getElementById('display-area');
        area.innerHTML = '';

        const groups = {};
        
        globalData.forEach(row => {
            const name = row[0]; // اسم المشرف
            const status = row[1]; // الحالة
            const task = row[2]; // المؤشر

            if (!name) return;

            if (!groups[name]) {
                groups[name] = { done: 0, list: [] };
            }

            const isDone = (status === "تم التنفيذ" || status === "جاري التنفيذ");
            if (isDone) groups[name].done++;
            
            groups[name].list.push({ task, status, isDone });
        });

        for (const name in groups) {
            const person = groups[name];
            const percent = ((person.done / 44) * 100).toFixed(1);
            
            let listHtml = '';
            person.list.forEach(item => {
                // التحكم في الإظهار والإخفاء
                if (!item.isDone || showAll) {
                    listHtml += `
                        <div class="ind-item">
                            <span>${item.task}</span>
                            <span class="${item.isDone ? 'status-done' : 'status-wait'}">${item.status}</span>
                        </div>`;
                }
            });

            area.innerHTML += `
                <div class="card">
                    <div class="stats">
                        <span>المشرف: ${name}</span>
                        <span>${percent}%</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-fill" style="width: ${percent}%"></div>
                    </div>
                    <div style="text-align:center; font-size:0.85em; margin-bottom:10px;">
                        الإنجاز: ${person.done} من 44
                    </div>
                    <div class="ind-list">${listHtml}</div>
                </div>`;
        }
    }

    getData();
    setInterval(getData, 60000); // تحديث كل دقيقة
</script>

</body>
</html>

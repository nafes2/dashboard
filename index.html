<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المدير - النسخة الرسمية</title>
    <script src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root { --primary: #1e3c72; --accent: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; text-align: center; }
        .nav { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
        .btn { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 10px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .btn.active { background: var(--accent); color: var(--primary); font-weight: bold; border-color: var(--accent); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .card { background: white; color: #333; border-radius: 15px; padding: 20px; text-align: right; box-shadow: 0 10px 20px rgba(0,0,0,0.3); border-top: 5px solid #4caf50; }
        .card h3 { margin: 0 0 15px 0; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; text-align: center; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-item { text-align: center; background: #f8f9fa; padding: 10px; border-radius: 10px; }
        .stat-item b { font-size: 1.4em; display: block; color: var(--primary); }
        .progress-bar { background: #eee; height: 15px; border-radius: 10px; overflow: hidden; }
        .progress-fill { background: #4caf50; height: 100%; transition: 1s; }
        .loading { font-size: 1.5em; margin-top: 50px; }
        .error { background: #ff5252; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 لوحة متابعة المدير</h1>
    <div class="nav" id="weeksNav"></div>
    <div id="loader" class="loading">⏳ جاري فتح قفل البيانات من جوجل...</div>
    <div id="grid" class="grid"></div>
</div>

<script>
    // الرابط الأساسي للملف (بدون output=csv)
    const SHEET_ID = '17Bf1TEoRC2h_uWlh8ezOEo-Fius5IgVzaIyLU9ByR1o';
    const GID = '1526100112';
    
    google.charts.load('current', {packages:['corechart']});
    google.charts.setOnLoadCallback(init);

    let allRows = [];
    let currentWeek = 1;

    function init() {
        const query = new google.visualization.Query(https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?gid=${GID});
        query.send(handleQueryResponse);
    }

    function handleQueryResponse(response) {
        const loader = document.getElementById('loader');
        if (response.isError()) {
            loader.innerHTML = <div class="error">❌ خطأ في الوصول: ${response.getMessage()}</div>;
            return;
        }

        const data = response.getDataTable();
        const cols = [];
        for (let i = 0; i < data.getNumberOfColumns(); i++) cols.push(data.getColumnLabel(i));

        // تحويل البيانات إلى كائنات (Objects)
        for (let i = 0; i < data.getNumberOfRows(); i++) {
            let row = {};
            for (let j = 0; j < data.getNumberOfColumns(); j++) {
                row[cols[j]] = data.getValue(i, j);
            }
            allRows.push(row);
        }

        loader.style.display = 'none';
        renderWeeks();
        renderCards();
    }

    function renderWeeks() {
        const nav = document.getElementById('weeksNav');
        nav.innerHTML = '';
        for (let i = 1; i <= 12; i++) {
            const btn = document.createElement('button');
            btn.className = btn ${currentWeek == i ? 'active' : ''};
            btn.innerText = أسبوع ${i};
            btn.onclick = () => { currentWeek = i; renderWeeks(); renderCards(); };
            nav.appendChild(btn);
        }
    }

    function renderCards() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        
        // تصفية البيانات (تأكد أن اسم العمود في الشيت هو "الأسبوع")
        const filtered = allRows.filter(r => r['الأسبوع'] == currentWeek || r['الاسبوع'] == currentWeek);

        if (filtered.length === 0) {
            grid.innerHTML = <div class="loading">لا توجد بيانات مسجلة للأسبوع ${currentWeek}</div>;
            return;
        }

        filtered.forEach(row => {
            const done = parseInt(row['تم'] || 0);
            const total = 44;
            const percent = ((done / total) * 100).toFixed(1);

            grid.innerHTML += `
                <div class="card">
                    <h3>${row['اسم المشرف'] || 'مشرف'}</h3>
                    <div class="stat-grid">
                        <div class="stat-item"><b>${done}</b>تم</div>
                        <div class="stat-item"><b>${total}</b>هدف</div>
                        <div class="stat-item"><b>${total - done}</b>باقي</div>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width:${percent}%"></div>
                    </div>
                    <p style="text-align:center; margin-top:10px; font-weight:bold; color:#666;">${percent}% من الإنجاز الكلي</p>
                </div>
            `;
        });
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة متابعة المشرفين</title>

<style>
body{
  font-family:Tahoma;
  background:#1e3c72;
  color:#fff;
  text-align:center;
  padding:30px
}
.card{
  background:#fff;
  color:#000;
  padding:20px;
  margin:12px auto;
  max-width:420px;
  border-radius:15px;
  box-shadow:0 5px 20px rgba(0,0,0,.3)
}
.spinner{
  width:50px;height:50px;
  border:4px solid #ccc;
  border-top:4px solid #ffd700;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:40px auto
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<body>

<h1>📊 لوحة متابعة المشرفين</h1>

<div id="app">
<div class="spinner"></div>
<p>جاري تحميل البيانات...</p>
</div>

<script>

// ⭐ رابط السكربت الخاص بك
const API_URL = "https://script.google.com/macros/s/AKfycbxKe9F_Auy-WCMrXomu2SRAjuGLcbUY-UdbyknLLfGoG4ewC02vCzcn7SubUvyr-vzjg/exec";

async function loadData(){

  try{

    const res = await fetch(API_URL);
    const data = await res.json();

    if(!data || !data.length){
      document.getElementById("app").innerHTML="⚠️ لا توجد بيانات";
      return;
    }

    let html="";

    data.forEach(row => {

      html += `
        <div class="card">
          <h3>${row.name || row.اسم || "بدون اسم"}</h3>
          <p>📅 الأسبوع: ${row.week || row.الأسبوع || "-"}</p>
          <p>✅ المنفذ: ${row.done || row.منفذ || 0}</p>
          <p>⏳ المتبقي: ${row.pending || row.متبقي || 0}</p>
        </div>
      `;
    });

    document.getElementById("app").innerHTML = html;

  }catch(e){

    document.getElementById("app").innerHTML =
      "❌ فشل الاتصال بالخادم";

    console.error(e);
  }

}

loadData();

</script>

</body>
</html>

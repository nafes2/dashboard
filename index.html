<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة متابعة المشرفين</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: #fff; min-height: 100vh; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
header { text-align: center; padding: 20px 0; }
.nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 25px 0; }
.btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 10px 18px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
.btn.active { background: #ffd700; color: #1e3c72; font-weight: bold; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
.card { background: #fff; color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
.card h3 { color: #1e3c72; text-align: center; margin-bottom: 15px; }
.stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
.stat-box { text-align: center; padding: 10px; border-radius: 12px; font-weight: bold; }
.done { background: #e8f5e9; color: #2e7d32; }
.pending { background: #fff3e0; color: #ef6c00; }
.total { background: #e3f2fd; color: #1565c0; }
.stat-number { font-size: 1.5em; display: block; }
.summary-box { background: #764ba2; color: white; padding: 15px; border-radius: 12px; text-align: center; margin-top: 10px; }
.link-btn { display: block; text-align: center; background: #2a5298; color: #fff; padding: 12px; border-radius: 10px; text-decoration: none; margin-top: 10px; font-weight: bold; }
.loading { text-align: center; padding: 50px; }
</style>
</head>
<body>
<div class="container">
    <header><h1>📊 لوحة متابعة المشرفين</h1></header>
    <div class="nav" id="weeks"></div>
    <div id="status" class="loading">جاري جلب البيانات من جوجل...</div>
    <div class="grid" id="cards"></div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";
const PROXY = "https://api.allorigins.win/raw?url=";
let appData = { allData: [], currentWeek: 3 };

async function loadData() {
    try {
        const response = await fetch(PROXY + encodeURIComponent(SHEET_URL + "&t=" + Date.now()));
        const text = await response.text();
        appData.allData = parseCSV(text);
        document.getElementById("status").style.display = "none";
        render();
    } catch (e) {
        document.getElementById("status").innerHTML = "⚠️ فشل الاتصال. تأكد من الإنترنت أو الرابط.";
    }
}

function parseCSV(csv) {
    const lines = csv.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
    return lines.slice(1).map(line => {
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,'').trim());
        let row = {};
        headers.forEach((h, i) => row[h] = values[i] || "");
        return row;
    });
}

function render() {
    const nav = document.getElementById("weeks");
    nav.innerHTML = "";
    for(let i=1; i<=15; i++) {
        const btn = document.createElement("button");
        btn.className = `btn ${i === appData.currentWeek ? 'active' : ''}`;
        btn.textContent = i;
        btn.onclick = () => { appData.currentWeek = i; render(); };
        nav.appendChild(btn);
    }

    const container = document.getElementById("cards");
    container.innerHTML = "";
    
    // تحديد الأعمدة برمجياً لضمان عدم توقف الكود
    const sample = appData.allData[0] || {};
    const nameCol = Object.keys(sample).find(k => k.includes("مشرف")) || "";
    const weekCol = Object.keys(sample).find(k => k.includes("سبوع")) || "";
    const statusCol = Object.keys(sample).find(k => k.includes("حالة")) || "";
    const indCol = Object.keys(sample).find(k => k.includes("مؤشر")) || "";

    const weekData = appData.allData.filter(r => parseInt(r[weekCol]) === appData.currentWeek);

    weekData.forEach(row => {
        const status = (row[statusCol] || "").trim();
        const indicators = (row[indCol] || "").split(',').filter(x => x.trim());
        const count = indicators.length || 0;

        // ✅ الحل الجذري لمشكلة جاري التنفيذ
        let done = status === "تم التنفيذ" ? count : 0;
        let pending = status.includes("جار") ? count : 0; 

        container.innerHTML += `
            <div class="card">
                <h3>${row[nameCol]}</h3>
                <div class="stats-grid">
                    <div class="stat-box done"><span class="stat-number">${done}</span>تم</div>
                    <div class="stat-box pending"><span class="stat-number">${pending}</span>جاري</div>
                    <div class="stat-box total"><span class="stat-number">${count}</span>الإجمالي</div>
                </div>
                <div class="summary-box">المؤشرات: ${indicators.join(' - ') || 'لا يوجد'}</div>
                <a href="${Object.values(row).find(v => v.toString().startsWith('http')) || '#'}" target="_blank" class="link-btn">🔗 فتح الاستمارة</a>
            </div>`;
    });
}
loadData();
</script>
</body>
</html>

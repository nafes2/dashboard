<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة متابعة المشرفين</title>

<style>
body{
  font-family:Tah​oma;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:#fff;
  padding:20px;
  text-align:center
}

h1{margin-bottom:15px}

.nav{margin:20px 0}
.btn{
  padding:10px 18px;
  margin:4px;
  border:none;
  border-radius:20px;
  background:#ffffff33;
  color:#fff;
  cursor:pointer;
  font-weight:bold
}
.btn.active{background:#ffd700;color:#000}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:15px
}

.card{
  background:#fff;
  color:#000;
  border-radius:15px;
  padding:20px;
  box-shadow:0 5px 25px rgba(0,0,0,.35)
}

.progress{
  height:25px;
  background:#eee;
  border-radius:20px;
  overflow:hidden;
  margin:12px 0
}

.bar{
  height:100%;
  background:#4caf50;
  color:#fff;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center
}

.spinner{
  width:50px;height:50px;
  border:4px solid #ccc;
  border-top:4px solid #ffd700;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:40px auto
}
@keyframes spin{to{transform:rotate(360deg)}}

.refresh{
  margin-top:20px;
  padding:8px 18px;
  border:none;
  border-radius:20px;
  background:#fff;
  cursor:pointer
}
</style>
</head>

<body>

<h1>📊 لوحة متابعة المشرفين</h1>

<div id="weeks" class="nav"></div>

<div id="cards" class="grid">
  <div class="spinner"></div>
</div>

<button class="refresh" onclick="loadData()">🔄 تحديث</button>

<script>

// ⭐ معرف جدولك الصحيح
const SHEET_ID =
"17Bf1TEoRC2h_uWlh8ezOEo-Fius5IgVzaIyLU9ByR1o";

let allData = [];
let currentWeek = 1;

// ===== جلب البيانات =====
async function loadData(){

  document.getElementById("cards").innerHTML =
    '<div class="spinner"></div>';

  try{

    const url =
      `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

    const res = await fetch(url);
    const text = await res.text();

    const json =
      JSON.parse(text.substring(47).slice(0,-2));

    allData = json.table.rows.map(r =>
      r.c.map(c => c ? c.v : "")
    );

    buildWeeks();
    render();

  }catch(e){
    document.getElementById("cards").innerHTML =
      "❌ فشل الاتصال بالجدول";
    console.error(e);
  }
}

// ===== أزرار الأسابيع =====
function buildWeeks(){

  const weeks = [...new Set(allData.map(r => r[1]))];

  let html="";

  weeks.forEach(w=>{
    html += `
      <button class="btn ${
        w==currentWeek?'active':''
      }" onclick="changeWeek(${w})">
        الأسبوع ${w}
      </button>`;
  });

  document.getElementById("weeks").innerHTML = html;
}

function changeWeek(w){
  currentWeek = w;
  buildWeeks();
  render();
}

// ===== عرض البطاقات =====
function render(){

  const data = allData.filter(r => r[1]==currentWeek);

  if(!data.length){
    document.getElementById("cards").innerHTML =
      "لا توجد بيانات لهذا الأسبوع";
    return;
  }

  let html="";

  data.forEach(r=>{

    const name = r[0];
    const done = Number(r[2] || 0);
    const pending = Number(r[3] || 0);
    const total = done + pending || 1;
    const percent = Math.round(done/total*100);

    html += `
      <div class="card">
        <h3>${name}</h3>

        <div class="progress">
          <div class="bar" style="width:${percent}%">
            ${percent}%
          </div>
        </div>

        <p>✅ المنجز: ${done}</p>
        <p>⏳ المتبقي: ${pending}</p>
      </div>`;
  });

  document.getElementById("cards").innerHTML = html;
}

loadData();

// تحديث تلقائي كل دقيقة
setInterval(loadData,60000);

</script>

</body>
</html>

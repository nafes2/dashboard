<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المدير</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1e3c72; color: #fff; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; text-align: center; }
        .nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
        .btn { background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; padding: 8px 15px; border-radius: 20px; cursor: pointer; }
        .btn.active { background: #ffd700; color: #1e3c72; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #fff; color: #333; border-radius: 15px; padding: 20px; text-align: right; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .card h3 { color: #1e3c72; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .stat-box { background: #f0f4f8; padding: 10px; border-radius: 8px; margin: 5px 0; display: flex; justify-content: space-between; }
        .progress-cont { background: #eee; height: 15px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: #4caf50; transition: 0.5s; }
        .loading { font-size: 1.2rem; padding: 50px; }
        .link-btn { display: block; text-align: center; background: #1e3c72; color: #fff; padding: 10px; border-radius: 8px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📊 لوحة متابعة المدير</h1>
    <div class="nav" id="weeksNav"></div>
    <div id="status" class="loading">جاري الاتصال بجوجل شيت...</div>
    <div class="grid" id="mainGrid"></div>
</div>

<script>
// رابط CSV المباشر لصفحة المدير الذي زودتني به
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?gid=1526100112&single=true&output=csv";

let allData = [];
let currentWeek = 1;

async function loadData() {
    const status = document.getElementById('status');
    try {
        // استخدام وسيط لتجاوز مشكلة CORS والتعليق
        const response = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(SHEET_CSV + "&t=" + Date.now()));
        const text = await response.text();
        
        allData = parseCSV(text);
        if (allData.length > 0) {
            status.style.display = 'none';
            renderWeeks();
            renderCards();
        } else {
            status.innerText = "البيانات فارغة، تأكد من وجود صفوف في ورقة المدير.";
        }
    } catch (e) {
        status.innerText = "خطأ في جلب البيانات. تأكد من أن الملف 'منشور للويب'.";
    }
}

function parseCSV(text) {
    const lines = text.split('\n').filter(l => l.trim() !== "");
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
    return lines.slice(1).map(line => {
        const values = line.split(',').map(v => v.trim().replace(/"/g, ''));
        let obj = {};
        headers.forEach((h, i) => obj[h] = values[i]);
        return obj;
    });
}

function renderWeeks() {
    const nav = document.getElementById('weeksNav');
    nav.innerHTML = "";
    for (let i = 1; i <= 12; i++) {
        const btn = document.createElement('button');
        btn.className = btn ${currentWeek == i ? 'active' : ''};
        btn.innerText = أسبوع ${i};
        btn.onclick = () => { currentWeek = i; renderWeeks(); renderCards(); };
        nav.appendChild(btn);
    }
}

function renderCards() {
    const grid = document.getElementById('mainGrid');
    grid.innerHTML = "";
    
    // تصفية حسب الأسبوع
    const filtered = allData.filter(d => d["الأسبوع"] == currentWeek || d["الاسبوع"] == currentWeek);

    if (filtered.length === 0) {
        grid.innerHTML = <div class='loading'>لا توجد بيانات للأسبوع ${currentWeek}</div>;
        return;
    }

    filtered.forEach(row => {
        const done = parseInt(row["تم"] || 0);
        const total = 44;
        const percent = ((done / total) * 100).toFixed(1);

        grid.innerHTML += `
            <div class="card">
                <h3>${row["اسم المشرف"] || "غير معروف"}</h3>
                <div class="stat-box"><span>✅ تم التنفيذ:</span> <b>${done}</b></div>
                <div class="stat-box"><span>🎯 الهدف:</span> <b>${total}</b></div>
                <div class="progress-cont"><div class="progress-bar" style="width:${percent}%"></div></div>
                <p style="text-align:center; font-size: 12px;">نسبة الإنجاز: ${percent}%</p>
                <a href="${row["الرابط"] || '#'}" target="_blank" class="link-btn">فتح التفاصيل</a>
            </div>
        `;
    });
}

loadData();
</script>
</body>
</html>

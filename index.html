<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام متابعة المشرفين</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 900px;
            direction: rtl;
        }
        .login-section { text-align: center; margin-bottom: 30px; }
        h1 { color: #333; margin-bottom: 10px; font-size: 28px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .pin-input {
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 250px;
            text-align: center;
            margin-bottom: 15px;
        }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }
        .error-message {
            color: #e74c3c;
            margin-top: 10px;
            display: none;
        }
        .dashboard { display: none; }
        .manager-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .manager-name { font-size: 24px; color: #333; font-weight: bold; }
        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: right;
        }
        td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid #eee;
        }
        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
        }
        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginSection" class="login-section">
            <h1>🔐 نظام متابعة المشرفين</h1>
            <p class="subtitle">الرجاء إدخال الرقم السري للمدير</p>
            <input type="password" id="pinInput" class="pin-input" placeholder="أدخل الرقم السري" maxlength="10">
            <br>
            <button onclick="login()" class="btn">دخول</button>
            <p id="errorMessage" class="error-message">خطأ في الاتصال بالخادم</p>
        </div>

        <div id="dashboard" class="dashboard">
            <div class="manager-info">
                <div class="manager-name">👤 المدير: <span id="managerName"></span></div>
                <button onclick="logout()" class="logout-btn">خروج</button>
            </div>

            <h2 style="margin-bottom: 20px; color: #333;">📋 المشرفون التابعون</h2>
            <div id="loading" class="loading">⏳ جاري التحميل...</div>
            <div id="supervisorsContainer"></div>
        </div>
    </div>

    <script>
        // ============================================
        // ضع رابط السكربت هنا
        // ============================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtvnADs0q9HDZpq6X6Gv6yrDr62ASIrS5LkUIyxfqR20V0oNuwnVU2YzR12iy-T58Mag/exec';

        function login() {
            const pin = document.getElementById('pinInput').value.trim();
            const errorMsg = document.getElementById('errorMessage');

            if (!pin) {
                errorMsg.textContent = 'الرجاء إدخال الرقم السري';
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            document.getElementById('loading').style.display = 'block';

            // إنشاء callback فريد
            const callbackName = 'jsonpCallback_' + Date.now();

            // تعريف الدالة العامة
            window[callbackName] = function(response) {
                console.log('Response:', response);

                if (response.success) {
                    showDashboard(response);
                } else {
                    errorMsg.textContent = response.error || 'رقم سري غير صحيح';
                    errorMsg.style.display = 'block';
                }

                document.getElementById('loading').style.display = 'none';

                // تنظيف
                cleanup(callbackName);
            };

            // إنشاء script tag
            const script = document.createElement('script');
            script.src = SCRIPT_URL + '?action=verifyPin&pin=' + encodeURIComponent(pin) + '&callback=' + callbackName;

            script.onerror = function() {
                errorMsg.textContent = 'خطأ في الاتصال بالخادم. تأكد من الرابط.';
                errorMsg.style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                cleanup(callbackName);
            };

            // timeout للأمان
            setTimeout(function() {
                if (window[callbackName]) {
                    errorMsg.textContent = 'انتهى الوقت. حاول مرة أخرى.';
                    errorMsg.style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                    cleanup(callbackName);
                }
            }, 10000);

            document.head.appendChild(script);
        }

        function cleanup(callbackName) {
            delete window[callbackName];
            const scripts = document.querySelectorAll('script[src*="callback=' + callbackName + '"]');
            scripts.forEach(s => s.remove());
        }

        function showDashboard(data) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('managerName').textContent = data.manager;

            renderSupervisors(data);
        }

        function renderSupervisors(data) {
            const container = document.getElementById('supervisorsContainer');
            const supervisors = data.supervisors || [];
            const phones = data.phones || {};

            if (supervisors.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:40px;color:#666;">لا يوجد مشرفون</div>';
                return;
            }

            let html = '<table><thead><tr><th>#</th><th>اسم المشرف</th><th>رقم الجوال</th><th>واتساب</th></tr></thead><tbody>';

            supervisors.forEach((name, index) => {
                const phone = phones[name] || '';
                const cleanPhone = phone.replace(/\D/g, '');

                html += '<tr>';
                html += '<td>' + (index + 1) + '</td>';
                html += '<td><strong>' + name + '</strong></td>';
                html += '<td dir="ltr">' + (phone || '-') + '</td>';
                html += '<td>';
                if (cleanPhone) {
                    html += '<a href="https://wa.me/' + cleanPhone + '" target="_blank" class="whatsapp-btn">📱 رسالة</a>';
                }
                html += '</td></tr>';
            });

            html += '</tbody></table>';
            html += '<div style="margin-top:20px;text-align:center;color:#666;">📊 الإجمالي: ' + supervisors.length + '</div>';

            container.innerHTML = html;
        }

        function logout() {
            document.getElementById('pinInput').value = '';
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('supervisorsContainer').innerHTML = '';
        }

        document.getElementById('pinInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>

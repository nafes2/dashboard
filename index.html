<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; }
        header h1 { font-size: 2em; margin-bottom: 10px; }
        .nav {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 25px 0;
        }
        .btn {
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.3);
            color: #fff;
            padding: 12px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn.active {
            background: #ffd700;
            color: #1e3c72;
            border-color: #ffd700;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 20px;
        }
        .card {
            background: #fff;
            color: #333;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .card-header {
            text-align: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }
        .card-header h3 {
            color: #1e3c72;
            font-size: 1.4em;
            margin-bottom: 8px;
        }
        .week-badge {
            display: inline-block;
            background: #e3f2fd;
            color: #1976d2;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: 600;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .stat-box {
            text-align: center;
            padding: 12px 8px;
            border-radius: 12px;
        }
        .stat-box.done { background: #e8f5e9; color: #2e7d32; }
        .stat-box.pending { background: #fff3e0; color: #ef6c00; }
        .stat-box.total { background: #e3f2fd; color: #1565c0; }
        .stat-number { font-size: 1.6em; font-weight: bold; display: block; }
        .stat-label { font-size: 0.8em; margin-top: 5px; font-weight: 600; }
        .summary-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            text-align: center;
        }
        .summary-box .big-number { font-size: 2.2em; font-weight: bold; }
        .progress-section {
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-weight: 600;
            color: #555;
        }
        .progress {
            background: #e0e0e0;
            height: 28px;
            border-radius: 14px;
            overflow: hidden;
        }
        .bar {
            height: 100%;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 13px;
        }
        .bar.high { background: linear-gradient(90deg, #4caf50, #66bb6a); }
        .bar.medium { background: linear-gradient(90deg, #ff9800, #ffb74d); }
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-box {
            background: #ff5252;
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin: 20px auto;
            max-width: 500px;
        }
        .retry-btn {
            background: #fff;
            color: #ff5252;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
        }
        .api-input {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .api-input input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 12px;
        }
        .api-input button {
            background: #ffd700;
            color: #1e3c72;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 لوحة متابعة المشرفين</h1>
            <p>متابعة تنفيذ المؤشرات الأسبوعية</p>
        </header>
        
        <!-- إدخال رابط API -->
        <div class="api-input" id="apiSection">
            <div>🔗 أدخل رابط Google Apps Script:</div>
            <input type="text" id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec">
            <button onclick="setApiUrl()">اتصال</button>
        </div>
        
        <div class="nav" id="weeks"></div>
        <div class="grid" id="cards"></div>
    </div>

    <script>
        // ⚠️ يمكنك وضع الرابط هنا مباشرة أو إدخاله لاحقاً
        let API_URL = localStorage.getItem('apiUrl') || '';
        
        const TOTAL_INDICATORS = 44;
        const WEEK_NAMES = {
            1: "الأول", 2: "الثاني", 3: "الثالث", 4: "الرابع", 5: "الخامس",
            6: "السادس", 7: "السابع", 8: "الثامن", 9: "التاسع", 10: "العاشر",
            11: "الحادي عشر", 12: "الثاني عشر", 13: "الثالث عشر", 14: "الرابع عشر", 15: "الخامس عشر"
        };
        
        let appData = { allData: [], currentWeek: 1 };

        function setApiUrl() {
            const url = document.getElementById('apiUrl').value.trim();
            if (!url) return;
            
            API_URL = url;
            localStorage.setItem('apiUrl', url);
            document.getElementById('apiSection').style.display = 'none';
            loadData();
        }

        async function loadData() {
            if (!API_URL) {
                showInput();
                return;
            }
            
            try {
                showLoading();
                
                const response = await fetch(API_URL + '?_=' + Date.now());
                const result = await response.json();
                
                if (!result.success) throw new Error(result.error);
                
                appData.allData = result.data;
                render();
                
            } catch (error) {
                showError(error.message);
            }
        }

        function showInput() {
            document.getElementById('weeks').innerHTML = '';
            document.getElementById('cards').innerHTML = '';
            document.getElementById('apiSection').style.display = 'block';
        }

        function showLoading() {
            document.getElementById('weeks').innerHTML = `
                <div class="loading" style="grid-column:1/-1;">
                    <div class="spinner"></div>
                    <p>جاري الاتصال...</p>
                </div>
            `;
        }

        function showError(msg) {
            document.getElementById('weeks').innerHTML = `
                <div class="error-box" style="grid-column:1/-1;">
                    <h3>⚠️ فشل الاتصال</h3>
                    <p>${msg}</p>
                    <button class="retry-btn" onclick="showInput()">إعادة إدخال الرابط</button>
                </div>
            `;
        }

        function render() {
            renderWeeks();
            renderCards();
        }

        function renderWeeks() {
            const container = document.getElementById('weeks');
            container.innerHTML = '';
            
            for (let i = 1; i <= 15; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn' + (i === appData.currentWeek ? ' active' : '');
                btn.textContent = i;
                btn.onclick = () => {
                    appData.currentWeek = i;
                    renderWeeks();
                    renderCards();
                };
                container.appendChild(btn);
            }
        }

        function renderCards() {
            const container = document.getElementById('cards');
            container.innerHTML = '';
            
            const weekData = appData.allData.filter(row => {
                const week = parseInt(row['الأسبوع'] || row['Week'] || 0);
                return week === appData.currentWeek;
            });
            
            if (weekData.length === 0) {
                container.innerHTML = `
                    <div style="grid-column:1/-1; text-align:center; padding:40px; color:rgba(255,255,255,0.8);">
                        لا توجد بيانات للأسبوع ${WEEK_NAMES[appData.currentWeek]}
                    </div>
                `;
                return;
            }
            
            const supervisors = {};
            
            weekData.forEach(row => {
                const name = row['اسم المشرف'] || row['المشرف'] || row['Name'];
                if (!name) return;
                
                if (!supervisors[name]) {
                    supervisors[name] = { name, done: 0, pending: 0, total: 0, totalAll: 0 };
                }
                
                const status = (row['الحالة'] || row['Status'] || '').toString();
                const count = parseInt(row['عدد'] || row['Count'] || 1);
                
                supervisors[name].total += count;
                
                if (status.includes('تم')) {
                    supervisors[name].done += count;
                    supervisors[name].totalAll += count;
                } else {
                    supervisors[name].pending += count;
                }
            });
            
            Object.values(supervisors).forEach(sup => {
                const weekPercent = ((sup.done / TOTAL_INDICATORS) * 100).toFixed(1);
                const totalPercent = ((sup.totalAll / TOTAL_INDICATORS) * 100).toFixed(1);
                const barClass = weekPercent >= 70 ? "high" : "medium";
                
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <div class="card-header">
                        <h3>${sup.name}</h3>
                        <span class="week-badge">الأسبوع ${WEEK_NAMES[appData.currentWeek]}</span>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-box done">
                            <span class="stat-number">${sup.done}</span>
                            <div class="stat-label">✅ تم</div>
                        </div>
                        <div class="stat-box pending">
                            <span class="stat-number">${sup.pending}</span>
                            <div class="stat-label">⏳ جاري</div>
                        </div>
                        <div class="stat-box total">
                            <span class="stat-number">${sup.total}</span>
                            <div class="stat-label">📋 الأسبوع</div>
                        </div>
                    </div>
                    <div class="summary-box">
                        <div class="big-number">${sup.totalAll}</div>
                        <div>من ${TOTAL_INDICATORS} مؤشر = ${totalPercent}%</div>
                    </div>
                    <div class="progress-section">
                        <div class="progress-label">
                            <span>نسبة الإنجاز</span>
                            <span>${weekPercent}%</span>
                        </div>
                        <div class="progress">
                            <div class="bar ${barClass}" style="width: ${Math.max(weekPercent, 5)}%">
                                ${weekPercent}%
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // بدء التشغيل
        if (API_URL) {
            document.getElementById('apiSection').style.display = 'none';
            loadData();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة متابعة المشرفين - الإصدار المعتمد</title>
<style>
    :root { --bg: #f4f7f6; --primary: #1e3c72; --accent: #ffd700; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #2a5298; color: #fff; padding: 20px; }
    .container { max-width: 1000px; margin: 0 auto; }
    .nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
    .btn { background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: bold; }
    .btn.active { background: var(--accent); color: var(--primary); border-color: var(--accent); }
    
    /* تصميم البطاقة الجديد ليطابق الصورة */
    .card { background: #fff; color: #333; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); text-align: center; }
    .sup-name { color: #1e3c72; font-size: 1.5em; margin-bottom: 5px; }
    .week-tag { background: #e3f2fd; color: #1565c0; padding: 5px 15px; border-radius: 15px; display: inline-block; margin-bottom: 15px; font-size: 0.9em; }
    
    .toggle-btn { background: #667eea; color: #fff; width: 100%; border: none; padding: 12px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; cursor: pointer; }
    
    /* شبكة العدادات الثلاثية */
    .mini-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .stat-box { padding: 15px 5px; border-radius: 12px; }
    .stat-box b { font-size: 1.8em; display: block; }
    .box-done { background: #e8f5e9; color: #2e7d32; }
    .box-process { background: #fff3e0; color: #ef6c00; }
    .box-total { background: #e3f2fd; color: #1565c0; }
    
    /* صندوق الإجمالي الكبير */
    .total-box { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 20px; border-radius: 15px; margin-bottom: 15px; }
    .total-box b { font-size: 2.5em; }
    
    .list-area { display: none; background: #f9f9f9; padding: 10px; border-radius: 10px; text-align: right; margin-bottom: 15px; border: 1px solid #eee; }
    .list-area.show { display: block; }
    .item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; font-size: 0.9em; }
</style>
</head>
<body>

<div class="container">
    <div class="nav" id="weeks"></div>
    <div id="content"></div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";
const W_NAMES = {1:"الأول",2:"الثاني",3:"الثالث",4:"الرابع",5:"الخامس",6:"السادس",7:"السابع",8:"الثامن",9:"التاسع",10:"العاشر",11:"الحادي عشر",12:"الثاني عشر",13:"الثالث عشر",14:"الرابع عشر",15:"الخامس عشر"};

let db = [];
let currentW = 5;

async function load() {
    const r = await fetch(URL + "&t=" + Date.now());
    const txt = await r.text();
    db = parse(txt);
    render();
}

function parse(csv) {
    const lines = csv.split('\n').filter(l => l.trim());
    const head = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
    return lines.slice(1).map(l => {
        const v = l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(x => x.replace(/"/g, '').trim());
        return head.reduce((o, h, i) => ({ ...o, [h]: v[i] || "" }), {});
    });
}

function render() {
    const nav = document.getElementById('weeks');
    nav.innerHTML = '';
    for(let i=1; i<=15; i++){
        const b = document.createElement('button');
        b.className = `btn ${i===currentW?'active':''}`;
        b.innerText = i;
        b.onclick = () => { currentW = i; render(); };
        nav.appendChild(b);
    }

    const main = document.getElementById('content');
    main.innerHTML = '';
    
    // تحديد الأعمدة
    const sample = db[0] || {};
    const colName = Object.keys(sample).find(k => k.includes("مشرف"));
    const colWeek = Object.keys(sample).find(k => k.includes("بوع"));
    const colStat = Object.keys(sample).find(k => k.includes("حالة"));
    const colInd = Object.keys(sample).find(k => k.includes("مؤشر"));

    const filtered = db.filter(r => (r[colWeek]||"").includes(W_NAMES[currentW]) || (r[colWeek]||"").includes(currentW.toString()));

    const sups = {};
    filtered.forEach(r => {
        const n = r[colName]; if(!n) return;
        if(!sups[n]) sups[n] = { name: n, done: 0, process: 0, total: 0, list: [] };
        
        const inds = (r[colInd]||"").split('\n').filter(x => x.trim());
        const stats = (r[colStat]||"").split('\n').filter(x => x.trim());

        inds.forEach((txt, idx) => {
            const s = (stats[idx] || stats[0] || "").trim();
            const isDone = s.includes("تم");
            const isProc = s.includes("جاري");
            
            if(isDone) sups[n].done++;
            if(isProc) sups[n].process++;
            sups[n].total++;
            sups[n].list.push({ txt, s, isDone, isProc });
        });
    });

    Object.values(sups).forEach((s, idx) => {
        main.innerHTML += `
            <div class="card">
                <div class="sup-name">${s.name}</div>
                <div class="week-tag">الأسبوع ${W_NAMES[currentW]}</div>
                
                <button class="toggle-btn" onclick="this.nextElementSibling.classList.toggle('show')">
                    ▼ عرض المؤشرات (${s.total})
                </button>
                <div class="list-area">
                    ${s.list.map(item => `<div class="item"><span>${item.txt}</span> <span>${item.isDone?'✅':(item.isProc?'⏳':'⚪')}</span></div>`).join('')}
                </div>

                <div class="mini-stats">
                    <div class="stat-box box-done"><b>${s.done}</b>تم ✅</div>
                    <div class="stat-box box-process"><b>${s.process}</b>جاري ⏳</div>
                    <div class="stat-box box-total"><b>${s.total}</b>هذا الأسبوع 📋</div>
                </div>

                <div class="total-box">
                    <p>📊 إجمالي المؤشرات المنفذة (جميع الأسابيع)</p>
                    <b>${s.done}</b>
                    <p>من 44 مؤشر = ${((s.done/44)*100).toFixed(2)}%</p>
                </div>
            </div>`;
    });
}
load();
</script>
</body>
</html>

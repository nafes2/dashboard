<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المؤشرات النهائية</title>
    <style>
        :root { --main: #1e3c72; }
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; text-align: center; }
        .header { background: var(--main); color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .weeks-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 20px; }
        .btn { padding: 10px 15px; cursor: pointer; border: none; border-radius: 5px; background: white; color: var(--main); font-weight: bold; }
        .btn.active { background: #ff9800; color: white; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: white; border-radius: 10px; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid var(--main); text-align: right; }
        #status { background: #fff; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="header"><h1>لوحة متابعة المؤشرات</h1></div>
<div id="weeks-nav" class="weeks-nav"></div>
<div id="status">⏳ جاري فحص البيانات وتنظيفها...</div>
<div id="cardsContainer" class="container"></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKe9F_Auy-WCMrXomu2SRAjuGLcbUY-UdbyknLLfGoG4ewC02vCzcn7SubUvyr-vzjg/exec";
    const PROXY_URL = "https://api.allorigins.win/get?url=" + encodeURIComponent(SCRIPT_URL);

    let allData = [];
    let currentWeek = "الأسبوع الخامس";

    async function loadData() {
        try {
            const response = await fetch(PROXY_URL);
            const result = await response.json();
            const rawData = JSON.parse(result.contents);
            
            // تنظيف البيانات: إزالة الصفوف الفارغة تماماً
            allData = rawData.filter(row => row["الأسابيع"] || row["اسم المشرف"]);
            
            console.log("البيانات بعد التنظيف:", allData);

            document.getElementById('status').style.display = 'none';
            renderNav();
            renderCards();
        } catch (error) {
            document.getElementById('status').innerHTML = "❌ خطأ في التحميل. تأكد من نشر السكريبت كـ Anyone.";
        }
    }

    function renderNav() {
        const nav = document.getElementById('weeks-nav');
        nav.innerHTML = "";
        const weeks = ["الأسبوع الأول", "الأسبوع الثاني", "الأسبوع الثالث", "الأسبوع الرابع", "الأسبوع الخامس", "الأسبوع السادس"];
        weeks.forEach(w => {
            const btn = document.createElement('button');
            btn.className = btn ${w === currentWeek ? 'active' : ''};
            btn.innerText = w;
            btn.onclick = () => { currentWeek = w; renderNav(); renderCards(); };
            nav.appendChild(btn);
        });
    }

    function renderCards() {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = "";
        
        // فلترة البيانات مع تجاهل المسافات الزائدة
        const filtered = allData.filter(row => {
            const weekValue = String(row["الأسابيع"] || "").trim();
            return weekValue === currentWeek;
        });

        if (filtered.length === 0) {
            container.innerHTML = <h3>لا توجد بيانات متوفرة لـ ${currentWeek}</h3>;
            return;
        }

        filtered.forEach(item => {
            container.innerHTML += `
                <div class="card">
                    <h3>${item["اسم المشرف"] || "غير مسجل"}</h3>
                    <p>تم التنفيذ: ${item["تم التنفيذ"] || 0}</p>
                    <p>نسبة الأسبوع: ${Math.round((item["نسبة الأسبوع"] || 0) * 100)}%</p>
                    <a href="${item["رابط"] || '#'}" target="_blank">فتح الرابط</a>
                </div>`;
        });
    }

    loadData();
</script>
</body>
</html>

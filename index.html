<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%); color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0; margin-bottom: 20px; }
        .nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 25px; }
        .btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); color: #fff; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 1.1em; }
        .btn.active { background: #ffd700; color: #1e3c72; border-color: #ffd700; box-shadow: 0 5px 15px rgba(255,215,0,0.4); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        .card { background: #fff; color: #333; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border-top: 5px solid #4caf50; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0; }
        .stat-box { text-align: center; padding: 10px 5px; border-radius: 12px; font-size: 0.85em; }
        .stat-box.done { background: #e8f5e9; color: #2e7d32; }
        .stat-box.pending { background: #fff3e0; color: #ef6c00; }
        .stat-box.failed { background: #ffebee; color: #c62828; }
        .stat-number { font-size: 1.4em; font-weight: bold; display: block; }
        .percent-section { background: #f8f9fa; padding: 15px; border-radius: 12px; }
        .progress-bar { background: #e0e0e0; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .fill { height: 100%; background: #4caf50; transition: width 1s; width: 0%; }
        .link-btn { display: block; width: 100%; text-align: center; margin-top: 15px; background: #2a5298; color: #fff; padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; }
        #status { text-align:center; padding:50px; font-size: 1.2em; color: rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>📊 لوحة متابعة المشرفين</h1><p>تحديث فوري من صفحة Dashboard</p></header>
        <div class="nav" id="weeks"></div>
        <div class="grid" id="cards"></div>
        <div id="status">جاري جلب البيانات...</div>
    </div>
    <script>
        // ✅ ضع الرابط الجديد الذي ينتهي بـ /exec هنا
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw2xbsBMzBgfTeFOG9uLxCLGXTWe-WcA0uRLcqLhEInsX5d6ObLDVkHzFOUTA8BOcdQYA/exec";
        let appData = { allData: [], currentWeek: 5 }; // الأسبوع الافتراضي: 5

        async function loadData() {
            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error("فشل الشبكة");
                appData.allData = await response.json();
                document.getElementById("status").style.display = "none";
                render();
            } catch (err) {
                document.getElementById("status").innerHTML = "❌ خطأ في تحميل البيانات. تأكد من نشر السكريبت كـ Anyone.";
            }
        }

        function render() {
            const nav = document.getElementById("weeks");
            nav.innerHTML = "";
            for(let i=1; i<=15; i++) {
                const btn = document.createElement("button");
                btn.className = "btn" + (i === appData.currentWeek ? " active" : "");
                btn.textContent = i;
                btn.onclick = () => { appData.currentWeek = i; render(); };
                nav.appendChild(btn);
            }
            const container = document.getElementById("cards");
            container.innerHTML = "";
            
            // ✅ الفلترة تعتمد على الأرقام المجردة (1-15)
            const weekData = appData.allData.filter(row => String(row["الأسابيع"]) === String(appData.currentWeek));
            
            if (weekData.length === 0) {
                container.innerHTML = <div style="text-align:center; grid-column: 1/-1; padding: 30px;">لا توجد بيانات للأسبوع ${appData.currentWeek} في صفحة Dashboard.</div>;
                return;
            }

            weekData.forEach(sup => {
                const weekP = sup["نسبة الأسبوع"] || 0;
                const totalP = sup["نسبة الكلية"] || 0;
                container.innerHTML += `
                    <div class="card">
                        <div style="text-align:center; margin-bottom:15px; color:#1e3c72;"><h3>${sup["اسم المشرف"]}</h3></div>
                        <div class="stats-grid">
                            <div class="stat-box done"><span class="stat-number">${sup["تم التنفيذ"] || 0}</span>تم</div>
                            <div class="stat-box pending"><span class="stat-number">${sup["جار التنفيذ"] || 0}</span>جاري</div>
                            <div class="stat-box failed"><span class="stat-number">${sup["لم ينفذ"] || 0}</span>لم ينفذ</div>
                        </div>
                        <div class="percent-section">
                            <div style="font-size:0.8em; display:flex; justify-content:space-between;"><span>إنجاز الأسبوع</span><span>${weekP}</span></div>
                            <div class="progress-bar"><div class="fill" style="width:${parseFloat(weekP)}%"></div></div>
                            <div style="font-size:0.8em; display:flex; justify-content:space-between; margin-top:10px;"><span>التراكمي (44)</span><span>${totalP}</span></div>
                            <div class="progress-bar"><div class="fill" style="width:${parseFloat(totalP)}%; background:#9c27b0;"></div></div>
                        </div>
                        <a href="${sup["رابط"] || '#'}" target="_blank" class="link-btn">🔗 فتح الاستمارة</a>
                    </div>`;
            });
        }
        loadData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة متابعة المشرفين</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #163b7a 0%, #1e4e97 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 18px 0 10px;
    }

    header h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,.28);
    }

    header p {
      font-size: 1.05rem;
      opacity: .95;
      margin-bottom: 14px;
    }

    .manager-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
      backdrop-filter: blur(8px);
      font-size: .95rem;
    }

    .top-actions {
      margin-top: 12px;
    }

    .toolbar {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin: 18px 0 6px;
    }

    .term-nav,
    .week-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
    }

    .term-btn {
      min-width: 190px;
      min-height: 88px;
      border: none;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 30px;
      cursor: pointer;
      background: rgba(255,255,255,.10);
      border: 2px solid rgba(255,255,255,.20);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15), 0 10px 25px rgba(0,0,0,.12);
      transition: .2s ease;
    }

    .term-btn.active {
      background: linear-gradient(135deg, #ffe000, #ffcc00);
      color: #1e3a63;
      border-color: rgba(255,255,255,.32);
      box-shadow: 0 0 18px rgba(255, 225, 0, .55);
    }

    .term-btn:hover,
    .week-btn:hover,
    .action-btn:hover,
    .toggle-btn:hover,
    .link-btn:hover,
    .whatsapp-btn:hover {
      transform: translateY(-1px);
    }

    .display-label {
      text-align: center;
      font-size: 1rem;
      opacity: .95;
      margin-bottom: 4px;
    }

    .week-btn {
      width: 86px;
      height: 66px;
      border-radius: 28px;
      border: 2px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.07);
      color: rgba(255,255,255,.88);
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
      transition: .2s ease;
    }

    .week-btn.active {
      background: rgba(255,255,255,.10);
      border-color: rgba(147, 197, 253, .7);
      box-shadow: 0 0 18px rgba(147,197,253,.55);
    }

    .week-btn.empty {
      opacity: .45;
    }

    .filter-row {
      width: min(100%, 430px);
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 2px;
    }

    .filter-label {
      font-size: .98rem;
      opacity: .95;
      text-align: center;
    }

    .filter-select {
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 18px;
      background: rgba(255,255,255,.10);
      color: #fff;
      padding: 14px 16px;
      font-size: 1rem;
      outline: none;
      text-align: center;
      text-align-last: center;
      cursor: pointer;
    }

    .filter-select option {
      color: #111;
    }

    .more-cards-wrap {
      display: none;
      justify-content: center;
      margin-top: 16px;
    }

    .more-cards-wrap.show {
      display: flex;
    }

    .more-cards-btn {
      min-width: 220px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 18px;
      background: rgba(255,255,255,.11);
      color: #fff;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .stats-top {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 16px;
      margin: 24px 0;
    }

    .top-card {
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 28px;
      padding: 24px 16px;
      text-align: center;
      box-shadow: 0 10px 28px rgba(0,0,0,.12);
      backdrop-filter: blur(8px);
    }

    .top-card .num {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .top-card .label {
      font-size: 1.05rem;
      opacity: .96;
      line-height: 1.8;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 18px;
      margin-top: 12px;
    }

    .card {
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 12px 32px rgba(0,0,0,.14);
      backdrop-filter: blur(8px);
    }

    .card-header {
      text-align: center;
      margin-bottom: 16px;
    }

    .card-header h3 {
      font-size: 1.55rem;
      line-height: 1.7;
      margin-bottom: 10px;
    }

    .week-badge {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      font-size: .98rem;
    }

    .toggle-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      color: #fff;
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.16);
      font-size: 1rem;
      margin-bottom: 14px;
    }

    .indicators-list {
      display: none;
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
    }

    .indicators-list.open {
      display: block;
    }

    .indicator-item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      background: rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .indicator-item:last-child {
      margin-bottom: 0;
    }

    .domain-block {
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 16px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
    }

    .domain-title {
      font-size: .98rem;
      font-weight: 800;
      margin-bottom: 10px;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(255,255,255,.10);
      text-align: center;
    }

    .indicator-main {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .indicator-code {
      font-size: .82rem;
      opacity: .9;
      font-weight: 700;
      direction: ltr;
      text-align: right;
    }

    .indicator-domain-badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 700;
      background: rgba(147,197,253,.18);
      color: #e7f2ff;
      border: 1px solid rgba(147,197,253,.18);
      align-self: flex-start;
    }

    .domain-summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .domain-mini {
      text-align: center;
      padding: 12px 10px;
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
    }

    .domain-mini-name {
      font-size: .9rem;
      line-height: 1.7;
      margin-bottom: 4px;
    }

    .domain-mini-num {
      font-size: 1.35rem;
      font-weight: 800;
    }

    .achievement-box {
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 22px;
      padding: 16px;
      margin-top: 14px;
      text-align: center;
    }

    .duplicate-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: 16px;
      background: rgba(239, 68, 68, .16);
      border: 1px solid rgba(239, 68, 68, .35);
      color: #fff5f5;
    }

    .duplicate-title {
      font-weight: 800;
      margin-bottom: 8px;
      text-align: center;
    }

    .duplicate-item {
      font-size: .92rem;
      line-height: 1.9;
      text-align: center;
    }


    .achievement-title {
      font-size: 1.15rem;
      margin-bottom: 8px;
      line-height: 1.8;
    }

    .achievement-value {
      font-size: 2.6rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .domain-mini-percent {
      font-size: .82rem;
      opacity: .95;
      margin-top: 4px;
    }



    .indicator-text {
      flex: 1;
      font-size: .95rem;
      line-height: 1.9;
      word-break: break-word;
    }

    .indicator-status {
      white-space: nowrap;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: .8rem;
      font-weight: 700;
    }

    .status-done { background: rgba(34,197,94,.18); color: #dbffe8; }
    .status-pending { background: rgba(245,158,11,.18); color: #fff4d4; }
    .status-not-done { background: rgba(239,68,68,.18); color: #ffe0e0; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 16px 0;
    }

    .stat-box {
      text-align: center;
      padding: 16px 10px;
      border-radius: 20px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.12);
    }

    .stat-box.done { background: rgba(22,163,74,.18); }
    .stat-box.pending { background: rgba(245,158,11,.14); }
    .stat-box.notdone { background: rgba(239,68,68,.14); }

    .stat-number {
      display: block;
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 1rem;
      opacity: .96;
    }

    .summary-box,
    .note-box {
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 22px;
      padding: 16px;
      margin-top: 14px;
    }

    .summary-box h4 {
      text-align: center;
      font-size: 1.2rem;
      line-height: 1.8;
      margin-bottom: 10px;
    }

    .big-number {
      text-align: center;
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .small-text {
      text-align: center;
      font-size: 1.05rem;
      opacity: .95;
      line-height: 1.8;
    }

    .progress-section {
      margin-top: 14px;
    }

    .progress-item {
      margin-bottom: 16px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 1rem;
      line-height: 1.7;
    }

    .progress {
      width: 100%;
      height: 22px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.10);
    }

    .bar {
      height: 100%;
      min-width: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .85rem;
      font-weight: 800;
      border-radius: 999px;
      color: #fff;
    }

    .bar.high { background: linear-gradient(135deg, #16a34a, #22c55e); }
    .bar.medium { background: linear-gradient(135deg, #d97706, #f59e0b); }
    .bar.low { background: linear-gradient(135deg, #dc2626, #ef4444); }
    .bar.purple { background: linear-gradient(135deg, #7c3aed, #a855f7); }

    .link-btn,
    .whatsapp-btn,
    .action-btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      border: none;
      text-decoration: none;
      cursor: pointer;
      color: #fff;
      border-radius: 18px;
      padding: 14px 16px;
      margin-top: 14px;
      font-size: 1rem;
      font-weight: 700;
    }

    .link-btn { background: linear-gradient(135deg, #0ea5e9, #0284c7); }
    .whatsapp-btn { background: linear-gradient(135deg, #16a34a, #22c55e); }
    .action-btn { background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.16); }

    .link-btn.disabled {
      background: rgba(255,255,255,.15);
      cursor: not-allowed;
      opacity: .7;
    }

    .note-textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 14px;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-family: inherit;
      outline: none;
      font-size: 1rem;
    }

    .wa-templates {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 12px;
      width: 100%;
      align-items: stretch;
    }

    .wa-mini-btn {
      flex: 1 1 0;
      min-width: 0;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      color: #fff;
      padding: 10px 4px;
      font-size: .80rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 44px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-textarea::placeholder {
      color: rgba(255,255,255,.72);
    }

    .empty-state,
    .error-box {
      grid-column: 1 / -1;
      text-align: center;
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 26px;
      padding: 34px 20px;
      box-shadow: 0 12px 28px rgba(0,0,0,.12);
    }

    .empty-icon {
      font-size: 2.4rem;
      margin-bottom: 8px;
    }

    .empty-state h3,
    .error-box h3 {
      margin-bottom: 8px;
      font-size: 1.6rem;
    }

    .empty-state p,
    .error-box p {
      opacity: .95;
      line-height: 1.9;
      font-size: 1rem;
    }

    .login-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .login-box {
      width: 100%;
      max-width: 420px;
      text-align: center;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 30px;
      padding: 28px 24px;
      box-shadow: 0 18px 40px rgba(0,0,0,.24);
    }

    .login-box h2 {
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .login-box p {
      font-size: 1.05rem;
      line-height: 1.9;
      opacity: .95;
      margin-bottom: 18px;
    }

    .pin-input {
      width: 100%;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 20px;
      background: rgba(255,255,255,.10);
      padding: 16px;
      color: #fff;
      text-align: center;
      font-size: 1.25rem;
      letter-spacing: 4px;
      outline: none;
      margin-bottom: 14px;
    }

    .pin-input::placeholder {
      color: rgba(255,255,255,.7);
      letter-spacing: 0;
    }

    .login-btn {
      width: 100%;
      border: none;
      cursor: pointer;
      border-radius: 20px;
      padding: 16px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #fff;
      font-size: 1.15rem;
      font-weight: 800;
    }

    .login-error {
      display: none;
      margin-top: 12px;
      background: rgba(239,68,68,.18);
      color: #ffe0e0;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 10px 12px;
      font-size: .96rem;
    }

    .footer-mini {
      text-align: center;
      margin-top: 18px;
      opacity: .92;
      font-size: 1rem;
    }

    @media (max-width: 720px) {
      .wa-templates {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      margin-bottom: 12px;
      width: 100%;
      align-items: stretch;
    }

    .wa-mini-btn {
      flex: 1 1 0;
      min-width: 0;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      color: #fff;
      padding: 10px 4px;
      font-size: .80rem;
      font-weight: 700;
      cursor: pointer;
      min-height: 44px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
      body { padding: 14px; }
      header h1 { font-size: 1.9rem; }
      .term-btn { min-width: 170px; min-height: 78px; }
      .week-btn { width: 66px; height: 58px; border-radius: 22px; }
      .stats-grid { gap: 10px; }
      .stat-number { font-size: 1.7rem; }
      .card-header h3 { font-size: 1.35rem; }
      .cards-grid { grid-template-columns: 1fr; gap: 14px; }
      .filter-row { width: 100%; }
      .more-cards-btn { width: 100%; }
      .wa-templates { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="loginOverlay" class="login-overlay">
    <div class="login-box">
      <h2>دخول المدراء</h2>
      <p>أدخل كلمة المرور لفتح لوحة المتابعة الخاصة بك</p>
      <input id="pinInput" class="pin-input" type="password" maxlength="4" inputmode="numeric" placeholder="••••" />
      <button id="loginBtn" class="login-btn">دخول</button>
      <div id="loginError" class="login-error">كلمة المرور غير صحيحة</div>
    </div>
  </div>

  <div class="container">
    <header>
      <h1>📊 لوحة متابعة المشرفين</h1>
      <p>متابعة تنفيذ المؤشرات الأسبوعية</p>
      <div id="managerBadge" class="manager-badge" style="display:none;"></div>
      <div class="top-actions">
        <button id="logoutBtn" class="action-btn" style="display:none;">خروج</button>
      </div>
    </header>

    <div class="toolbar">
      <div id="termNav" class="term-nav"></div>
      <div class="display-label" id="currentDisplayLabel"></div>
      <div id="weekNav" class="week-nav"></div>
      <div class="filter-row">
        <label class="filter-label" for="supervisorFilter">اسم المشرف / المشرفة</label>
        <select id="supervisorFilter" class="filter-select"></select>
      </div>
    </div>

    <div class="stats-top">
      <div class="top-card">
        <div class="num" id="topSupervisors">0</div>
        <div class="label">عدد المشرفين في هذا العرض</div>
      </div>
      <div class="top-card">
        <div class="num" id="topDone">0</div>
        <div class="label">إجمالي تم التنفيذ</div>
      </div>
      <div class="top-card">
        <div class="num" id="topPending">0</div>
        <div class="label">إجمالي جاري التنفيذ</div>
      </div>
      <div class="top-card">
        <div class="num" id="topNotDone">0</div>
        <div class="label">إجمالي لم ينفذ</div>
      </div>
    </div>

    <div id="cards" class="cards-grid"></div>
    <div id="moreCardsWrap" class="more-cards-wrap"></div>

    <div class="footer-mini">
      آخر تحديث: <span id="updateTime">--:--</span>
    </div>
  </div>

  <script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?gid=338445358&single=true&output=csv";
    const MANAGERS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?gid=719031885&single=true&output=csv";
    const TIME_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?gid=978733615&single=true&output=csv";
    const INDICATORS_URL = "https://docs.google.com/spreadsheets/d/17Bf1TEoRC2h_uWh8eZOEo-Fus5lgVzalyU9ByR1o/gviz/tq?tqx=out:csv&sheet=IndicatorsMap";
    const SUPERVISORS_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?gid=132149077&single=true&output=csv";

    const TOTAL_INDICATORS = 44;

    function normalizeArabicDigits(value) {
      return String(value || "").replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d)).trim();
    }

    
function normalizeStatus(status){
  const s = String(status || "").trim();
  if (s.includes("تم")) return "done";
  if (s.includes("جار")) return "pending";
  return "notdone";
}

function normalizeKey(value) {
      return String(value || "").trim().toLowerCase().replace(/\s+/g, " ");

    function normalizeTermText(value) {
      return String(value || "")
        .replace(/\u200f|\u200e|\u202a|\u202b|\u202c|\u202d|\u202e/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function escapeJs(value) {
      return String(value ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    function parseCSV(csvText) {
      const rows = [];
      let row = [];
      let field = "";
      let inQuotes = false;

      for (let i = 0; i < csvText.length; i++) {
        const char = csvText[i];
        const next = csvText[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            field += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(field);
          field = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i++;
          row.push(field);
          if (row.some(cell => String(cell).trim() !== "")) rows.push(row);
          row = [];
          field = "";
        } else {
          field += char;
        }
      }

      if (field.length || row.length) {
        row.push(field);
        if (row.some(cell => String(cell).trim() !== "")) rows.push(row);
      }

      if (!rows.length) return [];

      const headers = rows[0].map(h => String(h || "").trim());
      return rows.slice(1).map(cols => {
        const obj = {};
        headers.forEach((h, idx) => {
          obj[h] = cols[idx] !== undefined ? cols[idx] : "";
        });
        return obj;
      });
    }

    }

          return String(row[key]).trim();
        }
      }
      return "";
    }

    function normalizePhone(value) {
      const digits = String(value || "").replace(/[^\d]/g, "");
      if (digits.startsWith("966")) return digits;
      if (digits.startsWith("05")) return "966" + digits.substring(1);
      if (digits.startsWith("5")) return "966" + digits;
      return digits;
    }

      if (cleanPhone.startsWith("05")) cleanPhone = "966" + cleanPhone.substring(1);

    function getTemplateTitle(termText, weekText) {
      const cleanTerm = String(termText || "").trim();
      const cleanWeek = String(weekText || "").trim();

      if (!cleanTerm && !cleanWeek) return "";
      if (!cleanTerm) return `الأسبوع ${cleanWeek}`;
      if (!cleanWeek) return cleanTerm;

      return `${cleanTerm} - الأسبوع ${cleanWeek}`;
    }

    function parseArabicDate(value) {
      const s = normalizeArabicDigits(value || "");
      if (!s) return null;

      const patterns = [
        /^(\d{1,2})\/(\d{1,2})\/(\d{4})$/,
        /^(\d{4})\/(\d{1,2})\/(\d{1,2})$/,
        /^(\d{1,2})-(\d{1,2})-(\d{4})$/,
        /^(\d{4})-(\d{1,2})-(\d{1,2})$/
      ];

      for (const p of patterns) {
        const m = s.match(p);
        if (!m) continue;

        let year, month, day;

        if (p === patterns[1] || p === patterns[3]) {
          year = Number(m[1]);
          month = Number(m[2]) - 1;
          day = Number(m[3]);
        } else {
          day = Number(m[1]);
          month = Number(m[2]) - 1;
          year = Number(m[3]);
        }

        const d = new Date(year, month, day);
        if (!isNaN(d.getTime())) {
          d.setHours(12, 0, 0, 0);
          return d;
        }
      }

      return null;
    }

    function parseTimestamp(value) {
      const s = normalizeArabicDigits(value || "");
      if (!s) return null;

      const patterns = [
        /(\d{4})\/(\d{1,2})\/(\d{1,2})/,
        /(\d{4})-(\d{1,2})-(\d{1,2})/,
        /(\d{1,2})\/(\d{1,2})\/(\d{4})/,
        /(\d{1,2})-(\d{1,2})-(\d{4})/
      ];

      for (const p of patterns) {
        const m = s.match(p);
        if (!m) continue;

        let year, month, day;
        if (p === patterns[0] || p === patterns[1]) {
          year = Number(m[1]);
          month = Number(m[2]) - 1;
          day = Number(m[3]);
        } else {
          day = Number(m[1]);
          month = Number(m[2]) - 1;
          year = Number(m[3]);
        }

        const d = new Date(year, month, day);
        if (!isNaN(d.getTime())) {
          d.setHours(12, 0, 0, 0);
          return d;
        }
      }

      return null;
    }

    function getWeekNumberFromRow(raw) {
      const weekText = getValueByKeys(raw, [
        "رقم الأسبوع",
        "الأسبوع",
        "اسم الأسبوع",
        "week",
        "week_name",
        "week_number"
      ]);

      const text = normalizeArabicDigits(weekText || "");
      const directNum = parseInt(text, 10);
      if (!isNaN(directNum) && directNum >= 1 && directNum <= 16) return directNum;

      const orderedWeekNames = Object.keys(WEEK_NAME_TO_NUMBER).sort((a, b) => b.length - a.length);
      for (const name of orderedWeekNames) {
        if (text.includes(name)) return WEEK_NAME_TO_NUMBER[name];
      }

      return 1;
    }

    function splitIndicators(text) {
  const raw = String(text || "").trim();
  if (!raw) return [];

  const regex = /([0-9]+(?:-[0-9]+)+)\s*([^]*?)(?=(?:[0-9]+(?:-[0-9]+)+)\s*|$)/g;
  const matches = [...raw.matchAll(regex)];

  if (matches.length) {
    return matches.map(m => {
      const code = (m[1] || "").trim();
      const fallbackText = (m[2] || "").trim();
      const mapped = indicatorsMap[code] || {};
      const textValue = mapped.text || fallbackText || code;
      const domain = mapped.domain || "غير محدد";
      return { code, text: textValue, domain, full: code ? `${code} | ${textValue}` : textValue };
    });
  }

  return raw.split(",").map(s => s.trim()).filter(Boolean).map(item => {
    const match = item.match(/([0-9]+(?:-[0-9]+)+)/);
    const code = match ? match[1] : "";
    const mapped = code ? (INDICATORS_MAP[code] || {}) : {};
    const textValue = mapped.text || item;
    const domain = mapped.domain || "غير محدد";
    return { code, text: textValue, domain, full: code ? `${code} | ${textValue}` : textValue };
  });
}

            termNum: row.termName.includes("الثاني") ? 2 : 1,
            termName: row.termName
          };
        }
      }
      return null;
    }

    function detectCurrentTermAndWeekFromToday() {
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      let currentTerm = 1;
      let termStart = null;

      for (const row of timeRows) {
        if (today >= row.start && today <= row.end) {
          currentTerm = row.termName.includes("الثاني") ? 2 : 1;
          termStart = row.start;
          break;
        }
      }

      appData.currentTerm = currentTerm;

      if (termStart) {
        const diffDays = Math.floor((today - termStart) / (1000 * 60 * 60 * 24));
        appData.currentWeek = Math.min(16, Math.max(1, Math.floor(diffDays / 7) + 1));
      } else {
        appData.currentWeek = 1;
      }
    }

    
function getManagerGender(){
  const key = normalizeKey(selectedManager);
  return managerMap[key]?.gender || "male";
}

function getManagerDisplayName(managerKey) {
      const key = normalizeKey(managerKey);
      return managerMap[key]?.name || managerKey || "";
    }

    function isKnownManager(managerKey) {
      return !!managerMap[normalizeKey(managerKey || "")];
    }

    function getResponseDate(raw) {
      return parseTimestamp(getValueByKeys(raw, [
        "طابع زمني",
        "Timestamp",
        "الطابع الزمني",
        "التاريخ",
        "وقت الإرسال",
        "وقت الارسال"
      ]));
    }

    function getExplicitTermNumber(raw) {
      const explicitTermText = normalizeTermText(getValueByKeys(raw, [
        "الفصل الدراسي",
        "الفصل"
      ]));

      if (!explicitTermText) return null;
      if (explicitTermText.includes("الثاني")) return 2;
      if (explicitTermText.includes("الأول") || explicitTermText.includes("الاول")) return 1;
      return null;
    }

    function mapRow(raw) {
      const supervisor = getValueByKeys(raw, [
        "اسم المشرف",
        "المشرف"
      ]);

      const managerName = getValueByKeys(raw, [
        "manager_name",
        "اسم المدير",
        "المدير"
      ]);

      const managerKey = normalizeKey(
        getValueByKeys(raw, [
          "manager_key",
          "معرف المدير",
          "slug",
          "key"
        ]) || managerName
      );

      const status = getValueByKeys(raw, [
        "الحالة",
        "status"
      ]) || "لم ينفذ";

      const indicatorNumber = getValueByKeys(raw, [
        "رقم المؤشر",
        "رقم_المؤشر",
        "indicator_number"
      ]);

      const indicatorText = getValueByKeys(raw, [
        "المؤشر",
        "المؤشرات",
        "اسم المؤشر",
        "نص المؤشر",
        "indicator_text"
      ]);

      const combinedIndicator =
        [indicatorNumber, indicatorText].filter(Boolean).join(" - ") ||
        indicatorText ||
        indicatorNumber ||
        "";

      const responseDate = getResponseDate(raw);
      const detectedTerm = getTermInfoByDate(responseDate);
      const explicitTermNum = getExplicitTermNumber(raw);
      const termNum = explicitTermNum || (detectedTerm ? detectedTerm.termNum : 1);

      return {
        ...raw,
        __supervisor: supervisor,
        __managerName: managerName,
        __managerKey: managerKey,
        __status: status,
        __indicatorText: combinedIndicator,
        __link: findBestLinkInRow(raw),
        __phone: normalizePhone(getValueByKeys(raw, [
          "رقم الجوال",
          "الجوال",
          "الهاتف"
        ])),
        __responseDate: responseDate,
        __term: termNum,
        __weekNum: getWeekNumberFromRow(raw)
      };
    }

    async function loadData() {
      try {
        isDataLoaded = false;
        await Promise.all([loadManagers(), loadTimeSheet(), loadIndicatorsMap(), loadSupervisorsPhones()]);

        const text = await fetchText(SHEET_URL);
        const rows = parseCSV(text);
        appData.allData = rows.map(mapRow);

        detectCurrentTermAndWeekFromToday();
        if (selectedManager) syncCurrentWeekToAvailableData();

        isDataLoaded = true;
        document.getElementById("loginOverlay").style.display = selectedManager ? "none" : "flex";
        updateManagerBadge();
        renderTerms();
        renderWeeks();
        renderSupervisorFilter();
        renderCards();
        window.scrollTo(0, 0);
        updateTimestamp();
      } catch (error) {
        console.error(error);
        showError("تعذر تحميل البيانات");
      }
    }

    async function handleLogin() {
      const pin = document.getElementById("pinInput").value.trim();
      const errorBox = document.getElementById("loginError");
      const loginBtn = document.getElementById("loginBtn");

      if (!pin) {
        errorBox.textContent = "أدخل كلمة المرور";
        errorBox.style.display = "block";
        return;
      }

      try {
        if (!Object.keys(pinToManager).length) await loadManagers();

        if (!pinToManager[pin]) {
          errorBox.textContent = "كلمة المرور غير صحيحة";
          errorBox.style.display = "block";
          return;
        }

        if (!isDataLoaded) {
          loginBtn.disabled = true;
          loginBtn.textContent = "جار التحميل...";
          await loadData();
        }

        selectedManager = pinToManager[pin];
        sessionStorage.setItem("manager", selectedManager);
        syncCurrentWeekToAvailableData();

        errorBox.style.display = "none";
        document.getElementById("loginOverlay").style.display = "none";

        updateManagerBadge();
        renderTerms();
        renderWeeks();
        renderSupervisorFilter();
        renderCards();

        loginBtn.disabled = false;
        loginBtn.textContent = "دخول";
      } catch (error) {
        console.error(error);
        loginBtn.disabled = false;
        loginBtn.textContent = "دخول";
        errorBox.textContent = "تعذر التحقق من كلمة المرور";
        errorBox.style.display = "block";
      }
    }

    function logoutManager() {
      selectedManager = "";
      sessionStorage.removeItem("manager");
      localStorage.removeItem("manager");
      document.getElementById("pinInput").value = "";
      document.getElementById("loginError").style.display = "none";
      document.getElementById("loginOverlay").style.display = "flex";
      appData.currentSupervisor = "";
      appData.mobileExpanded = false;
      renderSupervisorFilter();
      updateManagerBadge();
      renderCards();
      updateTopStats([], {});
    }

    function updateManagerBadge() {
      const badge = document.getElementById("managerBadge");
      const logoutBtn = document.getElementById("logoutBtn");

      if (selectedManager) {
        badge.style.display = "inline-block";
        badge.textContent = `👔 ${escapeHtml(getManagerDisplayName(selectedManager))}`;
        logoutBtn.style.display = "inline-block";
      } else {
        badge.style.display = "none";
        logoutBtn.style.display = "none";
      }
    }

    function getVisibleData() {
      return appData.allData.filter(row => {
        const sameTerm = Number(row.__term || 1) === Number(appData.currentTerm);
        const sameManager =
          normalizeKey(row.__managerKey || "") === normalizeKey(selectedManager) ||
          normalizeKey(row.__managerName || "") === normalizeKey(selectedManager);
        return sameTerm && sameManager;
      });
    }

    function getSupervisorOptions() {
      return [...new Set(
        getVisibleData()
          .map(row => String(row.__supervisor || "").trim())
          .filter(Boolean)
      )].sort((a, b) => a.localeCompare(b, "ar"));
    }

    function renderSupervisorFilter() {
      const select = document.getElementById("supervisorFilter");
      if (!select) return;

      const options = getSupervisorOptions();
      const current = options.includes(appData.currentSupervisor) ? appData.currentSupervisor : "";
      if (appData.currentSupervisor && !current) appData.currentSupervisor = "";

      select.innerHTML = [
        `<option value="">الكل</option>`,
        ...options.map(name => `<option value="${escapeAttr(name)}">${escapeHtml(name)}</option>`)
      ].join("");
      select.value = current;
      select.disabled = !selectedManager || !options.length;
    }

    function getFilteredWeekRows(rows) {
      if (!appData.currentSupervisor) return rows;
      return rows.filter(row => String(row.__supervisor || "").trim() === appData.currentSupervisor);
    }

    function isMobileView() {
      return window.innerWidth <= 720;
    }


    function groupIndicatorsByDomain(indicators) {
      const grouped = {};
      indicators.forEach(ind => {
        const domain = ind.domain || "غير محدد";
        if (!grouped[domain]) grouped[domain] = [];
        grouped[domain].push(ind);
      });
      return grouped;
    }

    function getDomainOrder() {
      return ["الإدارة المدرسية", "التعليم والتعلم", "نواتج التعلم", "البيئة المدرسية", "غير محدد"];
    }

    

    function buildDomainSummaryHtml(domainCounts) {
      const domains = getDomainOrder()
        .map(domain => {
          const count = domainCounts[domain] || 0;
          const total = domainTotals[domain] || 0;
          const percent = total ? (count / total) * 100 : 0;
          return { domain, count, total, percent };
        })
        .filter(item => item.count > 0);

      if (!domains.length) return "";

      domains.sort((a, b) => b.percent - a.percent);

      return `
        <div class="summary-box">
          <h4>🧭 التقدم داخل المجالات</h4>
          <div class="domain-summary-grid">
            ${domains.map(item => `
              <div class="domain-mini">
                <div class="domain-mini-name">${escapeHtml(item.domain)}</div>
                <div class="domain-mini-num">${item.count} من ${item.total || 0}</div>
                <div class="domain-mini-percent">${item.percent.toFixed(2)}%</div>
                <div style="margin-top:8px;">
                  <div style="background: rgba(255,255,255,0.15); border-radius: 10px; overflow: hidden; height: 8px;">
                    <div style="width:${Math.max(0, Math.min(item.percent, 100))}%; height:100%; background: linear-gradient(90deg,#00c853,#64dd17);"></div>
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
      `;
    }

    function renderMoreCardsButton(totalCards, showingCards) {
      const wrap = document.getElementById("moreCardsWrap");
      if (!wrap) return;
      wrap.className = "more-cards-wrap";
      wrap.innerHTML = "";

      if (!isMobileView() || totalCards <= showingCards) return;

      const remaining = totalCards - showingCards;
      const btn = document.createElement("button");
      btn.className = "more-cards-btn";
      btn.textContent = appData.mobileExpanded ? "عرض أقل" : `عرض المزيد (${remaining})`;
      btn.onclick = () => {
        appData.mobileExpanded = !appData.mobileExpanded;
        renderCards();
      };
      wrap.appendChild(btn);
      wrap.classList.add("show");
    }

    function syncCurrentWeekToAvailableData() {
      const visible = getVisibleData();
      const availableWeeks = [...new Set(
        visible.map(row => Number(row.__weekNum || 0)).filter(Boolean)
      )].sort((a, b) => a - b);

      if (!availableWeeks.length) {
        appData.currentWeek = 1;
        return;
      }

      if (!availableWeeks.includes(Number(appData.currentWeek))) {
        appData.currentWeek = availableWeeks[0];
      }
    }

    function updateTopStats(filteredData, supervisorsMap) {
      let done = 0, pending = 0, notDone = 0;

      filteredData.forEach(row => {
        const countToAdd = splitIndicators(row.__indicatorText).length || 1;
        const st = normalizeStatus(row.__status);
        if (st === "done") done += countToAdd;
        else if (st === "pending") pending += countToAdd;
        else notDone += countToAdd;
      });

      document.getElementById("topSupervisors").textContent = Object.keys(supervisorsMap).length;
      const gender = getManagerGender();
      const labelEl = document.querySelector("#topSupervisors").parentElement.querySelector(".label");
      if(labelEl){
        labelEl.textContent = gender === "female" ? "عدد المشرفات في هذا العرض" : "عدد المشرفين في هذا العرض";
      }
      document.getElementById("topDone").textContent = done;
      document.getElementById("topPending").textContent = pending;
      document.getElementById("topNotDone").textContent = notDone;
    }

    function renderTerms() {
      const container = document.getElementById("termNav");
      const label = document.getElementById("currentDisplayLabel");
      container.innerHTML = "";

      TERMS.forEach(termNum => {
        const btn = document.createElement("button");
        btn.className = "term-btn" + (termNum === appData.currentTerm ? " active" : "");
        btn.textContent = TERM_LABELS[termNum];
        btn.onclick = () => {
          appData.currentTerm = termNum;
          appData.currentWeek = 1;
          appData.mobileExpanded = false;
          syncCurrentWeekToAvailableData();
          renderTerms();
          renderWeeks();
          renderSupervisorFilter();
          renderCards();
        };
        container.appendChild(btn);
      });

      label.textContent = `العرض الحالي: ${TERM_LABELS[appData.currentTerm]}`;
    }

    function renderWeeks() {
      const container = document.getElementById("weekNav");
      container.innerHTML = "";

      const availableWeeks = [...new Set(
        getVisibleData().map(row => Number(row.__weekNum || 0)).filter(Boolean)
      )].sort((a, b) => a - b);

      ALL_WEEKS.forEach(weekNum => {
        const btn = document.createElement("button");
        btn.className = "week-btn";
        if (weekNum === appData.currentWeek) btn.classList.add("active");
        if (!availableWeeks.includes(weekNum)) btn.classList.add("empty");
        btn.textContent = weekNum;
        btn.onclick = () => {
          appData.currentWeek = weekNum;
          appData.mobileExpanded = false;
          renderWeeks();
          renderCards();
        };
        container.appendChild(btn);
      });
    }

    function toggleIndicators(index) {
      const el = document.getElementById(`indicators-${index}`);
      if (el) el.classList.toggle("open");
    }

    
    function renderCards() {
      const container = document.getElementById("cards");
      const moreWrap = document.getElementById("moreCardsWrap");
      container.innerHTML = "";
      if (moreWrap) {
        moreWrap.innerHTML = "";
        moreWrap.className = "more-cards-wrap";
      }

      if (!selectedManager) {
        container.innerHTML = "";
        updateTopStats([], {});
        return;
      }

      if (!isKnownManager(selectedManager)) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⚠️</div>
            <h3>رابط المدير غير صحيح</h3>
            <p>المدير غير موجود في قائمة المديرين.</p>
          </div>
        `;
        updateTopStats([], {});
        return;
      }

      const filteredData = getVisibleData();
      renderSupervisorFilter();

      if (!filteredData.length) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <h3>لا توجد بيانات لهذا العرض</h3>
            <p>لا توجد مؤشرات مرتبطة بهذا المدير في هذا الفصل حتى الآن.</p>
          </div>
        `;
        updateTopStats([], {});
        return;
      }

      const weekRows = filteredData.filter(row => Number(row.__weekNum || 0) === Number(appData.currentWeek));
      const shownRows = getFilteredWeekRows(weekRows);

      if (!shownRows.length) {
        const extra = appData.currentSupervisor ? ` للمشرف/ة ${escapeHtml(appData.currentSupervisor)}` : "";
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📭</div>
            <h3>لا توجد بيانات للأسبوع ${WEEK_NAMES[appData.currentWeek]}${extra}</h3>
            <p>جرّب اختيار أسبوع آخر أو عرض الكل من قائمة المشرفين.</p>
          </div>
        `;
        updateTopStats([], {});
        return;
      }

      const supervisorTotals = {};
      filteredData.forEach(row => {
        const name = row.__supervisor;
        if (!name) return;
        if (appData.currentSupervisor && name !== appData.currentSupervisor) return;

        if (!supervisorTotals[name]) {
          supervisorTotals[name] = {
            totalDoneAll: 0,
            uniqueDoneCodes: new Set(),
            duplicateDoneCodes: new Set()
          };
        }

        if (normalizeStatus(row.__status) === "done") {
          const items = splitIndicators(row.__indicatorText);
          items.forEach(item => {
            const code = String(item.code || "").trim();
            if (!code) return;
            if (supervisorTotals[name].uniqueDoneCodes.has(code)) {
              supervisorTotals[name].duplicateDoneCodes.add(code);
            } else {
              supervisorTotals[name].uniqueDoneCodes.add(code);
            }
          });
        }
      });

      Object.keys(supervisorTotals).forEach(name => {
        supervisorTotals[name].totalDoneAll = supervisorTotals[name].uniqueDoneCodes.size;
      });

      const supervisors = {};

      shownRows.forEach(row => {
        const name = row.__supervisor;
        if (!name) return;

        if (!supervisors[name]) {
          supervisors[name] = {
            name,
            managerName: row.__managerName || "",
            managerKey: row.__managerKey || "",
            phone: getSupervisorPhone(name, row.__managerKey || "", row.__phone || ""),
            doneCount: 0,
            pendingCount: 0,
            notDoneCount: 0,
            totalCount: 0,
            link: "",
            indicators: [],
            domainCounts: {},
            duplicateCodes: [],
            status: "لم ينفذ"
          };
        }

        const split = splitIndicators(row.__indicatorText);
        const countToAdd = split.length || 1;
        const status = row.__status || "";

        supervisors[name].totalCount += countToAdd;

        const st = normalizeStatus(status);
        if (st === "done") {
          supervisors[name].doneCount += countToAdd;
          supervisors[name].status = "تم التنفيذ";
        } else if (st === "pending") {
          supervisors[name].pendingCount += countToAdd;
          if (supervisors[name].status !== "تم التنفيذ") supervisors[name].status = "جار التنفيذ";
        } else {
          supervisors[name].notDoneCount += countToAdd;
          if (!supervisors[name].status || supervisors[name].status === "لم ينفذ") {
            supervisors[name].status = "لم ينفذ";
          }
        }

        if (split.length) {
          split.forEach(item => {
            supervisors[name].indicators.push({
              code: item.code || "",
              text: item.text || item.full || "بدون اسم مؤشر",
              domain: item.domain || "غير محدد",
              status: status || "لم ينفذ"
            });
            const domainKey = item.domain || "غير محدد";
            supervisors[name].domainCounts[domainKey] = (supervisors[name].domainCounts[domainKey] || 0) + 1;
          });
        } else {
          supervisors[name].indicators.push({
            code: "",
            text: "بدون اسم مؤشر",
            domain: "غير محدد",
            status: status || "لم ينفذ"
          });
          supervisors[name].domainCounts["غير محدد"] = (supervisors[name].domainCounts["غير محدد"] || 0) + 1;
        }

        if (row.__link && !supervisors[name].link) supervisors[name].link = row.__link;
      });

      updateTopStats(shownRows, supervisors);

      const supervisorList = Object.values(supervisors).sort((a, b) => a.name.localeCompare(b.name, "ar"));
      const mobileLimit = 4;
      displayedList = (isMobileView() && !appData.mobileExpanded) ? supervisorList.slice(0, mobileLimit) : supervisorList;

      displayedList.forEach((sup, index) => {
        sup.duplicateCodes = [...(supervisorTotals[sup.name]?.duplicateDoneCodes || new Set())];

        const totalDoneAll = supervisorTotals[sup.name]?.totalDoneAll || 0;
        const weekPercentNum = sup.totalCount ? (sup.doneCount / sup.totalCount) * 100 : 0;
        const totalPercentNum = (totalDoneAll / TOTAL_INDICATORS) * 100;
        const weekPercent = weekPercentNum.toFixed(2);
        const totalPercent = totalPercentNum.toFixed(2);
        const barClass = weekPercentNum >= 70 ? "high" : (weekPercentNum >= 40 ? "medium" : "low");

        let btnText = "المؤشرات";
        let icon = "⏳";
        let iconClass = "status-pending";

        if (sup.status === "تم التنفيذ") {
          btnText = "المؤشرات المنفذة";
          icon = "✅";
          iconClass = "status-done";
        } else if (sup.status.includes("جار")) {
          btnText = "المؤشرات قيد التنفيذ";
          icon = "⏳";
          iconClass = "status-pending";
        } else {
          btnText = "المؤشرات غير المنفذة";
          icon = "❌";
          iconClass = "status-not-done";
        }

        const groupedIndicators = groupIndicatorsByDomain(sup.indicators);
        const domainOrder = getDomainOrder();
        const indicatorsHtml = domainOrder
          .filter(domain => groupedIndicators[domain] && groupedIndicators[domain].length)
          .map(domain => `
            <div class="domain-block">
              <div class="domain-title">${escapeHtml(domain)} (${groupedIndicators[domain].length})</div>
              ${groupedIndicators[domain].map(ind => `
                <div class="indicator-item">
                  <div class="indicator-main">
                    ${ind.code ? `<div class="indicator-code">${escapeHtml(ind.code)}</div>` : ``}
                    <div class="indicator-text">${escapeHtml(ind.text)}</div>
                    <span class="indicator-domain-badge">${escapeHtml(ind.domain || "غير محدد")}</span>
                  </div>
                  <span class="indicator-status ${iconClass}">${icon} ${escapeHtml(ind.status)}</span>
                </div>
              `).join("")}
            </div>
          `).join("");

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <div class="card-header">
              <h3>${escapeHtml(sup.name)}</h3>
              <span class="week-badge">${TERM_LABELS[appData.currentTerm]} - الأسبوع ${WEEK_NAMES[appData.currentWeek]}</span>
            </div>

            <button class="toggle-btn" onclick="toggleIndicators(${index})">
              📋 عرض ${btnText} حسب المجالات (${sup.totalCount}) ▼
            </button>

            <div id="indicators-${index}" class="indicators-list">
              ${indicatorsHtml || `<div class="indicator-item"><div class="indicator-text">لا توجد مؤشرات</div></div>`}
            </div>

            <div class="stats-grid">
              <div class="stat-box done">
                <span class="stat-number">${sup.doneCount}</span>
                <div class="stat-label">✅ تم</div>
              </div>
              <div class="stat-box pending">
                <span class="stat-number">${sup.pendingCount}</span>
                <div class="stat-label">⏳ جاري</div>
              </div>
              <div class="stat-box notdone">
                <span class="stat-number">${sup.notDoneCount}</span>
                <div class="stat-label">❌ لم ينفذ</div>
              </div>
            </div>

            <div class="summary-box">
              <h4>📊 التقدم التراكمي للمؤشرات المنفذة (جميع أسابيع ${TERM_LABELS[appData.currentTerm]})</h4>
              <div class="big-number">${totalDoneAll}</div>
              <div class="small-text">من ${TOTAL_INDICATORS} مؤشر = ${totalPercent}%</div>
            </div>

            <div class="achievement-box">
              <div class="achievement-title">🎯 التقدم الكلي</div>
              <div class="achievement-value">${totalPercent}%</div>
              
            </div>

            ${buildDomainSummaryHtml(sup.domainCounts)}

            ${sup.duplicateCodes.length ? `
              <div class="duplicate-box">
                <div class="duplicate-title">⚠️ تنبيه: توجد مؤشرات مكررة ولم تُحسب</div>
                ${sup.duplicateCodes.map(code => `<div class="duplicate-item">${escapeHtml(code)}</div>`).join("")}
              </div>
            ` : ``}

            <div class="progress-section">
              <div class="progress-item">
                <div class="progress-label">
                  <span>أداء الأسبوع ${WEEK_NAMES[appData.currentWeek]}</span>
                  <span>${weekPercent}%</span>
                </div>
                <div class="progress">
                  <div class="bar ${barClass}" style="width:${Math.max(weekPercentNum, 3)}%">${weekPercent}%</div>
                </div>
              </div>

              <div class="progress-item">
                <div class="progress-label">
                  <span>التقدم الكلي من إجمالي المؤشرات (44)</span>
                  <span>${totalPercent}%</span>
                </div>
                <div class="progress">
                  <div class="bar purple" style="width:${Math.max(totalPercentNum, 3)}%">${totalPercent}%</div>
                </div>
              </div>
            </div>

            ${sup.link
              ? `<a class="link-btn" href="${escapeAttr(sup.link)}" target="_blank">🔗 فتح الاستمارة</a>`
              : `<button class="link-btn disabled" disabled>🔗 غير متاح</button>`
            }

            <div class="note-box">
              <div class="small-text" style="margin-bottom:6px;">اختر قالب رسالة واتساب</div>
              <div class="small-text" style="font-size:.92rem; opacity:.85; margin-bottom:12px;">عند الضغط سيفتح واتساب بهذه الصياغة الجاهزة</div>
              ${hasValidFormLink(sup.link || "") ? `
                <textarea id="note-${index}" class="note-textarea" placeholder="اكتب الملاحظة هنا..."></textarea>
                <div class="wa-templates">
                  <button class="wa-mini-btn" onclick="sendWhatsAppNote('${escapeJs(sup.phone)}','${escapeJs(sup.name)}','${escapeJs(TERM_LABELS[appData.currentTerm])}','${escapeJs(WEEK_NAMES[appData.currentWeek])}','note-${index}')">📝 ملاحظة (بعد الكتابة)</button>
                  <button class="wa-mini-btn" onclick="sendWhatsAppTemplate('${escapeJs(sup.phone)}','${escapeJs(sup.name)}','${escapeJs(TERM_LABELS[appData.currentTerm])}','${escapeJs(WEEK_NAMES[appData.currentWeek])}','praise')">👏 إشادة (إرسال مباشر)</button>
                </div>
              ` : `
                <div class="wa-templates">
                  <button class="wa-mini-btn" onclick="sendWhatsAppTemplate('${escapeJs(sup.phone)}','${escapeJs(sup.name)}','${escapeJs(TERM_LABELS[appData.currentTerm])}','${escapeJs(WEEK_NAMES[appData.currentWeek])}','reminder')">🔔 تذكير (إرسال مباشر)</button>
                </div>
              `}
            </div>
          `;
        container.appendChild(card);
      });

      renderMoreCardsButton(supervisorList.length, displayedList.length);
    }

    function buildWhatsAppMessage(type, supervisorName, termText, weekText, noteText = "") {
      const title = getTemplateTitle(termText, weekText);
      const cleanNote = String(noteText || "").trim();

      if (type === "reminder") {
        return `السلام عليكم ورحمة الله وبركاته

الأستاذ/ة: ${supervisorName}

نفيدكم بأن استمارة ${title} لم تُرفع حتى تاريخه.

نأمل منكم استكمال المتابعة ورفع المطلوب في الوقت المحدد، شاكرين لكم تعاونكم.`;
      }

      if (type === "note") {
        return `السلام عليكم ورحمة الله وبركاته

الأستاذ/ة: ${supervisorName}

نثمن حرصكم، ونفيدكم بوجود ملاحظة على الاستمارة المرفوعة الخاصة بـ ${title}.

📌 الملاحظة:
${cleanNote}

نأمل مراجعة الملحوظة والعمل بموجبها، والتواصل عند الحاجة.

شاكرين لكم تعاونكم.`;
      }

      if (type === "praise") {
        return `السلام عليكم ورحمة الله وبركاته

الأستاذ/ة: ${supervisorName}

نقدم لكم جزيل الشكر على استكمال بيانات الاستمارة الخاصة بـ ${title}، ونثمن دقة العمل وحسن المتابعة.

بارك الله فيكم، وشاكرين لكم تعاونكم.`;
      }

      return "";
    }

    function normalizeWhatsAppPhone(phone) {
      let cleanPhone = String(phone || "").replace(/\D/g, "");
      if (cleanPhone.startsWith("00")) cleanPhone = cleanPhone.slice(2);
      if (cleanPhone.startsWith("05")) cleanPhone = "966" + cleanPhone.substring(1);
      else if (cleanPhone.startsWith("5")) cleanPhone = "966" + cleanPhone;
      return cleanPhone;
    }

    function sendWhatsAppTemplate(phone, supervisorName, termText, weekText, type) {
      const cleanPhone = normalizeWhatsAppPhone(phone);
      if (!cleanPhone || cleanPhone.length < 9) {
        alert("رقم الجوال غير صالح");
        return;
      }

      const message = buildWhatsAppMessage(type, supervisorName, termText, weekText);
      if (!message) {
        alert("تعذر إنشاء الرسالة");
        return;
      }

      const url = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(message)}`;
      window.open(url, "_blank");
    }

    function sendWhatsAppNote(phone, supervisorName, termText, weekText, noteElementId) {
      const cleanPhone = normalizeWhatsAppPhone(phone);
      if (!cleanPhone || cleanPhone.length < 9) {
        alert("رقم الجوال غير صالح");
        return;
      }

      const noteElement = document.getElementById(noteElementId);
      const cleanNote = String(noteElement?.value || "").trim();
      if (!cleanNote) {
        alert("اكتب الملاحظة أولاً");
        return;
      }

      const message = buildWhatsAppMessage("note", supervisorName, termText, weekText, cleanNote);
      const url = `https://wa.me/${cleanPhone}?text=${encodeURIComponent(message)}`;
      window.open(url, "_blank");
    }

    function showError(msg) {
      document.getElementById("cards").innerHTML = `
        <div class="error-box">
          <h3>⚠️ ${escapeHtml(msg)}</h3>
          <p>تحقق من الروابط أو الاتصال ثم أعد المحاولة.</p>
          <button class="action-btn" onclick="loadData()">🔄 إعادة المحاولة</button>
        </div>
      `;
    }

    function updateTimestamp() {
      document.getElementById("updateTime").textContent = new Date().toLocaleTimeString("ar-SA", {
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function bindEvents() {
      document.getElementById("loginBtn").onclick = handleLogin;
      document.getElementById("logoutBtn").onclick = logoutManager;

      const supervisorFilter = document.getElementById("supervisorFilter");
      if (supervisorFilter) {
        supervisorFilter.onchange = function (e) {
          appData.currentSupervisor = e.target.value || "";
          appData.mobileExpanded = false;
          renderCards();
        };
      }

      window.addEventListener("resize", () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          const widthChanged = Math.abs(window.innerWidth - lastViewportWidth) > 80;
          const activeTag = document.activeElement ? document.activeElement.tagName : "";
          const isTyping = activeTag === "TEXTAREA" || activeTag === "INPUT";

          if (!widthChanged && isTyping) return;

          if (widthChanged) {
            lastViewportWidth = window.innerWidth;
            renderCards();
          }
        }, 120);
      });

      const pinInput = document.getElementById("pinInput");
      pinInput.oninput = function (e) {
        e.target.value = e.target.value.replace(/[^\d]/g, "").slice(0, 4);
        document.getElementById("loginError").style.display = "none";
      };
      pinInput.onkeydown = function (e) {
        if (e.key === "Enter") handleLogin();
      };
    }

    document.addEventListener("DOMContentLoaded", async () => {
      bindEvents();
      localStorage.removeItem("manager");
      selectedManager = sessionStorage.getItem("manager") || "";
      await loadData();
    });
  </script>
</body>
</html>

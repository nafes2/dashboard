<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين الذكية</title>
    <style>
        :root { --primary: #1e3c72; --secondary: #2a5298; --accent: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: #fff; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 25px 0; }
        .btn { background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); color: #fff; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn.active { background: var(--accent); color: var(--primary); border-color: var(--accent); box-shadow: 0 4px 15px rgba(255,215,0,0.4); }
        .card { background: #fff; color: #333; border-radius: 25px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); text-align: center; }
        .loading-box { background: #fff; color: #333; padding: 30px; border-radius: 20px; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .stat-box { padding: 15px; border-radius: 15px; font-weight: bold; }
        .stat-box.done { background: #e8f5e9; color: #2e7d32; }
        .stat-box.pending { background: #fff3e0; color: #ef6c00; }
        .stat-box.info { background: #e3f2fd; color: #1565c0; }
        .stat-number { font-size: 1.8em; display: block; }
        .total-panel { background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%); color: #fff; padding: 20px; border-radius: 20px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <header style="text-align:center;">
        <h1 id="title">لوحة متابعة المشرفين</h1>
        <p>تحديث مباشر ومستقر</p>
    </header>

    <div class="nav" id="weeksNav"></div>
    <div id="content">
        <div class="loading-box">جاري مزامنة البيانات من جوجل...</div>
    </div>
</div>

<script>
// الرابط المباشر
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";
const TOTAL_REQ = 44;

let appState = { allData: [], currentWeek: 2 };

// دالة ذكية لتحويل النص إلى رقم أسبوع (تحل مشكلة الهمزة والمسافات)
function extractWeekNum(text) {
    if (!text) return null;
    const match = text.toString().match(/\d+/);
    if (match) return parseInt(match[0]);
    const names = {"الأول":1,"الثاني":2,"الثالث":3,"الرابع":4,"الخامس":5,"السادس":6,"السابع":7,"الثامن":8,"التاسع":9,"العاشر":10};
    for (let name in names) if (text.includes(name)) return names[name];
    return null;
}

async function loadData() {
    try {
        const res = await fetch(`${SHEET_URL}&t=${Date.now()}`);
        const text = await res.text();
        appState.allData = parseCSV(text);
        render();
    } catch (e) {
        document.getElementById('content').innerHTML = `<div class="card">⚠️ فشل جلب البيانات. تأكد من نشر الشيت CSV.</div>`;
    }
}

function parseCSV(csv) {
    const rows = csv.split('\n').filter(r => r.trim());
    const headers = rows[0].split(',').map(h => h.replace(/"/g,'').trim());
    return rows.slice(1).map(row => {
        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,'').trim());
        let data = {};
        headers.forEach((h, i) => data[h] = cols[i] || "");
        return data;
    });
}

function render() {
    // 1. رسم أزرار الأسابيع
    const nav = document.getElementById('weeksNav');
    nav.innerHTML = '';
    for(let i=1; i<=15; i++){
        const b = document.createElement('button');
        b.className = `btn ${appState.currentWeek === i ? 'active' : ''}`;
        b.textContent = i;
        b.onclick = () => { appState.currentWeek = i; render(); };
        nav.appendChild(b);
    }

    // 2. معالجة البيانات
    const container = document.getElementById('content');
    const sample = appState.allData[0] || {};
    const nCol = Object.keys(sample).find(k => k.includes("مشرف"));
    const wCol = Object.keys(sample).find(k => k.includes("أسبوع") || k.includes("أسابيع"));
    const sCol = Object.keys(sample).find(k => k.includes("حالة"));

    // الإجمالي التراكمي
    const totals = {};
    appState.allData.forEach(r => {
        if (r[nCol] && r[sCol]?.includes("تنفيذ")) totals[r[nCol]] = (totals[r[nCol]] || 0) + 1;
    });

    // بيانات الأسبوع المختار
    const weekRows = appState.allData.filter(r => extractWeekNum(r[wCol]) === appState.currentWeek);

    if (weekRows.length === 0) {
        container.innerHTML = `<div class="card"><h3>لا توجد بيانات للأسبوع ${appState.currentWeek}</h3></div>`;
        return;
    }

    container.innerHTML = '';
    const sups = {};
    weekRows.forEach(r => {
        const n = r[nCol]; if(!n) return;
        if(!sups[n]) sups[n] = { n, week: 0, total: totals[n] || 0 };
        if(r[sCol]?.includes("تنفيذ")) sups[n].week++;
    });

    Object.values(sups).forEach(s => {
        const perc = ((s.total / TOTAL_REQ) * 100).toFixed(2);
        container.innerHTML += `
            <div class="card">
                <h2>${s.n}</h2>
                <div class="stats-grid">
                    <div class="stat-box done"><span class="stat-number">${s.week}</span>تم ✅</div>
                    <div class="stat-box pending"><span class="stat-number">0</span>جاري ⏳</div>
                    <div class="stat-box info"><span class="stat-number">${s.week}</span>هذا الأسبوع</div>
                </div>
                <div class="total-panel">
                    <p>📊 إجمالي المنفذ (جميع الأسابيع)</p>
                    <h1 style="font-size:3em;">${s.total}</h1>
                    <p>من ${TOTAL_REQ} مؤشر = ${perc}%</p>
                </div>
            </div>`;
    });
}

loadData();
</script>
</body>
</html>

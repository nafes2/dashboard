<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المتابعة الدقيق</title>
    <style>
        :root { --main-bg: #2a5298; --card-bg: #ffffff; --text-dark: #333; --accent: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--main-bg); color: #fff; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        .weeks-nav { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .week-btn { background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .week-btn.active { background: var(--accent); color: #1e3c72; border-color: var(--accent); transform: scale(1.1); }
        .supervisor-card { background: var(--card-bg); color: var(--text-dark); border-radius: 25px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        .name-header { color: #1e3c72; font-size: 1.5em; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .action-btn { background: #667eea; color: #fff; width: 100%; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .details-box { display: none; background: #f1f3f5; border-radius: 12px; padding: 15px; text-align: right; margin-bottom: 15px; border: 1px solid #dee2e6; }
        .details-box.active { display: block; }
        .indicator-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #e9ecef; font-size: 0.9em; }
        .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-item { padding: 12px 5px; border-radius: 15px; font-weight: bold; }
        .stat-item span { display: block; font-size: 1.7em; }
        .bg-green { background: #e8f5e9; color: #2e7d32; }
        .bg-orange { background: #fff3e0; color: #ef6c00; }
        .bg-blue { background: #e3f2fd; color: #1565c0; }
        .progress-section { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 15px; border-radius: 15px; margin-top: 10px; }
        .progress-section b { font-size: 2em; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="weeks-nav" id="navBar"></div>
    <div id="displayArea">جاري مزامنة البيانات...</div>
</div>

<script>
// إضافة عشوائية للرابط لمنع الكاش (Cache)
const DATA_SOURCE = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv&cache=" + Math.random();
const W_TEXT = {1:"الأول",2:"الثاني",3:"الثالث",4:"الرابع",5:"الخامس",6:"السادس",7:"السابع",8:"الثامن",9:"التاسع",10:"العاشر",11:"الحادي عشر",12:"الثاني عشر",13:"الثالث عشر",14:"الرابع عشر",15:"الخامس عشر"};

let masterData = [];
let selectedW = 2; // الأسبوع المطلوب مراجعته

async function fetchData() {
    try {
        const response = await fetch(DATA_SOURCE);
        const rawText = await response.text();
        masterData = processCSV(rawText);
        updateUI();
    } catch (err) { document.getElementById('displayArea').innerHTML = "فشل في تحديث البيانات"; }
}

function processCSV(text) {
    const lines = text.split(/\r?\n/);
    const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
    return lines.slice(1).map(line => {
        const values = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
        return headers.reduce((obj, h, i) => ({ ...obj, [h]: values[i] || "" }), {});
    });
}

function updateUI() {
    const nav = document.getElementById('navBar');
    nav.innerHTML = '';
    for(let i=1; i<=15; i++) {
        const btn = document.createElement('button');
        btn.className = `week-btn ${i === selectedW ? 'active' : ''}`;
        btn.innerText = i;
        btn.onclick = () => { selectedW = i; updateUI(); };
        nav.appendChild(btn);
    }

    const grid = document.getElementById('displayArea');
    grid.innerHTML = '';

    const weekData = masterData.filter(row => 
        (row["الأسابيع"] || "").includes(W_TEXT[selectedW]) || (row["الأسابيع"] || "") == selectedW
    );

    if (weekData.length === 0) {
        grid.innerHTML = `<div class="supervisor-card">لا توجد بيانات مسجلة للأسبوع ${selectedW}</div>`;
        return;
    }

    const summary = {};
    weekData.forEach(row => {
        const sup = row["اسم المشرف"]; if(!sup) return;
        if(!summary[sup]) summary[sup] = { name: sup, done: 0, pending: 0, total: 0, items: [] };

        // الحل الجذري: تقسيم النصوص بناءً على أي فاصل أسطر وحذف الفراغات
        const indList = (row["المؤشر"] || "").split(/\n/).map(t => t.trim()).filter(t => t.length > 5);
        const statList = (row["الحالة"] || "").split(/\n/).map(t => t.trim()).filter(t => t.length > 0);

        indList.forEach((txt, idx) => {
            const status = (statList[idx] || statList[0] || "").trim();
            const isDone = status.includes("تم") && !status.includes("جاري");
            const isPending = status.includes("جاري");

            if(isDone) summary[sup].done++;
            if(isPending) summary[sup].pending++;
            summary[sup].total++;
            summary[sup].items.push({ txt, isDone, isPending });
        });
    });

    Object.values(summary).forEach(s => {
        grid.innerHTML += `
            <div class="supervisor-card">
                <div class="name-header">${s.name}</div>
                <div style="font-size:0.8em; color:#777; margin-top:-10px; margin-bottom:15px;">الأسبوع ${W_TEXT[selectedW]}</div>
                
                <button class="action-btn" onclick="this.nextElementSibling.classList.toggle('active')">
                    ▼ قائمة المؤشرات (${s.total})
                </button>
                <div class="details-box">
                    ${s.items.map(it => `
                        <div class="indicator-item">
                            <span>${it.txt}</span>
                            <span>${it.isDone ? '✅' : (it.isPending ? '⏳' : '⚪')}</span>
                        </div>
                    `).join('')}
                </div>

                <div class="stats-row">
                    <div class="stat-item bg-green"><span>${s.done}</span>تم ✅</div>
                    <div class="stat-item bg-orange"><span>${s.pending}</span>جاري ⏳</div>
                    <div class="stat-item bg-blue"><span>${s.total}</span>الأسبوع</div>
                </div>

                <div class="progress-section">
                    <small>إجمالي المنجز (تراكمي)</small>
                    <b>${s.done}</b>
                    <small>نسبة الإنجاز: ${((s.done/44)*100).toFixed(1)}%</small>
                </div>
            </div>`;
    });
}
fetchData();
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين - إصلاح العدادات</title>
    <style>
        :root { --primary: #1e3c72; --accent: #ffd700; --success: #4caf50; --pending: #ff9800; }
        body { font-family: 'Segoe UI', sans-serif; background: #2a5298; color: #fff; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: 0 auto; }
        .nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 25px; }
        .btn { background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: bold; }
        .btn.active { background: var(--accent); color: var(--primary); border-color: var(--accent); }
        .card { background: #fff; color: #333; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .sup-name { color: var(--primary); font-size: 1.4em; margin-bottom: 15px; font-weight: bold; }
        .toggle-btn { background: #667eea; color: #fff; width: 100%; border: none; padding: 12px; border-radius: 10px; cursor: pointer; margin-bottom: 10px; font-weight: bold; }
        .list-area { display: none; background: #f9f9f9; padding: 10px; border-radius: 10px; text-align: right; border: 1px solid #eee; margin-bottom: 15px; }
        .list-area.show { display: block; }
        .item { border-bottom: 1px solid #eee; padding: 8px 0; display: flex; justify-content: space-between; font-size: 0.85em; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .stat-box { padding: 10px; border-radius: 12px; font-weight: bold; }
        .stat-box b { display: block; font-size: 1.5em; }
        .box-done { background: #e8f5e9; color: #2e7d32; }
        .box-process { background: #fff3e0; color: #ef6c00; }
        .box-week { background: #e3f2fd; color: #1565c0; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav" id="weeks"></div>
    <div id="content"></div>
</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";
const W_MAP = {1:"الأول",2:"الثاني",3:"الثالث",4:"الرابع",5:"الخامس",6:"السادس",7:"السابع",8:"الثامن",9:"التاسع",10:"العاشر",11:"الحادي عشر",12:"الثاني عشر",13:"الثالث عشر",14:"الرابع عشر",15:"الخامس عشر"};

let db = [];
let currentW = 2; // افتراضي الأسبوع الثاني حسب صورتك الأخيرة

async function load() {
    try {
        const r = await fetch(URL + "&t=" + Date.now());
        const txt = await r.text();
        db = parse(txt);
        render();
    } catch(e) { console.error("Error loading data"); }
}

function parse(csv) {
    const rows = [];
    let field = '', inQuotes = false, row = [];
    for (let i = 0; i < csv.length; i++) {
        const c = csv[i], next = csv[i+1];
        if (c === '"') { if (inQuotes && next === '"') { field += '"'; i++; } else inQuotes = !inQuotes; }
        else if (c === ',' && !inQuotes) { row.push(field.trim()); field = ''; }
        else if ((c === '\r' || c === '\n') && !inQuotes) { 
            if (row.length || field) { row.push(field.trim()); rows.push(row); row = []; field = ''; }
        } else field += c;
    }
    const headers = rows[0];
    return rows.slice(1).map(r => headers.reduce((obj, h, i) => ({ ...obj, [h]: r[i] || "" }), {}));
}

function render() {
    const nav = document.getElementById('weeks');
    nav.innerHTML = '';
    for(let i=1; i<=15; i++){
        const b = document.createElement('button');
        b.className = `btn ${i===currentW?'active':''}`;
        b.innerText = i;
        b.onclick = () => { currentW = i; render(); };
        nav.appendChild(b);
    }

    const main = document.getElementById('content');
    main.innerHTML = '';
    
    const colName = "اسم المشرف";
    const colWeek = "الأسابيع";
    const colStat = "الحالة";
    const colInd = "المؤشر";

    // فلترة البيانات بناءً على الأسبوع المختار
    const filtered = db.filter(r => (r[colWeek]||"").includes(W_MAP[currentW]) || (r[colWeek]||"").includes(currentW.toString()));

    const sups = {};
    filtered.forEach(r => {
        const name = r[colName]; if(!name) return;
        if(!sups[name]) sups[name] = { name, done: 0, process: 0, total: 0, list: [] };
        
        // --- الجزء الأهم: تفكيك المؤشرات والحالات المتعددة داخل الخلية ---
        const rawInds = (r[colInd]||"").split('\n').filter(x => x.trim());
        const rawStats = (r[colStat]||"").split('\n').filter(x => x.trim());

        rawInds.forEach((txt, idx) => {
            const statusStr = (rawStats[idx] || rawStats[0] || "").trim();
            const isDone = statusStr.includes("تم") && !statusStr.includes("جاري");
            const isProc = statusStr.includes("جاري");
            
            if(isDone) sups[name].done++;
            if(isProc) sups[name].process++;
            sups[name].total++;
            
            sups[name].list.push({ txt, isDone, isProc });
        });
    });

    Object.values(sups).forEach(s => {
        main.innerHTML += `
            <div class="card">
                <div class="sup-name">${s.name}</div>
                <button class="toggle-btn" onclick="this.nextElementSibling.classList.toggle('show')">
                    ▼ عرض المؤشرات (${s.total})
                </button>
                <div class="list-area">
                    ${s.list.map(item => `
                        <div class="item">
                            <span>${item.txt}</span>
                            <span>${item.isDone ? '✅' : (item.isProc ? '⏳' : '⚪')}</span>
                        </div>`).join('')}
                </div>
                <div class="stats-grid">
                    <div class="stat-box box-done"><b>${s.done}</b>تم ✅</div>
                    <div class="stat-box box-process"><b>${s.process}</b>جاري ⏳</div>
                    <div class="stat-box box-week"><b>${s.total}</b>هذا الأسبوع 📋</div>
                </div>
            </div>`;
    });
}
load();
</script>
</body>
</html>

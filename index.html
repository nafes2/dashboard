<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة متابعة المشرفين</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    
    .manager-title {
      text-align: center;
      color: #667eea;
      margin-bottom: 30px;
      font-size: 20px;
      font-weight: bold;
    }
    
    .supervisor-card {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      border-right: 5px solid #667eea;
    }
    
    .supervisor-name {
      font-size: 22px;
      font-weight: bold;
      color: #333;
      margin-bottom: 15px;
    }
    
    .supervisor-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    
    .info-item {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    
    .info-label {
      color: #666;
      font-size: 14px;
      margin-bottom: 5px;
    }
    
    .info-value {
      color: #333;
      font-size: 18px;
      font-weight: bold;
    }
    
    .response-box {
      background: white;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 15px;
      margin-top: 15px;
    }
    
    .response-box textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }
    
    .send-btn {
      background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    
    .success-msg {
      background: #d4edda;
      color: #155724;
      padding: 15px;
      border-radius: 8px;
      margin-top: 10px;
      display: none;
    }
    
    .week-badge {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 14px;
      margin-left: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>📊 لوحة متابعة المشرفين</h1>
  <div class="manager-title" id="managerTitle">جاري التحميل...</div>
  
  <div id="supervisorsList">
    <div style="text-align:center;padding:20px;">جاري تحميل البيانات...</div>
  </div>
</div>

<script>
  // ============================================
  // رابط CSV للـ Dashboard
  // ============================================
  const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv';
  
  // بيانات المدراء والمشرفين
  const MANAGERS_DATA = {
    "مدير 1": {
      supervisors: ["عبدالعزيز محمد القضيبي", "حسين سليمان"],
      phones: ["966555179649", "966550000000"]
    },
    "مدير 2": {
      supervisors: ["صالح سليمان السديس", "خالد عبدالله"],
      phones: ["966542145125", "9665412451452"]
    },
    "مدير 3": {
      supervisors: ["علي سعد"],
      phones: ["966542145125"]
    }
  };
  
  // ============================================
  
  function getManagerFromUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('manager') || 'all';
  }
  
  const currentManager = getManagerFromUrl();
  
  async function loadData() {
    try {
      const response = await fetch(SHEET_CSV_URL);
      const csvText = await response.text();
      const rows = parseCSV(csvText);
      
      renderData(rows);
    } catch (error) {
      document.getElementById('supervisorsList').innerHTML = 
        '<div style="color:red;text-align:center;">خطأ في تحميل البيانات</div>';
    }
  }
  
  function parseCSV(csv) {
    const lines = csv.split('\n');
    return lines.map(line => line.split(','));
  }
  
  function renderData(allData) {
    document.getElementById('managerTitle').textContent = 
      currentManager === 'all' ? 'جميع المشرفين' : currentManager;
    
    const data = allData.filter(row => row[1] && row[1].trim() !== '');
    
    let filteredData = [];
    let phones = {};
    
    if (currentManager !== 'all' && MANAGERS_DATA[currentManager]) {
      const managerInfo = MANAGERS_DATA[currentManager];
      const allowedSupervisors = managerInfo.supervisors;
      
      data.forEach(row => {
        const supervisorName = row[1].trim();
        const index = allowedSupervisors.indexOf(supervisorName);
        if (index !== -1) {
          filteredData.push(row);
          phones[supervisorName] = managerInfo.phones[index];
        }
      });
    } else {
      filteredData = data;
    }
    
    let html = '';
    
    if (filteredData.length === 0) {
      html = '<div style="text-align:center;padding:40px;">لا توجد بيانات</div>';
    } else {
      filteredData.forEach((row, index) => {
        const supervisorName = row[1] || 'غير معروف';
        const week = row[0] || '';
        const phone = phones[supervisorName] || '';
        
        html += '<div class="supervisor-card">';
        html += '<div class="supervisor-name">';
        html += supervisorName;
        if (week) html += '<span class="week-badge">' + week + '</span>';
        html += '</div>';
        
        html += '<div class="supervisor-info">';
        
        for (let i = 2; i < row.length; i++) {
          if (row[i]) {
            html += '<div class="info-item">';
            html += '<div class="info-label">بيان ' + (i-1) + '</div>';
            html += '<div class="info-value">' + row[i] + '</div>';
            html += '</div>';
          }
        }
        
        html += '</div>';
        
        if (currentManager !== 'all' && phone) {
          html += '<div class="response-box">';
          html += '<div class="info-label" style="margin-bottom:10px;">💬 رد المدير:</div>';
          html += '<textarea id="msg_' + index + '" placeholder="اكتب ملاحظاتك..."></textarea>';
          html += '<br>';
          html += '<button class="send-btn" onclick="sendWhatsApp(\'' + supervisorName + '\', \'' + phone + '\', ' + index + ')">';
          html += '📤 إرسال واتساب';
          html += '</button>';
          html += '<div class="success-msg" id="success_' + index + '">✅ تم فتح واتساب!</div>';
          html += '</div>';
        }
        
        html += '</div>';
      });
    }
    
    document.getElementById('supervisorsList').innerHTML = html;
  }
  
  function sendWhatsApp(supervisorName, phone, index) {
    const message = document.getElementById('msg_' + index).value;
    
    if (!message.trim()) {
      alert('الرجاء كتابة رسالة أولاً');
      return;
    }
    
    const fullMessage = 
      "مرحباً " + supervisorName + "،\n\n" +
      "ملاحظات من " + currentManager + ":\n" +
      message + "\n\n" +
      "يرجى مراجعة الاستمارة.";
    
    const whatsappUrl = "https://wa.me/" + phone + "?text=" + encodeURIComponent(fullMessage);
    
    document.getElementById('success_' + index).style.display = 'block';
    window.open(whatsappUrl, '_blank');
  }
  
  loadData();
</script>

</body>
</html>

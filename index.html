<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فحص البيانات</title>
</head>
<body>
    <h2 id="msg">جاري فحص الاتصال بجوجل...</h2>
    <div id="output"></div>

    <script>
        // الرابط الذي نجح معك في المتصفح
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKe9F_Auy-WCMrXomu2SRAjuGLcbUY-UdbyknLLfGoG4ewC02vCzcn7SubUvyr-vzjg/exec";

        async function testFetch() {
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                
                if(data.length > 0) {
                    document.getElementById('msg').innerText = "✅ تم الاتصال بنجاح! البيانات وصلت:";
                    document.getElementById('output').innerText = JSON.stringify(data).substring(0, 500) + "...";
                    console.log(data);
                }
            } catch (error) {
                document.getElementById('msg').innerText = "❌ فشل المتصفح في جلب البيانات: " + error.message;
            }
        }
        testFetch();
    </script>
</body>
</html>

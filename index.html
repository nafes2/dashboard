<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين</title>
    <style>
        :root { --primary: #1e3c72; --secondary: #2a5298; --accent: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .nav { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; }
        .btn { background: #fff; border: 1px solid #ddd; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card h2 { text-align: center; color: var(--primary); margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .ind-list { background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .ind-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid #eee; }
        .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { text-align: center; padding: 15px; border-radius: 12px; font-weight: bold; }
        .done { background: #e8f5e9; color: #2e7d32; }
        .prog { background: #fff3e0; color: #ef6c00; }
        .total { background: #e3f2fd; color: #1565c0; }
        .stat-num { font-size: 1.5em; display: block; }
        .big-total { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; padding: 20px; border-radius: 15px; text-align: center; }
        .link-btn { display: block; text-align: center; background: var(--primary); color: #fff; padding: 12px; border-radius: 10px; text-decoration: none; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav" id="weeksNav"></div>
    <div id="content"></div>
</div>

<script>
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";
let appState = { data: [], currentWeek: 3 };

async function init() {
    const r = await fetch(`${CSV_URL}&t=${Date.now()}`);
    const text = await r.text();
    appState.data = parseCSV(text);
    render();
}

function parseCSV(text) {
    const lines = text.split('\n').filter(l => l.trim());
    const heads = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
    return lines.slice(1).map(line => {
        const cols = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g,'').trim());
        let obj = {}; heads.forEach((h, i) => obj[h] = cols[i]);
        return obj;
    });
}

function render() {
    const nav = document.getElementById('weeksNav'); nav.innerHTML = '';
    for(let i=1; i<=15; i++) {
        const b = document.createElement('button');
        b.className = `btn ${appState.currentWeek === i ? 'active' : ''}`;
        b.textContent = i;
        b.onclick = () => { appState.currentWeek = i; render(); };
        nav.appendChild(b);
    }

    const container = document.getElementById('content');
    if (appState.data.length === 0) return;

    // البحث عن أسماء الأعمدة (تأكد أن الشيت يحتوي على هذه الكلمات)
    const keys = Object.keys(appState.data[0]);
    const nameK = keys.find(k => k.includes("مشرف"));
    const weekK = keys.find(k => k.includes("أسبوع") || k.includes("اسبوع"));
    const statusK = keys.find(k => k.includes("حالة"));
    const indK = keys.find(k => k.includes("مؤشر"));

    let sups = {};
    appState.data.forEach(row => {
        const weekNum = row[weekK]?.match(/\d+/)?.[0];
        if (parseInt(weekNum) === appState.currentWeek) {
            const name = row[nameK]; if(!name) return;
            if(!sups[name]) sups[name] = { name, done: 0, prog: 0, list: [], link: "" };
            
            const count = row[indK].split(',').filter(x => x.trim()).length;
            const status = row[statusK] || "";
            
            if(status.includes("تم")) sups[name].done += count;
            if(status.includes("جاري")) sups[name].prog += count;

            row[indK].split(',').forEach(t => {
                if(t.trim()) sups[name].list.push({ t: t.trim(), isDone: status.includes("تم"), isProg: status.includes("جاري") });
            });
            const link = Object.values(row).find(v => v.startsWith('http'));
            if(link) sups[name].link = link;
        }
    });

    container.innerHTML = '';
    Object.values(sups).forEach(s => {
        container.innerHTML += `
            <div class="card">
                <h2>${s.name}</h2>
                <div class="ind-list">
                    ${s.list.map(i => `<div class="ind-item">${i.isDone?'✅':(i.isProg?'⏳':'⚪')} ${i.t}</div>`).join('')}
                </div>
                <div class="stats">
                    <div class="stat-box done"><span class="stat-num">${s.done}</span>تم</div>
                    <div class="stat-box prog"><span class="stat-num">${s.prog}</span>جاري</div>
                    <div class="stat-box total"><span class="stat-num">${s.done + s.prog}</span>المؤشرات</div>
                </div>
                <div class="big-total"><h3>الإجمالي التراكمي: ${s.done}</h3></div>
                <a href="${s.link}" target="_blank" class="link-btn">🔗 فتح الاستمارة</a>
            </div>`;
    });
}
init();
</script>
</body>
</html>

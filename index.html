<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة متابعة المشرفين - المحدثة</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
  color: #fff;
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 1200px; margin: 0 auto; }
header { text-align: center; padding: 20px 0; }
header h1 { font-size: 2em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
.nav { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 25px 0; }
.btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.3);
  color: #fff;
  padding: 10px 20px;
  border-radius: 25px;
  cursor: pointer;
  transition: all 0.3s;
}
.btn.active { background: #fff; color: #1e3c72; font-weight: bold; transform: scale(1.05); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
.card {
  background: #fff;
  color: #333;
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}
.card-header h3 { color: #1e3c72; font-size: 1.2em; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-bottom: 15px; }
.stats { display: flex; justify-content: space-between; margin-bottom: 15px; }
.stat-item { text-align: center; flex: 1; }
.stat-label { display: block; font-size: 0.85em; color: #666; }
.stat-value { font-size: 1.2em; font-weight: bold; }
.stat-value.done { color: #2ecc71; }
.progress-container { margin-bottom: 15px; }
.progress-label { display: flex; justify-content: space-between; font-size: 0.85em; margin-bottom: 5px; font-weight: bold; }
.progress { background: #eee; height: 18px; border-radius: 10px; overflow: hidden; }
.bar { height: 100%; background: linear-gradient(90deg, #6a11cb 0%, #2575fc 100%); transition: width 1s; display: flex; align-items: center; justify-content: center; color: white; font-size: 0.7em; }
.link-btn {
  display: block; width: 100%; padding: 12px; text-align: center;
  background: #1e3c72; color: #fff; text-decoration: none; border-radius: 10px; font-weight: bold;
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>📊 لوحة متابعة المشرفين</h1>
    <p id="updateTime">جاري التحديث...</p>
  </header>
  
  <div class="nav" id="nav"></div>
  <div class="grid" id="weeks"></div>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?gid=1526100112&single=true&output=csv";
const PROXIES = ["https://api.allorigins.win/raw?url=", "https://corsproxy.io/?"];

let appData = { allData: [], currentWeek: 1 };

async function loadData() {
  for (let proxy of PROXIES) {
    try {
      const response = await fetch(proxy + encodeURIComponent(SHEET_URL + "&t=" + Date.now()));
      if (response.ok) {
        const text = await response.text();
        appData.allData = parseCSV(text);
        render();
        return;
      }
    } catch (e) { console.log("Proxy failed, trying next..."); }
  }
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, ''));
  return lines.slice(1).map(line => {
    const values = line.split(',').map(v => v.trim().replace(/"/g, ''));
    let row = {};
    headers.forEach((h, i) => row[h] = values[i]);
    
    // تحديد الأعمدة ذكياً
    const nameKey = Object.keys(row).find(k => k.includes("اسم") || k.includes("المشرف"));
    const weekKey = Object.keys(row).find(k => k.includes("الأسبوع") || k.includes("الاسبوع"));
    const doneKey = Object.keys(row).find(k => k.includes("تم") || k.includes("التنفيذ"));
    const linkKey = Object.keys(row).find(k => k.includes("الرابط") || k.includes("رابط"));

    return {
      name: row[nameKey] || "غير معروف",
      week: parseInt(row[weekKey]) || 0,
      doneVal: row[doneKey] || "0",
      link: row[linkKey] || ""
    };
  });
}

function render() {
  renderNav();
  renderCards();
  document.getElementById("updateTime").innerText = "آخر تحديث: " + new Date().toLocaleTimeString('ar-SA');
}

function renderNav() {
  const nav = document.getElementById("nav");
  nav.innerHTML = "";
  const weeks = [...new Set(appData.allData.map(d => d.week))].sort((a,b) => a-b);
  weeks.forEach(w => {
    if(!w) return;
    const btn = document.createElement("button");
    btn.className = btn ${appData.currentWeek == w ? 'active' : ''};
    btn.innerText = الأسبوع ${w};
    btn.onclick = () => { appData.currentWeek = w; render(); };
    nav.appendChild(btn);
  });
}

function renderCards() {
  const container = document.getElementById("weeks");
  container.innerHTML = "";
  
  const filtered = appData.allData.filter(row => row.week == appData.currentWeek);

  filtered.forEach(sup => {
    // المنطق الجديد للتعامل مع "جاري التنفيذ"
    let raw = sup.doneVal;
    let display = raw;
    let num = parseFloat(raw);

    // إذا كان العمود المساعد أعطى 0 أو القيمة نصية تحتوي على "جاري"
    if (isNaN(num) || (num === 0 && raw.includes("جاري"))) {
      num = 0;
      display = "جاري التنفيذ"; 
    }

    const total = 44;
    const percent = ((num / total) * 100).toFixed(1);

    container.innerHTML += `
      <div class="card">
        <div class="card-header"><h3>${sup.name}</h3></div>
        <div class="stats">
          <div class="stat-item">
            <span class="stat-label">حالة الإنجاز</span>
            <span class="stat-value done">${display}</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">المستهدف</span>
            <span class="stat-value">44</span>
          </div>
        </div>
        <div class="progress-container">
          <div class="progress-label"><span>نسبة الإنجاز</span><span>${percent}%</span></div>
          <div class="progress">
            <div class="bar" style="width: ${Math.max(percent, 5)}%">${percent}%</div>
          </div>
        </div>
        <a href="${sup.link || '#'}" target="_blank" class="link-btn">🔗 فتح الاستمارة</a>
      </div>
    `;
  });
}

loadData();
</script>
</body>
</html>

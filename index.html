<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام متابعة المشرفين - تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 900px;
            direction: rtl;
        }

        .login-section {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
        }

        .pin-input {
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            width: 250px;
            text-align: center;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        .pin-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .error-message {
            color: #e74c3c;
            margin-top: 10px;
            display: none;
        }

        .dashboard {
            display: none;
        }

        .manager-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-right: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .manager-name {
            font-size: 24px;
            color: #333;
            font-weight: bold;
        }

        .logout-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            overflow: hidden;
        }

        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: right;
            font-weight: bold;
        }

        td {
            padding: 15px;
            text-align: right;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #25d366;
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            transition: background 0.2s;
        }

        .whatsapp-btn:hover {
            background: #128c7e;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin: 20px 0;
            font-size: 18px;
        }

        .no-supervisors {
            text-align: center;
            color: #666;
            padding: 40px;
            font-size: 16px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 20px;
        }

        .supervisor-card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
            margin-top: 15px;
            border-right: 4px solid #667eea;
        }

        .supervisor-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .supervisor-phone {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- قسم تسجيل الدخول -->
        <div id="loginSection" class="login-section">
            <h1>🔐 نظام متابعة المشرفين</h1>
            <p class="subtitle">الرجاء إدخال الرقم السري للمدير</p>
            <input type="password" id="pinInput" class="pin-input" placeholder="أدخل الرقم السري" maxlength="10">
            <br>
            <button onclick="login()" class="btn">دخول</button>
            <p id="errorMessage" class="error-message">رقم سري غير صحيح</p>
        </div>

        <!-- لوحة التحكم -->
        <div id="dashboard" class="dashboard">
            <div class="manager-info">
                <div class="manager-name">👤 المدير: <span id="managerName"></span></div>
                <button onclick="logout()" class="logout-btn">خروج</button>
            </div>

            <h2 style="margin-bottom: 20px; color: #333;">📋 المشرفون التابعون</h2>

            <div id="loading" class="loading">⏳ جاري تحميل البيانات...</div>

            <div id="supervisorsContainer">
                <!-- هنا ستظهر بيانات المشرفين -->
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // إعدادات الاتصال - عدل هذا الرابط فقط
        // ============================================
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyisku0sGE.../exec'; // <-- ضع رابط السكربت هنا

        let currentCallback = null;

        // دالة تسجيل الدخول باستخدام JSONP
        function login() {
            const pin = document.getElementById('pinInput').value.trim();
            const errorMsg = document.getElementById('errorMessage');
            const loading = document.getElementById('loading');

            if (!pin) {
                errorMsg.textContent = 'الرجاء إدخال الرقم السري';
                errorMsg.style.display = 'block';
                return;
            }

            loading.style.display = 'block';
            errorMsg.style.display = 'none';

            // إنشاء اسم دالة عشوائية للـ JSONP
            const callbackName = 'callback_' + Date.now();

            // تخزين الدالة للاستخدام لاحقاً
            window[callbackName] = function(data) {
                console.log('JSONP Response:', data);

                if (data.success) {
                    showDashboard(data);
                } else {
                    errorMsg.textContent = data.error || 'رقم سري غير صحيح';
                    errorMsg.style.display = 'block';
                }

                loading.style.display = 'none';

                // تنظيف
                delete window[callbackName];
                const script = document.getElementById('jsonp_' + callbackName);
                if (script) script.remove();
            };

            // إنشاء عنصر script للـ JSONP
            const script = document.createElement('script');
            script.id = 'jsonp_' + callbackName;
            script.src = `${SCRIPT_URL}?action=verifyPin&pin=${encodeURIComponent(pin)}&callback=${callbackName}`;

            script.onerror = function() {
                errorMsg.textContent = 'خطأ في الاتصال بالخادم';
                errorMsg.style.display = 'block';
                loading.style.display = 'none';
                delete window[callbackName];
                script.remove();
            };

            document.head.appendChild(script);
        }

        // عرض لوحة التحكم
        function showDashboard(data) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            document.getElementById('managerName').textContent = data.manager;

            renderSupervisors(data);
        }

        // عرض المشرفين
        function renderSupervisors(data) {
            const container = document.getElementById('supervisorsContainer');

            const supervisors = data.supervisors || [];
            const phones = data.phones || {};

            console.log('Supervisors:', supervisors);
            console.log('Phones:', phones);

            if (supervisors.length === 0) {
                container.innerHTML = '<div class="no-supervisors">⚠️ لا يوجد مشرفون مسجلون لهذا المدير</div>';
                return;
            }

            // إنشاء الجدول
            let html = '<table>';
            html += '<thead><tr><th>#</th><th>اسم المشرف</th><th>رقم الجوال</th><th>تواصل واتساب</th></tr></thead>';
            html += '<tbody>';

            supervisors.forEach((supervisor, index) => {
                const phone = phones[supervisor] || '';
                const cleanPhone = phone ? phone.replace(/\D/g, '') : '';
                const phoneDisplay = phone || 'غير متوفر';

                html += '<tr>';
                html += `<td>${index + 1}</td>`;
                html += `<td><strong>${supervisor}</strong></td>`;
                html += `<td dir="ltr" style="text-align: right;">${phoneDisplay}</td>`;
                html += `<td>`;
                if (cleanPhone) {
                    html += `<a href="https://wa.me/${cleanPhone}" target="_blank" class="whatsapp-btn">📱 إرسال رسالة</a>`;
                } else {
                    html += '<span style="color: #999;">-</span>';
                }
                html += `</td>`;
                html += '</tr>';
            });

            html += '</tbody></table>';

            // إضافة عدد المشرفين
            html += `<div style="margin-top: 20px; text-align: center; color: #666;">📊 إجمالي المشرفين: <strong>${supervisors.length}</strong></div>`;

            container.innerHTML = html;
        }

        // تسجيل الخروج
        function logout() {
            document.getElementById('pinInput').value = '';
            document.getElementById('loginSection').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('supervisorsContainer').innerHTML = '';
        }

        // Enter key support
        document.getElementById('pinInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>

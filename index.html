<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>لوحة متابعة المشرفين</title>
    <style>
        :root { --primary: #1e3c72; --secondary: #2a5298; --accent: #ffd700; --purple: #9c27b0; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: #fff; min-height: 100vh; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 1.8rem; margin-bottom: 10px; }
        
        /* تصميم الأزرار */
        .nav { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 25px; }
        .btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; padding: 12px 5px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn.active { background: var(--accent); color: var(--primary); border-color: var(--accent); box-shadow: 0 4px 12px rgba(255,215,0,0.3); }

        /* تصميم البطاقات - مطابق للصورة الأصلية */
        .grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .card { background: #fff; color: #333; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); position: relative; overflow: hidden; }
        .card h3 { color: var(--primary); text-align: center; font-size: 1.4rem; margin-bottom: 15px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        
        .stat-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { text-align: center; padding: 12px 5px; border-radius: 15px; }
        .stat-box.done { background: #e8f5e9; color: #2e7d32; }
        .stat-box.pending { background: #fff3e0; color: #ef6c00; }
        .stat-box.total { background: #e3f2fd; color: #1565c0; }
        .stat-num { font-size: 1.4rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.8rem; font-weight: 600; }

        /* قسم الإجمالي التراكمي */
        .total-section { background: linear-gradient(to right, #6a11cb 0%, #2575fc 100%); color: #fff; border-radius: 15px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .total-title { font-size: 0.9rem; margin-bottom: 10px; opacity: 0.9; }
        .total-val { font-size: 2.2rem; font-weight: bold; }

        /* أشرطة التقدم */
        .progress-area { margin-top: 15px; text-align: right; }
        .progress-text { display: flex; justify-content: space-between; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px; color: #555; }
        .bar-bg { background: #eee; height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 15px; }
        .bar-fill { height: 100%; transition: width 0.8s ease-in-out; }

        .link-btn { display: block; width: 100%; background: var(--primary); color: #fff; text-align: center; padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 10px; }
        
        .loading { text-align: center; padding: 50px; font-size: 1.2rem; }
        .error { background: #ff5252; padding: 15px; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📊 لوحة متابعة المشرفين</h1>
        <p>تحديث تلقائي مطابق للنموذج الأصلي</p>
    </header>

    <div class="nav" id="weeksNav"></div>
    <div id="cardsContainer" class="grid">
        <div class="loading">جاري جلب البيانات من جوجل...</div>
    </div>
</div>

<script>
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRnnHioONFpJvLo1r7JvLt-kxipITtodS7ulzL-gPbi4vFPrKvkaDOVmZexOI2SZ_Gr5BXm212kdprT/pub?output=csv";
const PROXY = "https://api.allorigins.win/raw?url=";
let allData = [];
let currentWeek = 5; // الأسبوع الافتراضي

async function init() {
    try {
        const response = await fetch(PROXY + encodeURIComponent(SHEET_CSV + "&cache=" + Date.now()));
        const text = await response.text();
        const rows = text.split('\n').filter(r => r.trim() !== "");
        const headers = rows[0].split(',').map(h => h.trim().replace(/"/g, ''));
        
        allData = rows.slice(1).map(row => {
            const cols = row.split(',').map(c => c.trim().replace(/"/g, ''));
            let curr = {};
            headers.forEach((h, i) => curr[h] = cols[i]);
            return curr;
        });
        render();
    } catch (err) {
        document.getElementById("cardsContainer").innerHTML = `<div class="error">تعذر الاتصال بالبيانات. يرجى المحاولة لاحقاً.</div>`;
    }
}

function render() {
    // 1. رسم أزرار الأسابيع
    const nav = document.getElementById("weeksNav");
    nav.innerHTML = "";
    for(let i=1; i<=15; i++) {
        const btn = document.createElement("button");
        btn.className = `btn ${i === currentWeek ? 'active' : ''}`;
        btn.textContent = i;
        btn.onclick = () => { currentWeek = i; render(); };
        nav.appendChild(btn);
    }

    // 2. معالجة البيانات
    const container = document.getElementById("cardsContainer");
    container.innerHTML = "";

    const nameCol = Object.keys(allData[0]).find(k => k.includes("اسم المشرف"));
    const weekCol = Object.keys(allData[0]).find(k => k.includes("الأسبوع"));
    const statusCol = Object.keys(allData[0]).find(k => k.includes("الحالة"));

    const names = [...new Set(allData.map(d => d[nameCol]))].filter(n => n);

    names.forEach(name => {
        const personalRows = allData.filter(r => r[nameCol] === name);
        const totalDoneCount = personalRows.filter(r => r[statusCol] === "تم التنفيذ").length;
        
        const weekRows = personalRows.filter(r => {
            const w = r[weekCol] ? r[weekCol].replace(/[^0-9]/g, "") : "";
            return parseInt(w) === currentWeek;
        });

        if (weekRows.length > 0) {
            const wDone = weekRows.filter(r => r[statusCol] === "تم التنفيذ").length;
            const wTotal = weekRows.length;
            const wPerc = ((wDone/wTotal)*100).toFixed(1);
            const tPerc = ((totalDoneCount/44)*100).toFixed(1);

            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <h3>${name}</h3>
                <div class="stat-group">
                    <div class="stat-box done"><span class="stat-num">${wDone}</span><span class="stat-label">✅ تم</span></div>
                    <div class="stat-box pending"><span class="stat-num">${wTotal - wDone}</span><span class="stat-label">⏳ جاري</span></div>
                    <div class="stat-box total"><span class="stat-num">${wTotal}</span><span class="stat-label">📋 هذا الأسبوع</span></div>
                </div>

                <div class="total-section">
                    <div class="total-title">📊 إجمالي المؤشرات المنفذة (جميع الأسابيع)</div>
                    <div class="total-val">${totalDoneCount}</div>
                    <div style="font-size: 0.8rem; margin-top: 5px;">من أصل 44 مؤشر = ${tPerc}%</div>
                </div>

                <div class="progress-area">
                    <div class="progress-text"><span>نسبة الإنجاز في الأسبوع ${currentWeek}</span><span>${wPerc}%</span></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${wPerc}%; background:#4caf50;"></div></div>
                    
                    <div class="progress-text"><span>النسبة من إجمالي المؤشرات (44)</span><span>${tPerc}%</span></div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${tPerc}%; background:#9c27b0;"></div></div>
                </div>

                <a href="#" class="link-btn">📋 فتح الاستمارة</a>
            `;
            container.appendChild(card);
        }
    });
}

init();
</script>
</body>
</html>

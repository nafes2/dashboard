<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة متابعة المشرفين</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #1a3a63; --secondary-color: #f8f9fa; --accent-color: #007bff; --success-color: #28a745; }
        body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        .header { background-color: var(--primary-color); color: white; padding: 25px 20px; text-align: center; }
        .container { max-width: 900px; margin: -30px auto 20px; padding: 0 15px; }
        
        /* ميزة الإظهار والإخفاء */
        .controls { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; border-top: 5px solid var(--primary-color); }
        .progress-container { background-color: #e9ecef; border-radius: 10px; height: 15px; margin: 15px 0; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #28a745, #34ce57); height: 100%; transition: width 0.8s ease; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-box { background-color: var(--secondary-color); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #dee2e6; }
        .indicator-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .status-tag { padding: 4px 10px; border-radius: 6px; font-size: 0.85em; font-weight: bold; }
        .status-done { background-color: #d4edda; color: #155724; }
        .status-pending { background-color: #fff3cd; color: #856404; }
        #loading { text-align: center; padding: 50px; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h2>📊 لوحة متابعة المشرفين</h2>
    <p>تحديث تلقائي من النظام المركزي</p>
</div>

<div class="container">
    <div class="controls">
        <input type="checkbox" id="showCompleted" onchange="processData(window.lastRawData)">
        <label for="showCompleted">إظهار المؤشرات المنفذة (المكتملة)</label>
    </div>

    <div id="loading">جاري جلب البيانات...</div>
    <div id="dashboard"></div>
</div>

<script>
    const sheetId = '1X-p1E6mK-M10B6Zsc56WlO2_Q2YhZ7L8G8Xp_vT8h7s';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

    async function fetchData() {
        try {
            const response = await fetch(url);
            const csvData = await response.text();
            window.lastRawData = csvData; // حفظ البيانات للتحديث عند الضغط على المربع
            processData(csvData);
            document.getElementById('loading').style.display = 'none';
        } catch (error) {
            document.getElementById('loading').innerText = "خطأ في الاتصال بالسيرفر";
        }
    }

    function processData(csvData) {
        const showAll = document.getElementById('showCompleted').checked;
        const rows = csvData.split('\n').slice(1);
        const dashboard = document.getElementById('dashboard');
        dashboard.innerHTML = '';

        const supervisors = {};

        rows.forEach(row => {
            const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(col => col.replace(/^"|"$/g, '').trim());
            const name = columns[0];
            const status = columns[1];
            const task = columns[2];

            if (name) {
                if (!supervisors[name]) supervisors[name] = { done: 0, total: 44, tasks: [] };
                
                const isFinished = (status === "تم التنفيذ" || status === "جاري التنفيذ");
                if (isFinished) supervisors[name].done++;
                
                // الإضافة: فلترة العرض بناءً على المربع
                if (!isFinished || showAll) {
                    supervisors[name].tasks.push({ task, status, isFinished });
                }
            }
        });

        for (const name in supervisors) {
            const data = supervisors[name];
            const percentage = ((data.done / 44) * 100).toFixed(1);
            
            let tasksHtml = '';
            data.tasks.forEach(t => {
                tasksHtml += `
                    <div class="indicator-item">
                        <span>${t.task}</span>
                        <span class="status-tag ${t.isFinished ? 'status-done' : 'status-pending'}">${t.status}</span>
                    </div>`;
            });

            dashboard.innerHTML += `
                <div class="card">
                    <h3>المشرف: ${name}</h3>
                    <div class="progress-container"><div class="progress-bar" style="width: ${percentage}%"></div></div>
                    <div class="stats-grid">
                        <div class="stat-box">الإنجاز: ${data.done} / 44</div>
                        <div class="stat-box">النسبة: ${percentage}%</div>
                    </div>
                    <div style="margin-top:15px;">${tasksHtml}</div>
                </div>`;
        }
    }

    fetchData();
    setInterval(fetchData, 60000);
</script>
</body>
</html>
